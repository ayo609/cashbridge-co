<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashBridge | Admin Login</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --bg-dark: #0a0f1e;
  --bg-card: rgba(15, 23, 42, 0.7);
  --border: rgba(255, 255, 255, 0.05);
  --text: #e2e8f0;
  --text-light: #94a3b8;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0a0f1e;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
    linear-gradient(145deg, #0f172a 0%, #020617 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  position: relative;
  overflow-x: hidden;
}

/* Animated Background Blobs */
.blob {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.2;
  animation: float 20s infinite alternate;
  z-index: 0;
  pointer-events: none;
}

.blob-1 {
  top: -100px;
  right: -100px;
  background: linear-gradient(145deg, #6366f1, #a855f7);
  animation-delay: -2s;
}

.blob-2 {
  bottom: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: linear-gradient(145deg, #ec4899, #f59e0b);
  animation-delay: -7s;
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, 30px) scale(1.1); }
}

/* Main Container */
.login-container {
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 10;
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Admin Card */
.admin-card {
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 32px;
  padding: 2.5rem 2rem;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  position: relative;
  overflow: hidden;
}

.admin-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
  background-size: 200% 100%;
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2rem;
}

.shield-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.2rem;
  transform: rotate(-5deg);
  box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.4);
  animation: pulse 2s infinite;
}

.shield-icon i {
  font-size: 2.2rem;
  color: white;
}

@keyframes pulse {
  0%, 100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(-5deg) scale(1.05); }
}

.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.3rem;
  letter-spacing: -0.5px;
}

.subtitle {
  color: var(--text-light);
  font-size: 0.85rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.subtitle i {
  color: #6366f1;
  font-size: 0.8rem;
}

/* Form */
.form-group {
  margin-bottom: 1.5rem;
}

label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  color: var(--text);
  font-weight: 500;
  font-size: 0.9rem;
}

label i {
  color: #6366f1;
  font-size: 0.9rem;
}

.input-wrapper {
  position: relative;
}

input {
  width: 100%;
  padding: 1rem 1rem 1rem 2.8rem;
  border-radius: 16px;
  border: 1.5px solid rgba(255, 255, 255, 0.05);
  background: rgba(255, 255, 255, 0.03);
  color: white;
  font-size: 0.95rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all 0.3s;
}

input:focus {
  outline: none;
  border-color: #6366f1;
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
}

input::placeholder {
  color: #475569;
  font-weight: 300;
}

.input-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: #6366f1;
  font-size: 0.9rem;
  opacity: 0.7;
  transition: all 0.3s;
}

input:focus + .input-icon {
  opacity: 1;
}

/* Password Toggle */
.toggle-password {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  padding: 0.5rem;
  font-size: 1rem;
  transition: all 0.3s;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.toggle-password:hover {
  color: #6366f1;
  background: rgba(99, 102, 241, 0.1);
}

/* Login Button */
.btn-login {
  width: 100%;
  padding: 1rem;
  margin-top: 1rem;
  border-radius: 16px;
  border: none;
  font-weight: 600;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.3s;
  box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  position: relative;
  overflow: hidden;
}

.btn-login::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.5s;
}

.btn-login:hover::before {
  left: 100%;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
}

.btn-login:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-login i {
  font-size: 0.9rem;
}

/* Footer */
.footer {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  text-align: center;
}

.footer a {
  color: var(--text-light);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.85rem;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.footer a:hover {
  color: #6366f1;
  gap: 0.7rem;
}

.footer a i {
  font-size: 0.8rem;
}

/* Responsive Breakpoints */
@media (max-width: 480px) {
  .admin-card {
    padding: 2rem 1.5rem;
  }
  
  .logo {
    font-size: 1.6rem;
  }
  
  .shield-icon {
    width: 64px;
    height: 64px;
  }
  
  .shield-icon i {
    font-size: 2rem;
  }
  
  .subtitle {
    font-size: 0.75rem;
  }
  
  input {
    padding: 0.9rem 1rem 0.9rem 2.5rem;
    font-size: 0.9rem;
  }
}

@media (max-width: 360px) {
  .admin-card {
    padding: 1.5rem 1rem;
  }
  
  .logo {
    font-size: 1.4rem;
  }
  
  .shield-icon {
    width: 56px;
    height: 56px;
  }
  
  .shield-icon i {
    font-size: 1.8rem;
  }
  
  .btn-login {
    padding: 0.9rem;
    font-size: 0.9rem;
  }
}

/* Landscape Mode */
@media (max-height: 600px) and (orientation: landscape) {
  body {
    padding: 0.5rem;
  }
  
  .admin-card {
    padding: 1.5rem;
  }
  
  .header {
    margin-bottom: 1rem;
  }
  
  .shield-icon {
    width: 48px;
    height: 48px;
    margin-bottom: 0.8rem;
  }
  
  .shield-icon i {
    font-size: 1.5rem;
  }
  
  .form-group {
    margin-bottom: 1rem;
  }
}

/* Custom SweetAlert2 Styling */
.swal2-popup {
  background: rgba(15, 23, 42, 0.95) !important;
  backdrop-filter: blur(12px) !important;
  border: 1px solid rgba(255, 255, 255, 0.05) !important;
  border-radius: 24px !important;
  color: #e2e8f0 !important;
}

.swal2-title {
  color: white !important;
  font-family: 'Space Grotesk', sans-serif !important;
}

.swal2-html-container {
  color: #94a3b8 !important;
}

.swal2-confirm {
  background: linear-gradient(135deg, #6366f1, #ec4899) !important;
  color: white !important;
  border-radius: 30px !important;
  font-weight: 600 !important;
  padding: 0.8rem 2rem !important;
  border: none !important;
}

.swal2-confirm:focus {
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3) !important;
}
</style>
</head>

<body>

<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-container">
  <div class="admin-card">
    <div class="header">
      <div class="shield-icon">
        <i class="fas fa-shield-halved"></i>
      </div>
      <div class="logo">CashBridge</div>
      <div class="subtitle">
        <i class="fas fa-lock"></i>
        ADMINISTRATOR ACCESS
      </div>
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label>
          <i class="fas fa-envelope"></i>
          Email Address
        </label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="admin@cashbridge.com" required autocomplete="email">
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label>
          <i class="fas fa-lock"></i>
          Password
        </label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <i class="fas fa-key input-icon"></i>
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" type="submit">
        <i class="fas fa-sign-in-alt"></i>
        Login to Dashboard
      </button>
    </form>

    <div class="footer">
      <a href="login.html">
        <i class="fas fa-arrow-left"></i>
        Back to User Login
      </a>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Set persistence to LOCAL
await setPersistence(auth, browserLocalPersistence);

console.log('Admin login page initialized');

/* Password Toggle */
document.getElementById("togglePassword").onclick = () => {
  const passwordInput = document.getElementById("password");
  const icon = document.querySelector("#togglePassword i");
  
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    passwordInput.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
};

/* Login Form */
document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn = document.getElementById("loginBtn");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  // Basic validation
  if (!email || !password) {
    Swal.fire({
      icon: "warning",
      title: "Missing Information",
      text: "Please enter both email and password",
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#6366f1'
    });
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

  try {
    console.log('Attempting login for:', email);
    
    // Sign in
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    console.log("User signed in:", uid);

    // Check if user is admin
    const userDoc = await getDoc(doc(db, "users", uid));

    if (!userDoc.exists()) {
      console.error("User document not found");
      await auth.signOut();
      throw new Error("User profile not found");
    }

    const userData = userDoc.data();
    console.log("User role:", userData.role);

    if (userData.role !== "admin") {
      console.error("User is not admin");
      await auth.signOut();
      
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
      
      Swal.fire({
        icon: "error",
        title: "Access Denied",
        html: "<p>This account does not have administrator privileges.</p>",
        confirmButtonText: "OK",
        confirmButtonColor: "#ef4444",
        background: '#0f172a',
        color: '#e2e8f0'
      });
      return;
    }

    // SUCCESS - Admin verified
    console.log("Admin verified, redirecting...");
    
    Swal.fire({
      icon: "success",
      title: "Welcome Back, Admin!",
      html: "<p>Authentication successful</p><p style='color:#94a3b8;margin-top:0.5rem'>Redirecting to dashboard...</p>",
      timer: 1800,
      showConfirmButton: false,
      background: '#0f172a',
      color: '#e2e8f0',
      willClose: () => {
        window.location.href = "admin-dashboard.html";
      }
    });

  } catch (err) {
    console.error("Login error:", err);
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';

    let errorTitle = "Login Failed";
    let errorMessage = "An error occurred. Please try again.";

    if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
      errorTitle = "Invalid Credentials";
      errorMessage = "Incorrect email or password.";
    } else if (err.code === "auth/user-not-found") {
      errorTitle = "Account Not Found";
      errorMessage = "No admin account exists with this email.";
    } else if (err.code === "auth/invalid-email") {
      errorTitle = "Invalid Email";
      errorMessage = "Please enter a valid email address.";
    } else if (err.code === "auth/too-many-requests") {
      errorTitle = "Too Many Attempts";
      errorMessage = "Access temporarily disabled. Please try again later.";
    } else if (err.code === "auth/network-request-failed") {
      errorTitle = "Network Error";
      errorMessage = "Please check your internet connection.";
    } else if (err.message) {
      errorMessage = err.message;
    }

    Swal.fire({
      icon: "error",
      title: errorTitle,
      text: errorMessage,
      confirmButtonText: "Try Again",
      confirmButtonColor: "#6366f1",
      background: '#0f172a',
      color: '#e2e8f0'
    });
  }
});

// Prevent form resubmission on page refresh
if (window.history.replaceState) {
  window.history.replaceState(null, null, window.location.href);
}
</script>

</body>
</html>
