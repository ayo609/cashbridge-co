<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
  <title>TEXIS · Admin Login</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --teal: #0d9488; --teal-dark: #0f766e; --teal-light: #14b8a6;
      --red: #ef4444; --amber: #f59e0b; --green: #10b981;
      --bg: #0f172a; --card-bg: rgba(15, 23, 42, 0.8);
      --text: #e2e8f0; --sub: #94a3b8; --muted: #64748b;
      --border: rgba(255, 255, 255, 0.06);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --radius: 28px; --radius-sm: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(13, 148, 136, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(239, 68, 68, 0.06) 0%, transparent 40%),
        linear-gradient(160deg, #0f172a 0%, #020617 100%);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      position: relative; overflow: hidden;
    }

    /* Animated blobs */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.15; z-index: 0; pointer-events: none;
      animation: floatBlob 20s infinite alternate;
    }
    .blob-1 {
      width: 400px; height: 400px; top: -100px; right: -100px;
      background: linear-gradient(145deg, var(--teal), #a855f7);
      animation-delay: -2s;
    }
    .blob-2 {
      width: 500px; height: 500px; bottom: -100px; left: -100px;
      background: linear-gradient(145deg, var(--red), var(--amber));
      animation-delay: -7s;
    }
    @keyframes floatBlob {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    /* Container */
    .login-container {
      width: 100%; max-width: 440px; position: relative; z-index: 10;
      animation: slideUp .6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .admin-card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px 28px; box-shadow: var(--shadow-lg);
      position: relative; overflow: hidden;
    }
    .admin-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--red), var(--teal));
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .shield-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--teal-dark), var(--teal-light));
      border-radius: 20px; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 16px;
      box-shadow: 0 16px 32px -8px rgba(13,148,136,.4);
      animation: pulseShield 2s infinite;
    }
    .shield-icon i { font-size: 34px; color: #fff; }
    @keyframes pulseShield {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    .logo {
      font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 6px;
    }
    .subtitle {
      color: var(--sub); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .subtitle i { color: var(--red); font-size: 10px; }
    .phase-badge {
      display: inline-block; background: rgba(13,148,136,.2);
      color: var(--teal-light); font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 10px; letter-spacing: .04em;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; color: var(--text); font-weight: 600; font-size: 13px;
    }
    label i { color: var(--teal); font-size: 13px; }
    .input-wrapper { position: relative; }
    input {
      width: 100%; padding: 14px 16px 14px 44px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: rgba(255,255,255,.03); color: #fff;
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      transition: all .3s; outline: none;
    }
    input:focus {
      border-color: var(--teal); background: rgba(255,255,255,.06);
      box-shadow: 0 0 0 4px rgba(13,148,136,.12);
    }
    input::placeholder { color: #475569; }
    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: var(--teal);
      font-size: 15px; opacity: .6; transition: all .3s;
    }
    input:focus ~ .input-icon, input:focus + .input-icon { opacity: 1; }
    .toggle-password {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none; color: var(--sub);
      cursor: pointer; padding: 8px; font-size: 15px;
      transition: all .2s; border-radius: 8px;
    }
    .toggle-password:hover { color: var(--teal); background: rgba(13,148,136,.1); }

    /* Button */
    .btn-login {
      width: 100%; padding: 16px; margin-top: 8px;
      border-radius: var(--radius-sm); border: none;
      font-weight: 700; font-size: 15px; cursor: pointer;
      background: linear-gradient(135deg, var(--teal), var(--teal-light));
      color: #fff; transition: all .3s;
      box-shadow: 0 8px 24px rgba(13,148,136,.3);
      display: flex; align-items: center; justify-content: center;
      gap: 10px; font-family: 'DM Sans', sans-serif;
      position: relative; overflow: hidden;
    }
    .btn-login::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      transition: left .5s;
    }
    .btn-login:hover::after { left: 100%; }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(13,148,136,.4);
    }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* Footer */
    .footer {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border); text-align: center;
    }
    .footer a {
      color: var(--sub); text-decoration: none; font-weight: 500;
      font-size: 13px; transition: all .3s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .footer a:hover { color: var(--teal); gap: 12px; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-radius: 50%; border-top-color: #fff;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SweetAlert Dark Theme */
    .swal2-popup { background: #1e293b !important; border: 1px solid rgba(255,255,255,.06) !important; border-radius: 20px !important; color: #e2e8f0 !important; }
    .swal2-title { color: #fff !important; font-family: 'Outfit', sans-serif !important; }
    .swal2-html-container { color: #94a3b8 !important; }
    .swal2-confirm { background: linear-gradient(135deg, var(--teal), var(--teal-light)) !important; color: #fff !important; border-radius: 30px !important; font-weight: 700 !important; }
    .swal2-cancel { background: #334155 !important; color: #fff !important; border-radius: 30px !important; }

    @media (max-width: 480px) {
      .admin-card { padding: 28px 20px; }
      .logo { font-size: 24px; }
      .shield-icon { width: 60px; height: 60px; }
      .shield-icon i { font-size: 28px; }
      input { padding: 13px 13px 13px 40px; font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-container">
  <div class="admin-card">
    <div class="header">
      <div class="shield-icon"><i class="fas fa-shield-halved"></i></div>
      <div class="logo">TEXIS</div>
      <div class="subtitle">
        <i class="fas fa-lock"></i>
        ADMINISTRATOR PORTAL
        <span class="phase-badge">PHASE 2</span>
      </div>
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Admin Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="admin@texis.com" required autocomplete="email"/>
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-key"></i> Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password"/>
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" type="submit">
        <i class="fas fa-sign-in-alt"></i> Access Admin Panel
      </button>
    </form>

    <div class="footer">
      <a href="login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
    </div>
  </div>
</div>

<script>
  // ✅ NEW FIREBASE CONFIG — TEXIS Phase 2
  const firebaseConfig = {
    apiKey: "AIzaSyCoya4moqwNCuVI-EtzLcMt2gD6QNUdyCQ",
    authDomain: "texis-b7180.firebaseapp.com",
    projectId: "texis-b7180",
    storageBucket: "texis-b7180.firebasestorage.app",
    messagingSenderId: "848854390209",
    appId: "1:848854390209:web:c5babd1ca5e0e42ba08b40"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let isLoggingIn = false;

  // ✅ PASSWORD TOGGLE
  document.getElementById('togglePassword').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      pw.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  // ✅ LOGIN FORM
  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isLoggingIn) return;

    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    // Validation
    if (!email || !password) {
      return Swal.fire({
        icon: 'warning', title: 'Missing Info',
        text: 'Please enter both email and password.',
        confirmButtonColor: '#0d9488'
      });
    }

    isLoggingIn = true;
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Authenticating...';

    try {
      // Set persistence
      await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

      // Sign in
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const uid = userCredential.user.uid;

      // ✅ CHECK ADMIN STATUS
      const userSnap = await db.collection('users').doc(uid).get();

      if (!userSnap.exists) {
        await auth.signOut();
        throw new Error('Admin profile not found.');
      }

      const userData = userSnap.data();

      // ✅ BAN CHECK
      if (userData.banned === true || userData.isBanned === true || userData.status === 'banned') {
        await auth.signOut();
        localStorage.clear();
        sessionStorage.clear();
        Swal.fire({
          icon: 'error', title: '⛔ Account Banned',
          text: 'This account has been permanently banned.',
          confirmButtonColor: '#ef4444'
        });
        isLoggingIn = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
        return;
      }

      // ✅ VERIFY ADMIN ROLE
      if (userData.role !== 'admin' && userData.isAdmin !== true) {
        await auth.signOut();
        Swal.fire({
          icon: 'error', title: 'Access Denied',
          text: 'This account does not have administrator privileges.',
          confirmButtonColor: '#ef4444'
        });
        isLoggingIn = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
        return;
      }

      // ✅ SUCCESS
      console.log('✅ Admin verified:', email);

      // Update last login
      db.collection('users').doc(uid).update({
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(() => {});

      await Swal.fire({
        icon: 'success',
        title: 'Welcome, Admin! 🛡️',
        html: '<p>Authentication successful</p><p style="color:#94a3b8;margin-top:4px;">Redirecting to admin dashboard...</p>',
        timer: 1500,
        showConfirmButton: false
      });

      window.location.href = 'admin-dashboard.html';

    } catch (err) {
      console.error('Login error:', err);

      const errorMessages = {
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-credential': 'Invalid email or password.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/invalid-email': 'Please enter a valid email.',
        'auth/too-many-requests': 'Too many attempts. Wait a moment.',
        'auth/network-request-failed': 'Network error. Check connection.'
      };

      Swal.fire({
        icon: 'error',
        title: 'Login Failed',
        text: errorMessages[err.code] || err.message || 'An error occurred.',
        confirmButtonColor: '#ef4444'
      });

      isLoggingIn = false;
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
    }
  });

  // ✅ AUTO-REDIRECT IF ALREADY LOGGED IN AS ADMIN
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      try {
        const snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists) {
          const data = snap.data();
          if ((data.role === 'admin' || data.isAdmin === true) && 
              !data.banned && !data.isBanned && data.status !== 'banned') {
            window.location.href = 'admin-dashboard.html';
          }
        }
      } catch (e) { /* stay on login page */ }
    }
  });

  // Prevent form resubmission
  if (window.history.replaceState) {
    window.history.replaceState(null, null, window.location.href);
  }

  console.log('✅ Admin login ready — Phase 2');
</script>
</body>
</html>
