<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Daily Check-In | TEXIS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #0a0f1e;
      --bg-card: rgba(15, 23, 42, 0.7);
      --border: rgba(255, 255, 255, 0.05);
      --text: #e2e8f0;
      --text-light: #94a3b8;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0f1e;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
        linear-gradient(145deg, #0f172a 0%, #020617 100%);
      min-height: 100vh;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background Blobs */
    .blob {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      animation: float 20s infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    .blob-1 {
      top: -100px;
      right: -100px;
      background: linear-gradient(145deg, #6366f1, #a855f7);
      animation-delay: -2s;
    }

    .blob-2 {
      bottom: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: linear-gradient(145deg, #ec4899, #f59e0b);
      animation-delay: -7s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 5%;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: white;
      transform: rotate(-5deg);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: white;
    }

    /* Main Content */
    .main-content {
      position: relative;
      z-index: 10;
      max-width: 500px;
      margin: 100px auto 60px;
      padding: 0 1.5rem;
    }

    /* Check-in Card */
    .checkin-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 2rem;
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Gift Icon */
    .gift-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border: 2px solid var(--primary);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .gift-icon i {
      font-size: 3.5rem;
      color: var(--primary);
    }

    /* Title */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .reward-amount {
      font-size: 3rem;
      font-weight: 800;
      color: var(--success);
      margin: 1rem 0;
    }

    .reward-amount small {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text-light);
    }

    /* Timer */
    .timer-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 30px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }

    .timer-label {
      color: var(--text-light);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .countdown {
      font-family: 'Space Grotesk', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--warning);
    }

    /* Check-in Button */
    .checkin-btn {
      width: 100%;
      padding: 1.2rem;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none;
      border-radius: 60px;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .checkin-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
    }

    .checkin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .checkin-btn.claimed {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    /* Streak Section */
    .streak-section {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 24px;
    }

    .streak-item {
      flex: 1;
      text-align: center;
    }

    .streak-item i {
      font-size: 1.5rem;
      color: var(--warning);
      margin-bottom: 0.3rem;
      display: block;
    }

    .streak-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
    }

    .streak-label {
      font-size: 0.75rem;
      color: var(--text-light);
    }

    /* Info Box */
    .info-box {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 20px;
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-light);
      text-align: left;
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }

    .info-box i {
      color: var(--primary);
      font-size: 1.2rem;
      margin-top: 0.1rem;
    }

    /* Loading */
    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(99, 102, 241, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .checkin-card {
        padding: 1.5rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .reward-amount {
        font-size: 2.5rem;
      }
      
      .countdown {
        font-size: 2rem;
      }
      
      .streak-number {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>

<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- Navbar -->
<header class="navbar">
  <div class="nav-container">
    <a href="dashboard.html" class="logo">
      <span class="logo-icon"><i class="fas fa-bolt"></i></span>
      <span class="logo-text">TEXIS</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="plans.html"><i class="fas fa-seedling"></i> Plans</a>
    </div>
  </div>
</header>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  <div class="loading-container">
    <div class="spinner"></div>
    <p>Loading check-in status...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc, 
  runTransaction,
  serverTimestamp,
  Timestamp 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const DAILY_REWARD = 50; // Naira

// Helper: Check if user has claimed today
function hasClaimedToday(lastClaimDate) {
  if (!lastClaimDate) return false;
  
  const lastClaim = lastClaimDate.toDate ? lastClaimDate.toDate() : new Date(lastClaimDate);
  const today = new Date();
  
  return lastClaim.getDate() === today.getDate() &&
         lastClaim.getMonth() === today.getMonth() &&
         lastClaim.getFullYear() === today.getFullYear();
}

// Helper: Get time until next reset (midnight)
function getTimeUntilMidnight() {
  const now = new Date();
  const midnight = new Date();
  midnight.setHours(24, 0, 0, 0); // Next midnight (12 AM)
  
  const diff = midnight - now;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  
  return { hours, minutes, seconds, total: diff };
}

// Format countdown
function formatCountdown(hours, minutes, seconds) {
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

// Render the check-in page
function renderPage(userId, userData, claimedToday, streak, lastClaimDate) {
  const container = document.getElementById("mainContent");
  const timeUntil = getTimeUntilMidnight();
  
  container.innerHTML = `
    <div class="checkin-card">
      <div class="gift-icon">
        <i class="fas fa-gift"></i>
      </div>
      
      <h1>Daily Check-In</h1>
      <p style="color: var(--text-light); margin-bottom: 0.5rem;">Claim your daily reward</p>
      
      <div class="reward-amount">
        ₦${DAILY_REWARD.toLocaleString()} <small>daily</small>
      </div>
      
      <!-- Streak Section -->
      <div class="streak-section">
        <div class="streak-item">
          <i class="fas fa-fire"></i>
          <div class="streak-number">${streak}</div>
          <div class="streak-label">Day Streak</div>
        </div>
        <div class="streak-item">
          <i class="fas fa-coins"></i>
          <div class="streak-number">₦${(streak * DAILY_REWARD).toLocaleString()}</div>
          <div class="streak-label">Total Earned</div>
        </div>
      </div>
      
      ${claimedToday ? `
        <div class="timer-section">
          <div class="timer-label">
            <i class="fas fa-clock"></i> Next check-in available in
          </div>
          <div class="countdown" id="countdownTimer">${formatCountdown(timeUntil.hours, timeUntil.minutes, timeUntil.seconds)}</div>
        </div>
        
        <button class="checkin-btn claimed" disabled>
          <i class="fas fa-check-circle"></i> Already Claimed Today
        </button>
      ` : `
        <button class="checkin-btn" id="claimBtn">
          <i class="fas fa-calendar-check"></i> Claim ₦${DAILY_REWARD}
        </button>
      `}
      
      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div>
          <strong>How it works</strong><br>
          Check in every day to earn ₦${DAILY_REWARD} directly to your wallet.<br>
          Your streak resets if you miss a day.<br>
          New check-in available every day at <strong>12:00 AM (midnight)</strong>.
        </div>
      </div>
    </div>
  `;
  
  // If claimed today, start countdown timer
  if (claimedToday) {
    startCountdownTimer();
  } else {
    // Attach claim event
    const claimBtn = document.getElementById("claimBtn");
    if (claimBtn) {
      claimBtn.addEventListener("click", () => claimReward(userId, userData, streak));
    }
  }
}

// Start countdown timer to midnight
let timerInterval = null;
function startCountdownTimer() {
  if (timerInterval) clearInterval(timerInterval);
  
  const timerElement = document.getElementById("countdownTimer");
  if (!timerElement) return;
  
  timerInterval = setInterval(() => {
    const timeUntil = getTimeUntilMidnight();
    timerElement.textContent = formatCountdown(timeUntil.hours, timeUntil.minutes, timeUntil.seconds);
    
    // If countdown reaches zero, refresh the page
    if (timeUntil.total <= 1000) {
      clearInterval(timerInterval);
      location.reload();
    }
  }, 1000);
}

// Claim reward
async function claimReward(userId, userData, currentStreak) {
  const claimBtn = document.getElementById("claimBtn");
  if (!claimBtn) return;
  
  // Disable button and show loading
  claimBtn.disabled = true;
  claimBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  
  try {
    const userRef = doc(db, "users", userId);
    const today = new Date();
    const todayStart = new Date(today);
    todayStart.setHours(0, 0, 0, 0);
    
    // Use transaction to ensure atomic operation
    await runTransaction(db, async (transaction) => {
      const userSnap = await transaction.get(userRef);
      if (!userSnap.exists()) {
        throw new Error("User not found");
      }
      
      const userDataSnapshot = userSnap.data();
      const lastCheckin = userDataSnapshot.lastCheckinDate;
      
      // Check if already claimed today (double-check)
      if (lastCheckin) {
        const lastDate = lastCheckin.toDate ? lastCheckin.toDate() : new Date(lastCheckin);
        if (lastDate.getDate() === today.getDate() &&
            lastDate.getMonth() === today.getMonth() &&
            lastDate.getFullYear() === today.getFullYear()) {
          throw new Error("Already claimed today");
        }
      }
      
      // Calculate new streak
      let newStreak = 1;
      if (lastCheckin) {
        const lastDate = lastCheckin.toDate ? lastCheckin.toDate() : new Date(lastCheckin);
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (lastDate.getDate() === yesterday.getDate() &&
            lastDate.getMonth() === yesterday.getMonth() &&
            lastDate.getFullYear() === yesterday.getFullYear()) {
          // Consecutive day, increase streak
          newStreak = (userDataSnapshot.checkinStreak || 0) + 1;
        } else {
          // Missed a day, reset streak to 1
          newStreak = 1;
        }
      }
      
      // Update wallet balance
      const currentBalance = userDataSnapshot.wallet || 0;
      const newBalance = currentBalance + DAILY_REWARD;
      
      // Update user document
      transaction.update(userRef, {
        wallet: newBalance,
        checkinStreak: newStreak,
        lastCheckinDate: Timestamp.now(),
        lastCheckinAmount: DAILY_REWARD,
        totalCheckinEarnings: (userDataSnapshot.totalCheckinEarnings || 0) + DAILY_REWARD
      });
      
      // Log check-in transaction
      const checkinLogRef = doc(db, `users/${userId}/checkinHistory`, `${today.toISOString().split('T')[0]}`);
      transaction.set(checkinLogRef, {
        date: Timestamp.now(),
        amount: DAILY_REWARD,
        streak: newStreak,
        type: "daily_checkin"
      });
    });
    
    // Success!
    Swal.fire({
      icon: "success",
      title: "🎉 Reward Claimed!",
      html: `
        <p style="font-size: 1.2rem; margin-bottom: 0.5rem">You received <strong style="color: #22c55e">₦${DAILY_REWARD}</strong></p>
        <p style="color: #94a3b8">Amount credited to your wallet</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem">Come back tomorrow for more!</p>
      `,
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#6366f1',
      timer: 3000,
      timerProgressBar: true
    });
    
    // Reload page to reflect new state
    setTimeout(() => {
      location.reload();
    }, 2500);
    
  } catch (error) {
    console.error("Claim error:", error);
    
    let errorMessage = "Unable to claim reward. Please try again.";
    if (error.message === "Already claimed today") {
      errorMessage = "You have already claimed your daily reward today!";
    }
    
    Swal.fire({
      icon: "error",
      title: "Claim Failed",
      text: errorMessage,
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#ef4444'
    });
    
    // Re-enable button
    claimBtn.disabled = false;
    claimBtn.innerHTML = '<i class="fas fa-calendar-check"></i> Claim ₦' + DAILY_REWARD;
  }
}

// Main auth and load function
onAuthStateChanged(auth, async (user) => {
  const container = document.getElementById("mainContent");
  
  if (!user) {
    // Redirect to login if not authenticated
    container.innerHTML = `
      <div class="checkin-card" style="text-align: center">
        <div class="gift-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h1>Login Required</h1>
        <p style="color: var(--text-light); margin: 1rem 0">Please login to access daily check-in rewards.</p>
        <a href="login.html" class="checkin-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem">
          <i class="fas fa-sign-in-alt"></i> Login Now
        </a>
      </div>
    `;
    return;
  }
  
  try {
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);
    
    if (!userSnap.exists()) {
      container.innerHTML = `
        <div class="checkin-card" style="text-align: center">
          <div class="gift-icon">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <h1>Account Error</h1>
          <p style="color: var(--text-light); margin: 1rem 0">User profile not found.</p>
          <a href="register.html" class="checkin-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem">
            Create Account
          </a>
        </div>
      `;
      return;
    }
    
    const userData = userSnap.data();
    const lastCheckinDate = userData.lastCheckinDate || null;
    const claimedToday = hasClaimedToday(lastCheckinDate);
    const streak = userData.checkinStreak || 0;
    
    renderPage(user.uid, userData, claimedToday, streak, lastCheckinDate);
    
  } catch (error) {
    console.error("Error loading check-in:", error);
    container.innerHTML = `
      <div class="checkin-card" style="text-align: center">
        <div class="gift-icon">
          <i class="fas fa-bug"></i>
        </div>
        <h1>Error Loading</h1>
        <p style="color: var(--text-light); margin: 1rem 0">${error.message || "Unable to load check-in status"}</p>
        <button onclick="location.reload()" class="checkin-btn" style="width: auto; padding: 0.8rem 2rem">
          <i class="fas fa-redo"></i> Retry
        </button>
      </div>
    `;
  }
});

// Cleanup timer on page unload
window.addEventListener("beforeunload", () => {
  if (timerInterval) clearInterval(timerInterval);
});
</script>

</body>
</html>
