    }

    :root {
      --primary: #00e5a0;

    .streak-number {

const DAILY_REWARD = 50; // Naira

// Helper: Check if user has claimed today
function hasClaimedToday(lastClaimDate) {
  if (!lastClaimDate) return false;
  
  const lastClaim = lastClaimDate.toDate ? lastClaimDate.toDate() : new Date(lastClaimDate);
  const today = new Date();
  
  return lastClaim.getDate() === today.getDate() &&
         lastClaim.getMonth() === today.getMonth() &&
         lastClaim.getFullYear() === today.getFullYear();
}

// Helper: Check if user has any active investment plan
async function hasActivePlan(userId) {
  try {
    const activePlansRef = collection(db, `users/${userId}/activePlans`);
    const plansSnap = await getDocs(activePlansRef);
    
    let hasActive = false;
    plansSnap.forEach(doc => {
      const plan = doc.data();
      if (plan.status === 'active' && plan.daysLeft > 0) {
        hasActive = true;
      }
    });
    return hasActive;
  } catch (error) {
    console.error("Error checking active plans:", error);
    return false;
  }
}

// Helper: Get time until next reset (midnight)
function getTimeUntilMidnight() {
  const now = new Date();
  const midnight = new Date();
  midnight.setHours(24, 0, 0, 0);
  
  const diff = midnight - now;
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  
  return { hours, minutes, seconds, total: diff };
}

// Format countdown
function formatCountdown(hours, minutes, seconds) {
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

// Render the check-in page (when user has active plan)
function renderCheckinPage(userId, userData, claimedToday, streak, lastClaimDate) {
  const container = document.getElementById("mainContent");
  const timeUntil = getTimeUntilMidnight();

// Start countdown timer to midnight
let timerInterval = null;
function startCountdownTimer() {
  if (timerInterval) clearInterval(timerInterval);
  
  const timerElement = document.getElementById("countdownTimer");
  if (!timerElement) return;
  
  timerInterval = setInterval(() => {
    const timeUntil = getTimeUntilMidnight();
    timerElement.textContent = formatCountdown(timeUntil.hours, timeUntil.minutes, timeUntil.seconds);
    
    // If countdown reaches zero, refresh the page
    if (timeUntil.total <= 1000) {
      clearInterval(timerInterval);
      location.reload();
    }
  }, 1000);
}

// Claim reward
async function claimReward(userId, userData) {
  const claimBtn = document.getElementById("claimBtn");
  if (!claimBtn) return;
  
  // Double-check active plan before claiming
  const hasActive = await hasActivePlan(userId);
  if (!hasActive) {
    Swal.fire({
      icon: "warning",
      title: "No Active Plan",
      html: `<p>You need an active investment plan to claim daily rewards.</p>
              <p style="margin-top: 0.5rem; color: #00e5a0;">Purchase a plan to unlock check-in rewards!</p>`,
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#00e5a0',
      confirmButtonText: 'View Plans'
    }).then(() => {
      window.location.href = 'plans.html';
    });
    return;
  }
  
  // Disable button and show loading
  claimBtn.disabled = true;
  claimBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  
  try {
    const userRef = doc(db, "users", userId);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    console.log("Starting claim process for user:", userId);
    
    // First, check if already claimed today (simple check)
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
      throw new Error("User not found");
    }
    
    const currentData = userSnap.data();
    const lastCheckin = currentData.lastCheckinDate;
    
    if (lastCheckin) {
      const lastDate = lastCheckin.toDate ? lastCheckin.toDate() : new Date(lastCheckin);
      if (lastDate.getDate() === today.getDate() &&
          lastDate.getMonth() === today.getMonth() &&
          lastDate.getFullYear() === today.getFullYear()) {
        throw new Error("Already claimed today");
      }
    }
    
    // Calculate new streak
    let newStreak = 1;
    if (lastCheckin) {
      const lastDate = lastCheckin.toDate ? lastCheckin.toDate() : new Date(lastCheckin);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      if (lastDate.getDate() === yesterday.getDate() &&
          lastDate.getMonth() === yesterday.getMonth() &&
          lastDate.getFullYear() === yesterday.getFullYear()) {
        newStreak = (currentData.checkinStreak || 0) + 1;
      }
    }
    
    // Update wallet
    const currentBalance = currentData.wallet || 0;
    const newBalance = currentBalance + DAILY_REWARD;
    const totalEarnings = (currentData.totalCheckinEarnings || 0) + DAILY_REWARD;
    
    await updateDoc(userRef, {
      wallet: newBalance,
      checkinStreak: newStreak,
      lastCheckinDate: Timestamp.now(),
      lastCheckinAmount: DAILY_REWARD,
      totalCheckinEarnings: totalEarnings
    });
    
    console.log("Update successful! New balance:", newBalance);
    
    // Log check-in transaction
    const todayStr = today.toISOString().split('T')[0];
    const checkinLogRef = doc(db, `users/${userId}/checkinHistory`, todayStr);
    await setDoc(checkinLogRef, {
      date: Timestamp.now(),
      amount: DAILY_REWARD,
      streak: newStreak,
      type: "daily_checkin"
    }).catch(err => console.log("Log error (non-critical):", err));
    
    // Success!
    Swal.fire({
      icon: "success",
      title: "🎉 Reward Claimed!",
      html: `
        <p style="font-size: 1.2rem; margin-bottom: 0.5rem">You received <strong style="color: #00e5a0">₦${DAILY_REWARD}</strong></p>
        <p style="color: #94a3b8">Amount credited to your wallet</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem">Come back tomorrow for more!</p>
      `,
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#00e5a0',
      timer: 3000,
      timerProgressBar: true
    });
    
    // Reload page to reflect new state
    setTimeout(() => {
      location.reload();
    }, 2500);
    
  } catch (error) {
    console.error("Claim error details:", error);
    
    let errorMessage = "Unable to claim reward. Please try again.";
    if (error.message === "Already claimed today") {
      errorMessage = "You have already claimed your daily reward today!";
    } else if (error.code === "permission-denied") {
      errorMessage = "Permission denied. Please check Firestore rules.";
    } else if (error.code === "unavailable") {
      errorMessage = "Service unavailable. Please check your internet connection.";
    }
    
    Swal.fire({
      icon: "error",
      title: "Claim Failed",
      text: errorMessage,
      background: '#0f172a',
      color: '#e2e8f0',
      confirmButtonColor: '#ef4444'
    });
    
    // Re-enable button
    claimBtn.disabled = false;
    claimBtn.innerHTML = '<i class="fas fa-calendar-check"></i> Claim ₦' + DAILY_REWARD;
  }
}

// Helper for setDoc
async function setDoc(docRef, data) {
  const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js");
  return setDoc(docRef, data);
}

// Main auth and load function
onAuthStateChanged(auth, async (user) => {
  const container = document.getElementById("mainContent");
  
  if (!user) {
    container.innerHTML = `
      <div class="checkin-card" style="text-align: center">
        <div class="gift-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h1>Login Required</h1>
        <p style="color: var(--text-light); margin: 1rem 0">Please login to access daily check-in rewards.</p>
        <a href="login.html" class="checkin-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem">
          <i class="fas fa-sign-in-alt"></i> Login Now
        </a>
      </div>
    `;
    return;
  }
  
  try {
    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);
    
    if (!userSnap.exists()) {
      container.innerHTML = `
        <div class="checkin-card" style="text-align: center">
          <div class="gift-icon">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <h1>Account Error</h1>
          <p style="color: var(--text-light); margin: 1rem 0">User profile not found. Please complete registration.</p>
          <a href="register.html" class="checkin-btn" style="text-decoration: none; display: inline-block; width: auto; padding: 0.8rem 2rem">
            Complete Registration
          </a>
        </div>
      `;
      return;
    }
    
    const userData = userSnap.data();
    
    // CHECK IF USER HAS ACTIVE PLAN
    const hasActive = await hasActivePlan(user.uid);
    
    if (!hasActive) {
      renderNoActivePlanPage();
      return;
    }
    
    const lastCheckinDate = userData.lastCheckinDate || null;
    const claimedToday = hasClaimedToday(lastCheckinDate);
    const streak = userData.checkinStreak || 0;
    
    renderCheckinPage(user.uid, userData, claimedToday, streak, lastCheckinDate);
    
  } catch (error) {
    console.error("Error loading check-in:", error);
    container.innerHTML = `
      <div class="checkin-card" style="text-align: center">
        <div class="gift-icon">
          <i class="fas fa-bug"></i>
        </div>
        <h1>Error Loading</h1>
        <p style="color: var(--text-light); margin: 1rem 0">${error.message || "Unable to load check-in status"}</p>
        <button onclick="location.reload()" class="checkin-btn" style="width: auto; padding: 0.8rem 2rem">
          <i class="fas fa-redo"></i> Retry
        </button>
      </div>
    `;
  }
});

// Cleanup timer on page unload
window.addEventListener("beforeunload", () => {
  if (timerInterval) clearInterval(timerInterval);
});
</script>

</body>
</html>
