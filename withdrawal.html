<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw Funds | CashBridge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --bg:#020617;
      --card:#0f172a;
      --text:#e2e8f0;
      --text-light:#94a3b8;
      --primary:#22c55e;
      --accent:#38bdf8;
      --danger:#ef4444;
      --warning:#eab308;
      --border:rgba(34,197,94,0.18);
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{
      background:linear-gradient(to bottom,#020617,#0a0f1e);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .container{
      background:var(--card);
      padding:3rem 2.5rem;
      border-radius:28px;
      width:100%;
      max-width:600px;
      box-shadow:0 25px 70px rgba(0,0,0,.7);
      border:1px solid var(--border);
    }
    h1{
      font-family:'Playfair Display',serif;
      color:var(--primary);
      text-align:center;
      margin-bottom:1.5rem;
    }
    .balance-display{
      background:rgba(34,197,94,.1);
      border:2px solid var(--primary);
      border-radius:16px;
      padding:1.5rem;
      text-align:center;
      margin-bottom:1.5rem;
    }
    .balance-amount{
      font-size:2.3rem;
      font-weight:700;
      color:var(--primary);
    }
    .form-group{margin-bottom:1.3rem}
    label{display:block;margin-bottom:.4rem;color:var(--text-light);font-weight:500}
    input{
      width:100%;
      padding:1rem;
      border-radius:12px;
      border:1px solid var(--border);
      background:#020617;
      color:var(--text);
      font-size:1rem;
    }
    input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(34,197,94,0.1)}
    .btn{
      width:100%;
      padding:1.2rem;
      border:none;
      border-radius:12px;
      font-size:1.1rem;
      font-weight:700;
      cursor:pointer;
      margin-top:1rem;
      transition:all 0.3s ease;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),#16a34a);
      color:#000;
    }
    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(34,197,94,0.3);
    }
    .btn-primary:disabled{
      background:#64748b;
      cursor:not-allowed;
      opacity:0.6;
      transform:none;
    }
    .back-link{
      display:block;
      text-align:center;
      margin-top:1.5rem;
      color:var(--accent);
      text-decoration:none;
      font-weight:600;
      transition:color 0.3s ease;
    }
    .back-link:hover{color:var(--primary)}
    .fee-info{
      background:rgba(234,179,8,.1);
      border:1px solid var(--warning);
      border-radius:12px;
      padding:1rem;
      margin:1rem 0;
      font-size:.9rem;
    }
    .fee-info div{
      display:flex;
      justify-content:space-between;
      margin:.3rem 0;
    }
    .disabled-notice{
      background:rgba(239,68,68,.1);
      border:2px solid var(--danger);
      border-radius:16px;
      padding:2rem;
      text-align:center;
      margin:2rem 0;
    }
    .disabled-notice h2{
      color:var(--danger);
      margin-bottom:1rem;
    }
    .disabled-notice p{
      color:var(--text-light);
      line-height:1.8;
    }
    .loading{
      text-align:center;
      color:var(--primary);
    }
    .spinner{
      display:inline-block;
      width:40px;
      height:40px;
      border:4px solid rgba(34,197,94,0.2);
      border-top-color:var(--primary);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:1rem;
    }
    @keyframes spin{
      to{transform:rotate(360deg)}
    }
  </style>
</head>

<body>

<div class="container" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <h1>Loading...</h1>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  getDocs,
  runTransaction,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const MIN_WITHDRAWAL = 1000;
const FEE_PERCENT = 10;

onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";

  const container = document.getElementById("mainContent");

  try {
    // Check if withdrawal system is enabled
    let withdrawalEnabled = true;
    try {
      const settingsDoc = await getDoc(doc(db, 'settings', 'withdrawalSystem'));
      withdrawalEnabled = settingsDoc.exists() ? (settingsDoc.data().enabled !== false) : true;
    } catch (err) {
      console.log('Settings check skipped:', err.message);
      withdrawalEnabled = true; // Default to enabled if settings don't exist
    }

    if (!withdrawalEnabled) {
      container.innerHTML = `
        <h1>Withdrawals Temporarily Disabled</h1>
        <div class="disabled-notice">
          <h2><i class="fas fa-exclamation-triangle"></i> Withdrawal Closed</h2>
          <p>Withdrawals are currently temporarily closed by the administrator. Kindly check back later.</p>
          <p style="margin-top:1rem">Please note that withdrawals are not processed on weekends (Saturdays and Sundays).</p>
          <p style="margin-top:0.5rem"><b>Withdrawal hours:</b><br>🕘 9:00 AM – 5:00 PM (Monday to Friday)</p>
          <p style="margin-top:1rem">Thank you for choosing CASHBRIDGE.</p>
        </div>
        <a class="back-link" href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      `;
      return;
    }

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
      throw new Error("User profile not found. Please contact support.");
    }

    const userData = userSnap.data();
    const balance = Number(userData.wallet || 0);

    // FIXED: Check for active investment plans
    const plansSnap = await getDocs(collection(db, `users/${user.uid}/activePlans`));
    let hasActivePlan = false;
    
    plansSnap.forEach(planDoc => {
      const planData = planDoc.data();
      // Check if plan status is 'active' (NOT cancelled or completed)
      if (planData.status === 'active') {
        hasActivePlan = true;
      }
    });

    if (!hasActivePlan) {
      container.innerHTML = `
        <h1>Withdrawal Locked</h1>
        <div style="text-align:center;padding:2rem">
          <i class="fas fa-lock" style="font-size:4rem;color:var(--warning);margin-bottom:1rem"></i>
          <p style="color:var(--text-light);margin:1rem 0;line-height:1.8">
            You must have an <b style="color:var(--primary)">active investment plan</b> to withdraw funds.
          </p>
          <p style="color:var(--text-light);font-size:0.9rem;margin-top:1rem">
            Start investing today to unlock withdrawal privileges!
          </p>
        </div>
        <button class="btn btn-primary" onclick="location.href='plans.html'">
          <i class="fas fa-chart-line"></i> View Investment Plans
        </button>
        <a class="back-link" href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      `;
      return;
    }

    container.innerHTML = `
      <h1><i class="fas fa-money-bill-wave"></i> Withdraw Funds</h1>

      <div class="balance-display">
        <div style="font-size:0.9rem;color:var(--text-light);margin-bottom:0.5rem">Available Balance</div>
        <div class="balance-amount">₦${balance.toLocaleString()}</div>
      </div>

      <form id="withdrawForm">
        <div class="form-group">
          <label><i class="fas fa-wallet"></i> Withdrawal Amount (Min: ₦${MIN_WITHDRAWAL.toLocaleString()})</label>
          <input type="number" id="amount" min="${MIN_WITHDRAWAL}" max="${balance}" placeholder="Enter amount" required>
        </div>

        <div class="fee-info" id="feeInfo" style="display:none">
          <div><span>Amount:</span><span id="amtDisplay">₦0</span></div>
          <div><span>Fee (${FEE_PERCENT}%):</span><span id="feeDisplay">₦0</span></div>
          <div style="border-top:1px solid var(--warning);padding-top:.5rem;margin-top:.5rem;font-weight:700">
            <span>You'll Receive:</span><span id="finalDisplay" style="color:var(--primary)">₦0</span>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-university"></i> Bank Name</label>
          <input type="text" id="bankName" placeholder="e.g. GTBank, Access Bank" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-user"></i> Account Name</label>
          <input type="text" id="accountName" placeholder="Full name as on bank account" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-credit-card"></i> Account Number</label>
          <input type="text" id="accountNumber" maxlength="10" pattern="[0-9]{10}" placeholder="10-digit account number" required>
        </div>

        <button class="btn btn-primary" type="submit">
          <i class="fas fa-paper-plane"></i> Submit Withdrawal Request
        </button>
      </form>

      <a class="back-link" href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    `;

    const amtInput = document.getElementById("amount");
    const feeInfo = document.getElementById("feeInfo");
    
    amtInput.addEventListener("input", () => {
      const amt = Number(amtInput.value);
      if (amt >= MIN_WITHDRAWAL) {
        const fee = Math.floor(amt * (FEE_PERCENT / 100));
        const final = amt - fee;
        document.getElementById("amtDisplay").textContent = `₦${amt.toLocaleString()}`;
        document.getElementById("feeDisplay").textContent = `₦${fee.toLocaleString()}`;
        document.getElementById("finalDisplay").textContent = `₦${final.toLocaleString()}`;
        feeInfo.style.display = "block";
      } else {
        feeInfo.style.display = "none";
      }
    });

    document.getElementById("withdrawForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const amount = Number(document.getElementById("amount").value);
      const bankName = document.getElementById("bankName").value.trim();
      const accountName = document.getElementById("accountName").value.trim();
      const accountNumber = document.getElementById("accountNumber").value.trim();

      // Validation
      if (amount < MIN_WITHDRAWAL) {
        return Swal.fire("Invalid Amount", `Minimum withdrawal is ₦${MIN_WITHDRAWAL.toLocaleString()}`, "warning");
      }

      if (amount > balance) {
        return Swal.fire("Insufficient Balance", `You only have ₦${balance.toLocaleString()} available`, "warning");
      }

      if (accountNumber.length !== 10 || !/^\d+$/.test(accountNumber)) {
        return Swal.fire("Invalid Account", "Account number must be exactly 10 digits", "warning");
      }

      if (!bankName || !accountName) {
        return Swal.fire("Missing Information", "Please fill in all bank details", "warning");
      }

      const fee = Math.floor(amount * (FEE_PERCENT / 100));
      const finalAmount = amount - fee;
      const withdrawalId = `WTH_${Date.now()}`;

      const result = await Swal.fire({
        title: 'Confirm Withdrawal',
        html: `
          <div style="text-align:left;line-height:2;padding:1rem">
            <p><b>Amount:</b> ₦${amount.toLocaleString()}</p>
            <p><b>Fee (${FEE_PERCENT}%):</b> ₦${fee.toLocaleString()}</p>
            <p style="color:var(--primary);font-size:1.1rem"><b>You'll Receive:</b> ₦${finalAmount.toLocaleString()}</p>
            <hr style="margin:1rem 0;border:none;border-top:1px solid #334155">
            <p><b>Bank:</b> ${bankName}</p>
            <p><b>Account Name:</b> ${accountName}</p>
            <p><b>Account Number:</b> ${accountNumber}</p>
            <hr style="margin:1rem 0;border:none;border-top:1px solid #334155">
            <p style="color:#eab308;font-size:0.9rem"><i class="fas fa-exclamation-triangle"></i> <b>Important:</b> Funds will be deducted from your wallet immediately</p>
          </div>
        `,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Yes, Submit Request',
        cancelButtonText: 'Cancel',
        confirmButtonColor: '#22c55e',
        cancelButtonColor: '#64748b',
        width: 600
      });

      if (!result.isConfirmed) return;

      try {
        Swal.fire({
          title: 'Processing Withdrawal...',
          html: '<p>Please wait while we submit your request</p>',
          allowOutsideClick: false,
          didOpen: () => Swal.showLoading()
        });

        await runTransaction(db, async (tx) => {
          const snap = await tx.get(userRef);
          const currentBalance = snap.data().wallet || 0;
          
          if (currentBalance < amount) {
            throw new Error("Insufficient balance. Please refresh and try again.");
          }

          // Deduct funds immediately when request is made
          tx.update(userRef, {
            wallet: currentBalance - amount
          });

          const withdrawalData = {
            withdrawalId,
            userId: user.uid,
            username: userData.fullName || 'User',
            userEmail: userData.email || '',
            amount,
            fee,
            amountAfterFee: finalAmount,
            bankName,
            accountName,
            accountNumber,
            status: "pending",
            createdAt: serverTimestamp()
          };

          tx.set(doc(db, `users/${user.uid}/withdrawals`, withdrawalId), withdrawalData);
        });

        await Swal.fire({
          icon: 'success',
          title: 'Withdrawal Submitted!',
          html: `
            <p>Your withdrawal request of <b style="color:#22c55e">₦${finalAmount.toLocaleString()}</b> has been submitted successfully.</p>
            <p style="margin-top:1rem;color:#94a3b8;font-size:0.9rem">
              <i class="fas fa-clock"></i> Awaiting admin approval. You'll be notified once processed.
            </p>
          `,
          confirmButtonColor: '#22c55e'
        });
        
        location.href = "dashboard.html";

      } catch (err) {
        console.error('Withdrawal error:', err);
        Swal.fire({
          icon: 'error',
          title: 'Withdrawal Failed',
          text: err.message || 'An error occurred. Please try again.',
          confirmButtonColor: '#ef4444'
        });
      }
    });

  } catch (err) {
    console.error('Page load error:', err);
    container.innerHTML = `
      <h1>Error Loading Page</h1>
      <div style="text-align:center;padding:2rem">
        <i class="fas fa-exclamation-triangle" style="font-size:4rem;color:var(--danger);margin-bottom:1rem"></i>
        <p style="color:var(--text-light);line-height:1.8">
          ${err.message || 'Unable to load withdrawal page. Please try again.'}
        </p>
        <p style="color:var(--text-light);font-size:0.9rem;margin-top:1rem">
          Error details: ${err.toString()}
        </p>
      </div>
      <button class="btn btn-primary" onclick="location.reload()">
        <i class="fas fa-redo"></i> Retry
      </button>
      <a class="back-link" href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    `;
  }
});
</script>

</body>
</html>
