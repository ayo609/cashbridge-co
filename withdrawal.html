<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw Funds | Texis</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #050811;
      background-image: 
        radial-gradient(circle at 15% 25%, rgba(0, 229, 160, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(56, 189, 248, 0.1) 0%, transparent 45%),
        linear-gradient(145deg, #0a0f1f 0%, #030617 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* Animated Background Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.3;
      animation: floatOrb 22s infinite alternate ease-in-out;
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; top: -120px; right: -100px; background: radial-gradient(circle, #00e5a0, #38bdf8); }
    .orb-2 { width: 550px; height: 550px; bottom: -120px; left: -120px; background: radial-gradient(circle, #38bdf8, #818cf8); animation-delay: -6s; }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.12); }
    }

    /* Main Container */
    .withdraw-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 550px;
      background: rgba(12, 18, 32, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 229, 160, 0.12);
      border-radius: 36px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #00e5a0;
      color: #000;
      transform: translateX(-3px);
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Balance Card */
    .balance-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(0, 229, 160, 0.15);
      border-radius: 24px;
      padding: 1.8rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .balance-label {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .balance-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00e5a0, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-weight: 500;
    }

    label i {
      color: #00e5a0;
      margin-right: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #00e5a0;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 1rem 1rem 1rem 2.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      color: white;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #00e5a0;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(0, 229, 160, 0.15);
    }

    input::placeholder {
      color: #475569;
    }

    /* Fee Info */
    .fee-info {
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      padding: 1.2rem;
      margin: 1.5rem 0;
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .fee-row.total {
      border-top: 1px solid rgba(245, 158, 11, 0.2);
      margin-top: 0.5rem;
      padding-top: 1rem;
      color: white;
      font-weight: 700;
    }

    .fee-row.total span:last-child {
      color: #22c55e;
      font-size: 1.1rem;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #00e5a0, #38bdf8);
      border: none;
      border-radius: 20px;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(0, 229, 160, 0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Disabled/Error Card */
    .disabled-card, .error-card {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      margin: 2rem 0;
    }

    .disabled-icon {
      width: 60px;
      height: 60px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #ef4444;
      margin: 0 auto 1rem;
    }

    .disabled-card h2, .error-card h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    .disabled-card p, .error-card p {
      color: #94a3b8;
      line-height: 1.6;
    }

    /* Window Banner */
    .window-banner {
      background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(0,229,160,0.08));
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 18px;
      padding: 1rem 1.3rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .window-banner.closed {
      background: rgba(239,68,68,0.05);
      border-color: rgba(239,68,68,0.25);
    }

    .window-banner.closed .window-banner-icon { color: #ef4444; }
    .window-banner:not(.closed) .window-banner-icon { color: #22c55e; }

    .window-banner-text strong {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.15rem;
    }

    .window-banner.closed .window-banner-text strong { color: #ef4444; }
    .window-banner:not(.closed) .window-banner-text strong { color: #22c55e; }

    .window-banner-text span {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .live-clock {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.95rem;
      font-weight: 600;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      flex-shrink: 0;
    }

    /* Daily Limit Tracker */
    .limit-tracker {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 1.1rem 1.3rem;
      margin-bottom: 1.5rem;
    }

    .limit-tracker-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.7rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .limit-tracker-header strong { color: #e2e8f0; font-size: 0.88rem; }

    .limit-slots {
      display: flex;
      gap: 0.6rem;
    }

    .limit-slot {
      flex: 1;
      height: 8px;
      border-radius: 30px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .limit-slot.used {
      background: linear-gradient(135deg, #00e5a0, #38bdf8);
    }

    .limit-slot.available {
      background: rgba(34,197,94,0.25);
      border: 1px solid rgba(34,197,94,0.4);
    }

    .limit-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.5rem;
      text-align: right;
    }

    /* Loading */
    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 229, 160, 0.1);
      border-top-color: #00e5a0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .retry-btn {
      background: transparent;
      border: 1px solid #00e5a0;
      color: #00e5a0;
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .retry-btn:hover {
      background: #00e5a0;
      color: #000;
    }

    @media (max-width: 600px) {
      .withdraw-container { padding: 1.8rem; }
      .balance-amount { font-size: 2rem; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="withdraw-container" id="mainContent">
    <div class="loading-container">
      <div class="spinner"></div>
      <p style="color:#94a3b8">Loading withdrawal page...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, collection, getDocs, query, where,
      runTransaction, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
      authDomain: "texis-invest.firebaseapp.com",
      projectId: "cashbridge-a688e",
      storageBucket: "cashbridge-a688e.firebasestorage.app",
      messagingSenderId: "345273765518",
      appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // CONSTANTS
    const MIN_WITHDRAWAL = 1000;
    const FEE_PERCENT = 15;
    const MAX_DAILY = 2;

    const formatMoney = (n) => "₦" + Number(n || 0).toLocaleString();

    // ─── HELPER FUNCTIONS ─────────────────────────────────────
    function isSunday() {
      return new Date().getDay() === 0;
    }

    function isWithinWindow() {
      if (isSunday()) return false;
      const h = new Date().getHours();
      return h >= 8 && h < 17;
    }

    function getDayName() {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      return days[new Date().getDay()];
    }

    function getTimeUntilOpen() {
      const now = new Date();
      let open = new Date();
      open.setHours(8, 0, 0, 0);
      if (now >= open || isSunday()) open.setDate(open.getDate() + 1);
      const diff = open - now;
      const hh = Math.floor(diff / 3600000);
      const mm = Math.floor((diff % 3600000) / 60000);
      const ss = Math.floor((diff % 60000) / 1000);
      return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    function startClock(elementId) {
      function tick() {
        const el = document.getElementById(elementId);
        if (!el) return;
        const now = new Date();
        el.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      }
      tick();
      return setInterval(tick, 1000);
    }

    async function countTodayWithdrawals(userId) {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const end = new Date();
      end.setHours(23, 59, 59, 999);
      const q = query(
        collection(db, `users/${userId}/withdrawals`),
        where('createdAt', '>=', Timestamp.fromDate(start)),
        where('createdAt', '<=', Timestamp.fromDate(end))
      );
      const snap = await getDocs(q);
      return snap.size;
    }

    async function hasValidActivePlan(userId) {
      const plansSnap = await getDocs(collection(db, `users/${userId}/activePlans`));
      let hasActive = false;
      plansSnap.forEach(doc => {
        const data = doc.data();
        if (data.status === 'active' && data.daysLeft > 0) hasActive = true;
      });
      return hasActive;
    }

    // ─── MAIN AUTH FLOW ──────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }

      const container = document.getElementById("mainContent");

      try {
        // 1 ── Admin kill-switch
        let withdrawalEnabled = true;
        try {
          const settingsDoc = await getDoc(doc(db, 'settings', 'withdrawalSystem'));
          if (settingsDoc.exists()) withdrawalEnabled = settingsDoc.data().enabled !== false;
        } catch (_) {}

        if (!withdrawalEnabled) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdrawals Disabled</h1></div>
            <div class="disabled-card"><div class="disabled-icon"><i class="fas fa-exclamation-triangle"></i></div><h2>Withdrawals Temporarily Closed</h2><p>Withdrawals have been disabled by the administrator.</p></div>
            <button class="btn" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
          `;
          return;
        }

        // 2 ── SUNDAY CHECK (NO WITHDRAWALS)
        if (isSunday()) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdrawals Closed</h1></div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-calendar-times"></i></div>
              <h2>No Withdrawals on Sunday</h2>
              <p>Withdrawals are only processed from <strong style="color:#e2e8f0">Monday to Saturday</strong>.</p>
              <p style="margin-top:0.8rem">Please come back tomorrow during business hours (8:00 AM – 5:00 PM).</p>
              <div style="margin-top:1.5rem;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);border-radius:16px;padding:1rem;">
                <div style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem;">Withdrawals resume</div>
                <div style="font-family:'Space Grotesk',monospace;font-size:1.2rem;font-weight:700;color:#00e5a0">Monday at 8:00 AM</div>
              </div>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
          `;
          return;
        }

        // 3 ── TIME WINDOW CHECK (Monday–Saturday, 8AM–5PM)
        if (!isWithinWindow()) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdrawals Closed</h1></div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-clock"></i></div>
              <h2>Outside Withdrawal Hours</h2>
              <p>Withdrawals are only processed between <strong style="color:#e2e8f0">8:00 AM – 5:00 PM</strong> (Monday–Saturday).</p>
              <div style="margin-top:1.5rem;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);border-radius:16px;padding:1rem;">
                <div style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem;">Window opens in</div>
                <div id="countdownTimer" style="font-family:'Space Grotesk',monospace;font-size:2rem;font-weight:700;background:linear-gradient(135deg,#00e5a0,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">--:--:--</div>
              </div>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
          `;
          const interval = setInterval(() => {
            const el = document.getElementById('countdownTimer');
            if (el) el.textContent = getTimeUntilOpen();
            else clearInterval(interval);
          }, 1000);
          return;
        }

        // 4 ── FETCH USER DATA
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) throw new Error("User profile not found");
        const userData = userSnap.data();
        const balance = Number(userData.wallet || 0);

        // 5 ── ACTIVE PLAN CHECK
        const hasActivePlan = await hasValidActivePlan(user.uid);
        if (!hasActivePlan) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdrawal Locked</h1></div>
            <div class="disabled-card">
              <div class="disabled-icon" style="background:rgba(245,158,11,0.1);color:#f59e0b"><i class="fas fa-lock"></i></div>
              <h2 style="color:#f59e0b">Active Investment Required</h2>
              <p>You must have an active investment plan to withdraw funds.</p>
              <p style="margin-top:1rem">Purchase an investment plan to unlock withdrawals!</p>
            </div>
            <button class="btn" onclick="location.href='plans.html'"><i class="fas fa-rocket"></i> View Investment Plans</button>
          `;
          return;
        }

        // 6 ── DAILY LIMIT CHECK
        const todayCount = await countTodayWithdrawals(user.uid);
        const slotsLeft = MAX_DAILY - todayCount;

        if (slotsLeft <= 0) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Daily Limit Reached</h1></div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-ban"></i></div>
              <h2>2 Withdrawals Used Today</h2>
              <p>You have reached the maximum of <strong>2 withdrawals per day</strong>.</p>
              <p style="margin-top:0.8rem">Your limit resets at midnight. Come back tomorrow!</p>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
          `;
          return;
        }

        // 7 ── MINIMUM BALANCE CHECK
        if (balance < MIN_WITHDRAWAL) {
          container.innerHTML = `
            <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Insufficient Balance</h1></div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-wallet"></i></div>
              <h2 style="color:#f59e0b">Minimum: ${formatMoney(MIN_WITHDRAWAL)}</h2>
              <p>Your current balance is ${formatMoney(balance)}</p>
              <p style="margin-top:0.8rem">You need at least ${formatMoney(MIN_WITHDRAWAL)} to withdraw.</p>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
          `;
          return;
        }

        // 8 ── RENDER WITHDRAWAL FORM
        container.innerHTML = `
          <div class="header"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdraw Funds</h1></div>
          <div class="window-banner">
            <span class="window-banner-icon"><i class="fas fa-circle-check"></i></span>
            <div class="window-banner-text">
              <strong>Withdrawal Window Open</strong>
              <span>Monday–Saturday, 8AM–5PM</span>
            </div>
            <div class="live-clock" id="liveClock">--:--:--</div>
          </div>
          <div class="limit-tracker">
            <div class="limit-tracker-header">
              <strong><i class="fas fa-layer-group" style="color:#00e5a0;margin-right:0.4rem"></i>Daily Withdrawals</strong>
              <span style="color:#22c55e">${todayCount} used · ${slotsLeft} left</span>
            </div>
            <div class="limit-slots">
              <div class="limit-slot ${todayCount >= 1 ? 'used' : 'available'}"></div>
              <div class="limit-slot ${todayCount >= 2 ? 'used' : 'available'}"></div>
            </div>
            <div class="limit-label">Max 2 per day · Resets at midnight</div>
          </div>
          <div class="balance-card"><div class="balance-label">Available Balance</div><div class="balance-amount">${formatMoney(balance)}</div></div>
          <form id="withdrawForm">
            <div class="form-group">
              <label><i class="fas fa-coins"></i> Withdrawal Amount</label>
              <div class="input-wrapper">
                <i class="fas fa-naira-sign input-icon"></i>
                <input type="number" id="amount" min="${MIN_WITHDRAWAL}" max="${balance}" placeholder="Min: ₦${MIN_WITHDRAWAL.toLocaleString()}" required>
              </div>
            </div>
            <div class="fee-info" id="feeInfo" style="display:none">
              <div class="fee-row"><span>Withdrawal Amount</span><span id="amtDisplay">₦0</span></div>
              <div class="fee-row"><span>Processing Fee (${FEE_PERCENT}%)</span><span id="feeDisplay">₦0</span></div>
              <div class="fee-row total"><span>You'll Receive</span><span id="finalDisplay">₦0</span></div>
            </div>
            <div class="form-group">
              <label><i class="fas fa-university"></i> Bank Name</label>
              <div class="input-wrapper"><i class="fas fa-building input-icon"></i><input type="text" id="bankName" placeholder="e.g., GTBank, Access Bank" required></div>
            </div>
            <div class="form-group">
              <label><i class="fas fa-user"></i> Account Name</label>
              <div class="input-wrapper"><i class="fas fa-signature input-icon"></i><input type="text" id="accountName" placeholder="Full name on account" required></div>
            </div>
            <div class="form-group">
              <label><i class="fas fa-credit-card"></i> Account Number</label>
              <div class="input-wrapper"><i class="fas fa-hashtag input-icon"></i><input type="text" id="accountNumber" maxlength="10" pattern="[0-9]{10}" placeholder="10-digit account number" required></div>
            </div>
            <button class="btn" type="submit"><i class="fas fa-paper-plane"></i> Submit Withdrawal</button>
          </form>
        `;

        startClock('liveClock');

        const amtInput = document.getElementById("amount");
        const feeInfo = document.getElementById("feeInfo");

        amtInput.addEventListener("input", () => {
          const amt = Number(amtInput.value);
          if (amt >= MIN_WITHDRAWAL && amt <= balance) {
            const fee = Math.floor(amt * (FEE_PERCENT / 100));
            const finalAmt = amt - fee;
            document.getElementById("amtDisplay").textContent = formatMoney(amt);
            document.getElementById("feeDisplay").textContent = formatMoney(fee);
            document.getElementById("finalDisplay").textContent = formatMoney(finalAmt);
            feeInfo.style.display = "block";
          } else {
            feeInfo.style.display = "none";
          }
        });

        document.getElementById("withdrawForm").addEventListener("submit", async (e) => {
          e.preventDefault();

          const amount = Number(document.getElementById("amount").value);
          const bankName = document.getElementById("bankName").value.trim();
          const accountName = document.getElementById("accountName").value.trim();
          const accountNumber = document.getElementById("accountNumber").value.trim();

          // RE-VALIDATE ALL RULES
          if (isSunday()) {
            return Swal.fire({ icon: 'warning', title: 'Sunday Closed', text: 'Withdrawals are not available on Sundays.', background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }
          if (!isWithinWindow()) {
            return Swal.fire({ icon: 'warning', title: 'Window Closed', text: 'Withdrawals are only allowed Mon–Sat, 8AM–5PM.', background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }

          const currentCount = await countTodayWithdrawals(user.uid);
          if (currentCount >= MAX_DAILY) {
            return Swal.fire({ icon: 'warning', title: 'Daily Limit Reached', text: `You have already made ${MAX_DAILY} withdrawals today.`, background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }

          if (!(await hasValidActivePlan(user.uid))) {
            return Swal.fire({ icon: 'warning', title: 'Active Plan Required', text: 'Your investment plan has expired. Please invest again to withdraw.', background: '#0f172a', confirmButtonColor: '#f59e0b' });
          }

          if (amount < MIN_WITHDRAWAL) {
            return Swal.fire({ icon: 'warning', title: 'Amount Too Low', text: `Minimum withdrawal is ${formatMoney(MIN_WITHDRAWAL)}`, background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }
          if (amount > balance) {
            return Swal.fire({ icon: 'warning', title: 'Insufficient Balance', text: `You only have ${formatMoney(balance)}`, background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }
          if (accountNumber.length !== 10 || !/^\d+$/.test(accountNumber)) {
            return Swal.fire({ icon: 'warning', title: 'Invalid Account', text: 'Account number must be exactly 10 digits.', background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }
          if (!bankName || !accountName) {
            return Swal.fire({ icon: 'warning', title: 'Missing Info', text: 'Please fill in all bank details.', background: '#0f172a', confirmButtonColor: '#00e5a0' });
          }

          const fee = Math.floor(amount * (FEE_PERCENT / 100));
          const finalAmount = amount - fee;
          const withdrawalId = `WTH_${Date.now()}`;

          const confirm = await Swal.fire({
            title: 'Confirm Withdrawal',
            html: `<div style="background:rgba(0,229,160,0.08);border-radius:16px;padding:1rem;margin-bottom:1rem">
                    <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>Amount:</span><span>${formatMoney(amount)}</span></div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>Fee (${FEE_PERCENT}%):</span><span style="color:#f59e0b">${formatMoney(fee)}</span></div>
                    <div style="display:flex;justify-content:space-between;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.1)"><span>You receive:</span><span style="color:#22c55e;font-weight:700">${formatMoney(finalAmount)}</span></div>
                   </div>
                   <div style="background:rgba(0,229,160,0.08);border-radius:16px;padding:1rem;text-align:left">
                    <div><i class="fas fa-university"></i> ${bankName}</div>
                    <div><i class="fas fa-user"></i> ${accountName} | ${accountNumber}</div>
                   </div>`,
            icon: 'question', showCancelButton: true, confirmButtonText: 'Submit', cancelButtonText: 'Cancel',
            confirmButtonColor: '#00e5a0', background: '#0f172a', color: '#e2e8f0'
          });
          if (!confirm.isConfirmed) return;

          Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#0f172a' });

          try {
            await runTransaction(db, async (t) => {
              const snap = await t.get(userRef);
              const currBalance = snap.data().wallet || 0;
              if (currBalance < amount) throw new Error("Insufficient balance. Refresh and try again.");
              t.update(userRef, { wallet: currBalance - amount });
              t.set(doc(db, `users/${user.uid}/withdrawals`, withdrawalId), {
                withdrawalId, userId: user.uid, username: userData.fullName || 'User',
                amount, fee, amountAfterFee: finalAmount, bankName, accountName, accountNumber,
                status: "pending", createdAt: serverTimestamp()
              });
            });

            await Swal.fire({
              icon: 'success', title: 'Withdrawal Submitted!',
              html: `<p>${formatMoney(finalAmount)} will be sent to your account after approval.</p><p style="font-size:0.85rem;color:#94a3b8">Monday–Saturday, 8AM–5PM</p>`,
              background: '#0f172a', confirmButtonColor: '#00e5a0'
            });
            window.location.href = "dashboard.html";
          } catch (err) {
            Swal.fire({ icon: 'error', title: 'Failed', text: err.message, background: '#0f172a', confirmButtonColor: '#ef4444' });
          }
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="error-card"><i class="fas fa-exclamation-circle"></i><h2>Error</h2><p>${err.message}</p><button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
      }
    });
  </script>
</body>
</html>
