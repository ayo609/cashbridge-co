<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw Funds | CashBridge</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0f1e;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
        linear-gradient(145deg, #0f172a 0%, #020617 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* Animated Background Blobs */
    .blob {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      animation: float 20s infinite alternate;
      z-index: 0;
    }

    .blob-1 {
      top: -100px;
      right: -100px;
      background: linear-gradient(145deg, #6366f1, #a855f7);
      animation-delay: -2s;
    }

    .blob-2 {
      bottom: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: linear-gradient(145deg, #ec4899, #f59e0b);
      animation-delay: -7s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    /* Main Container */
    .withdraw-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 550px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 36px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #6366f1;
      color: white;
      transform: translateX(-3px);
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Balance Card */
    .balance-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 24px;
      padding: 1.8rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .balance-label {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .balance-amount {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-weight: 500;
    }

    label i {
      color: #6366f1;
      margin-right: 0.5rem;
      font-size: 0.85rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6366f1;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    input {
      width: 100%;
      padding: 1rem 1rem 1rem 2.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    input::placeholder {
      color: #475569;
      font-weight: 300;
    }

    /* Fee Info */
    .fee-info {
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 16px;
      padding: 1.2rem;
      margin: 1.5rem 0;
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .fee-row.total {
      border-top: 1px solid rgba(245, 158, 11, 0.2);
      margin-top: 0.5rem;
      padding-top: 1rem;
      color: white;
      font-weight: 600;
    }

    .fee-row.total span:last-child {
      color: #22c55e;
      font-size: 1.1rem;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn i {
      font-size: 0.9rem;
    }

    /* Disabled State */
    .disabled-card {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      margin: 2rem 0;
    }

    .disabled-icon {
      width: 60px;
      height: 60px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #ef4444;
      margin: 0 auto 1rem;
    }

    .disabled-card h2 {
      color: #ef4444;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    .disabled-card p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    /* Loading State */
    .loading-container {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(99, 102, 241, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error State */
    .error-card {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      margin: 2rem 0;
    }

    .error-card i {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 1rem;
    }

    .retry-btn {
      background: transparent;
      border: 1px solid #6366f1;
      color: #6366f1;
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .retry-btn:hover {
      background: #6366f1;
      color: white;
    }

    /* Withdrawal Window Banner */
    .window-banner {
      background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(99,102,241,0.08));
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 18px;
      padding: 1rem 1.3rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .window-banner.closed {
      background: rgba(239,68,68,0.05);
      border-color: rgba(239,68,68,0.25);
    }

    .window-banner-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .window-banner.closed .window-banner-icon { color: #ef4444; }
    .window-banner:not(.closed) .window-banner-icon { color: #22c55e; }

    .window-banner-text {
      flex: 1;
    }

    .window-banner-text strong {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 0.15rem;
    }

    .window-banner.closed .window-banner-text strong { color: #ef4444; }
    .window-banner:not(.closed) .window-banner-text strong { color: #22c55e; }

    .window-banner-text span {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .live-clock {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.4rem 0.8rem;
      flex-shrink: 0;
    }

    /* Daily Limit Tracker */
    .limit-tracker {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 1.1rem 1.3rem;
      margin-bottom: 1.5rem;
    }

    .limit-tracker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.7rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .limit-tracker-header strong {
      color: #e2e8f0;
      font-size: 0.88rem;
    }

    .limit-slots {
      display: flex;
      gap: 0.6rem;
    }

    .limit-slot {
      flex: 1;
      height: 8px;
      border-radius: 30px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .limit-slot.used {
      background: linear-gradient(135deg, #6366f1, #ec4899);
    }

    .limit-slot.available {
      background: rgba(34,197,94,0.25);
      border: 1px solid rgba(34,197,94,0.4);
    }

    .limit-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.5rem;
      text-align: right;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .withdraw-container {
        padding: 1.8rem;
      }

      .balance-amount {
        font-size: 2rem;
      }

      .header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="withdraw-container" id="mainContent">
    <div class="loading-container">
      <div class="spinner"></div>
      <p style="color:#94a3b8">Loading withdrawal page...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where,
      runTransaction,
      serverTimestamp,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
      authDomain: "cashbridge-a688e.firebaseapp.com",
      projectId: "cashbridge-a688e",
      storageBucket: "cashbridge-a688e.firebasestorage.app",
      messagingSenderId: "345273765518",
      appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const MIN_WITHDRAWAL  = 500;
    const FEE_PERCENT     = 10;
    const WINDOW_START_H  = 9;   // 9 AM
    const WINDOW_END_H    = 17;  // 5 PM
    const MAX_DAILY       = 2;   // withdrawals per day

    const formatMoney = (n) => "₦" + Number(n || 0).toLocaleString();

    // ── Helpers ──────────────────────────────────────────────
    function isWithinWindow() {
      const h = new Date().getHours();
      return h >= WINDOW_START_H && h < WINDOW_END_H;
    }

    function getTimeUntilOpen() {
      const now  = new Date();
      const open = new Date();
      open.setHours(WINDOW_START_H, 0, 0, 0);
      if (now >= open) open.setDate(open.getDate() + 1);
      const diff = open - now;
      const hh   = Math.floor(diff / 3600000);
      const mm   = Math.floor((diff % 3600000) / 60000);
      const ss   = Math.floor((diff % 60000) / 1000);
      return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    function startClock(elementId) {
      function tick() {
        const el = document.getElementById(elementId);
        if (!el) return;
        const now = new Date();
        const hh  = String(now.getHours()).padStart(2,'0');
        const mm  = String(now.getMinutes()).padStart(2,'0');
        const ss  = String(now.getSeconds()).padStart(2,'0');
        el.textContent = `${hh}:${mm}:${ss}`;
      }
      tick();
      return setInterval(tick, 1000);
    }

    function startCountdown(elementId) {
      function tick() {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.textContent = getTimeUntilOpen();
      }
      tick();
      return setInterval(tick, 1000);
    }

    // Count how many withdrawals the user already made today
    async function countTodayWithdrawals(userId) {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const end = new Date();
      end.setHours(23, 59, 59, 999);

      const wRef = collection(db, `users/${userId}/withdrawals`);
      const q    = query(
        wRef,
        where('createdAt', '>=', Timestamp.fromDate(start)),
        where('createdAt', '<=', Timestamp.fromDate(end))
      );
      const snap = await getDocs(q);
      return snap.size;
    }

    // ── Auth ──────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }

      const container = document.getElementById("mainContent");

      try {
        // 1 ── Admin kill-switch check ──────────────────────
        let withdrawalEnabled = true;
        try {
          const settingsDoc = await getDoc(doc(db, 'settings', 'withdrawalSystem'));
          if (settingsDoc.exists()) withdrawalEnabled = settingsDoc.data().enabled !== false;
        } catch (_) {}

        if (!withdrawalEnabled) {
          container.innerHTML = `
            <div class="header">
              <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
              <h1>Withdrawals Disabled</h1>
            </div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-exclamation-triangle"></i></div>
              <h2>Withdrawals Temporarily Closed</h2>
              <p>Withdrawals have been disabled by the administrator.</p>
              <p style="margin-top:1rem;color:#e2e8f0">
                <i class="fas fa-clock"></i> Withdrawal Hours: 9:00 AM – 5:00 PM daily
              </p>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'">
              <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
          `;
          return;
        }

        // 2 ── Time-window check ────────────────────────────
        if (!isWithinWindow()) {
          container.innerHTML = `
            <div class="header">
              <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
              <h1>Withdrawals Closed</h1>
            </div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-clock"></i></div>
              <h2>Outside Withdrawal Hours</h2>
              <p>Withdrawals are only processed between <strong style="color:#e2e8f0">9:00 AM – 5:00 PM</strong>.</p>
              <p style="margin-top:0.8rem">Please come back during business hours.</p>
              <div style="margin-top:1.5rem;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:1rem;">
                <div style="color:#94a3b8;font-size:0.8rem;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:1px;">Window opens in</div>
                <div id="countdownTimer" style="font-family:'Space Grotesk',monospace;font-size:2rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">--:--:--</div>
              </div>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'">
              <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
          `;
          startCountdown('countdownTimer');
          return;
        }

        // 3 ── Fetch user data ──────────────────────────────
        const userRef  = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) throw new Error("User profile not found");

        const userData = userSnap.data();
        const balance  = Number(userData.wallet || 0);

        // 4 ── Active plan check ────────────────────────────
        const plansSnap  = await getDocs(collection(db, `users/${user.uid}/activePlans`));
        let hasActivePlan = false;
        plansSnap.forEach(d => { if (d.data().status === 'active' && d.data().daysLeft > 0) hasActivePlan = true; });

        if (!hasActivePlan) {
          container.innerHTML = `
            <div class="header">
              <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
              <h1>Withdrawal Locked</h1>
            </div>
            <div class="disabled-card">
              <div class="disabled-icon" style="background:rgba(245,158,11,0.1);color:#f59e0b">
                <i class="fas fa-lock"></i>
              </div>
              <h2 style="color:#f59e0b">Active Investment Required</h2>
              <p>You must have at least one <strong style="color:#e2e8f0">active investment plan</strong> to withdraw funds.</p>
              <p style="margin-top:0.8rem">Purchase a plan and start earning to unlock withdrawals!</p>
            </div>
            <button class="btn" onclick="location.href='plans.html'">
              <i class="fas fa-rocket"></i> Browse Investment Plans
            </button>
          `;
          return;
        }

        // 5 ── Daily limit check ────────────────────────────
        const todayCount = await countTodayWithdrawals(user.uid);
        const slotsLeft  = MAX_DAILY - todayCount;

        if (slotsLeft <= 0) {
          container.innerHTML = `
            <div class="header">
              <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
              <h1>Daily Limit Reached</h1>
            </div>
            <div class="disabled-card">
              <div class="disabled-icon"><i class="fas fa-ban"></i></div>
              <h2>2 Withdrawals Used Today</h2>
              <p>You have already made <strong style="color:#e2e8f0">2 withdrawal requests</strong> today, which is the daily maximum.</p>
              <p style="margin-top:0.8rem">Your limit resets at <strong style="color:#e2e8f0">midnight</strong>. Come back tomorrow!</p>
              <div style="margin-top:1.5rem;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:1rem;text-align:left">
                <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:#94a3b8;margin-bottom:0.6rem">
                  <span>Daily Withdrawals Used</span>
                  <strong style="color:#ef4444">2 / 2</strong>
                </div>
                <div style="display:flex;gap:0.5rem">
                  <div style="flex:1;height:8px;border-radius:30px;background:linear-gradient(135deg,#6366f1,#ec4899)"></div>
                  <div style="flex:1;height:8px;border-radius:30px;background:linear-gradient(135deg,#6366f1,#ec4899)"></div>
                </div>
              </div>
            </div>
            <button class="btn" onclick="location.href='dashboard.html'">
              <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
          `;
          return;
        }

        // 6 ── All checks passed — render the form ─────────
        const windowCloseTime = `${WINDOW_END_H > 12 ? WINDOW_END_H - 12 : WINDOW_END_H}:00 ${WINDOW_END_H >= 12 ? 'PM' : 'AM'}`;

        container.innerHTML = `
          <div class="header">
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h1>Withdraw Funds</h1>
          </div>

          <!-- Live time window banner -->
          <div class="window-banner">
            <span class="window-banner-icon"><i class="fas fa-circle-check"></i></span>
            <div class="window-banner-text">
              <strong>Withdrawal Window Open</strong>
              <span>Closes at 5:00 PM today</span>
            </div>
            <div class="live-clock" id="liveClock">--:--:--</div>
          </div>

          <!-- Daily limit tracker -->
          <div class="limit-tracker">
            <div class="limit-tracker-header">
              <strong><i class="fas fa-layer-group" style="color:#6366f1;margin-right:0.4rem"></i>Daily Withdrawals</strong>
              <span style="color:${slotsLeft === 1 ? '#f59e0b' : '#22c55e'}">${todayCount} used &nbsp;·&nbsp; ${slotsLeft} remaining</span>
            </div>
            <div class="limit-slots">
              <div class="limit-slot ${todayCount >= 1 ? 'used' : 'available'}"></div>
              <div class="limit-slot ${todayCount >= 2 ? 'used' : 'available'}"></div>
            </div>
            <div class="limit-label">Maximum 2 withdrawals per day · Resets at midnight</div>
          </div>

          <div class="balance-card">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount">${formatMoney(balance)}</div>
          </div>

          <form id="withdrawForm">
            <div class="form-group">
              <label><i class="fas fa-coins"></i> Withdrawal Amount</label>
              <div class="input-wrapper">
                <i class="fas fa-naira-sign input-icon"></i>
                <input type="number" id="amount" min="${MIN_WITHDRAWAL}" max="${balance}" placeholder="Min: ₦${MIN_WITHDRAWAL.toLocaleString()}" required>
              </div>
            </div>

            <div class="fee-info" id="feeInfo" style="display:none">
              <div class="fee-row">
                <span>Withdrawal Amount</span>
                <span id="amtDisplay">₦0</span>
              </div>
              <div class="fee-row">
                <span>Processing Fee (${FEE_PERCENT}%)</span>
                <span id="feeDisplay">₦0</span>
              </div>
              <div class="fee-row total">
                <span>You'll Receive</span>
                <span id="finalDisplay">₦0</span>
              </div>
            </div>

            <div class="form-group">
              <label><i class="fas fa-university"></i> Bank Name</label>
              <div class="input-wrapper">
                <i class="fas fa-building input-icon"></i>
                <input type="text" id="bankName" placeholder="e.g. GTBank, Access Bank" required>
              </div>
            </div>

            <div class="form-group">
              <label><i class="fas fa-user"></i> Account Name</label>
              <div class="input-wrapper">
                <i class="fas fa-signature input-icon"></i>
                <input type="text" id="accountName" placeholder="Full name on account" required>
              </div>
            </div>

            <div class="form-group">
              <label><i class="fas fa-credit-card"></i> Account Number</label>
              <div class="input-wrapper">
                <i class="fas fa-hashtag input-icon"></i>
                <input type="text" id="accountNumber" maxlength="10" pattern="[0-9]{10}" placeholder="10-digit account number" required>
              </div>
            </div>

            <button class="btn" type="submit">
              <i class="fas fa-paper-plane"></i> Submit Withdrawal Request
            </button>
          </form>
        `;

        // Start live clock
        startClock('liveClock');

        // Amount input handler
        const amtInput = document.getElementById("amount");
        const feeInfo  = document.getElementById("feeInfo");

        amtInput.addEventListener("input", () => {
          const amt = Number(amtInput.value);
          if (amt >= MIN_WITHDRAWAL && amt <= balance) {
            const fee   = Math.floor(amt * (FEE_PERCENT / 100));
            const final = amt - fee;
            document.getElementById("amtDisplay").textContent   = formatMoney(amt);
            document.getElementById("feeDisplay").textContent   = formatMoney(fee);
            document.getElementById("finalDisplay").textContent = formatMoney(final);
            feeInfo.style.display = "block";
          } else {
            feeInfo.style.display = "none";
          }
        });

        // Form submission
        document.getElementById("withdrawForm").addEventListener("submit", async (e) => {
          e.preventDefault();

          const amount        = Number(document.getElementById("amount").value);
          const bankName      = document.getElementById("bankName").value.trim();
          const accountName   = document.getElementById("accountName").value.trim();
          const accountNumber = document.getElementById("accountNumber").value.trim();

          // ── Re-validate all rules at submission time ────
          if (!isWithinWindow()) {
            return Swal.fire({
              icon: 'warning', title: 'Window Closed',
              text: 'Withdrawals are only allowed between 9:00 AM and 5:00 PM.',
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          const currentCount = await countTodayWithdrawals(user.uid);
          if (currentCount >= MAX_DAILY) {
            return Swal.fire({
              icon: 'warning', title: 'Daily Limit Reached',
              text: `You have already made ${MAX_DAILY} withdrawal requests today. Please try again tomorrow.`,
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          if (amount < MIN_WITHDRAWAL) {
            return Swal.fire({
              icon: 'warning', title: 'Invalid Amount',
              text: `Minimum withdrawal is ₦${MIN_WITHDRAWAL.toLocaleString()}`,
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          if (amount > balance) {
            return Swal.fire({
              icon: 'warning', title: 'Insufficient Balance',
              text: `You only have ${formatMoney(balance)} available`,
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          if (accountNumber.length !== 10 || !/^\d+$/.test(accountNumber)) {
            return Swal.fire({
              icon: 'warning', title: 'Invalid Account',
              text: 'Account number must be exactly 10 digits',
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          if (!bankName || !accountName) {
            return Swal.fire({
              icon: 'warning', title: 'Missing Information',
              text: 'Please fill in all bank details',
              background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#6366f1'
            });
          }

          const fee          = Math.floor(amount * (FEE_PERCENT / 100));
          const finalAmount  = amount - fee;
          const withdrawalId = `WTH_${Date.now()}`;

          const result = await Swal.fire({
            title: 'Confirm Withdrawal',
            html: `
              <div style="text-align:left;background:rgba(255,255,255,0.02);padding:1rem;border-radius:16px;margin:1rem 0">
                <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;color:#94a3b8">
                  <span>Amount:</span><span style="color:white">${formatMoney(amount)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;color:#94a3b8">
                  <span>Fee (${FEE_PERCENT}%):</span><span style="color:#f59e0b">${formatMoney(fee)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.1);color:#94a3b8">
                  <span>You'll receive:</span><span style="color:#22c55e;font-weight:600">${formatMoney(finalAmount)}</span>
                </div>
              </div>
              <div style="text-align:left;background:rgba(99,102,241,0.1);padding:1rem;border-radius:16px">
                <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;color:#94a3b8">
                  <i class="fas fa-university" style="color:#6366f1"></i>
                  <span>${bankName}</span>
                </div>
                <div style="display:flex;gap:0.5rem;color:#94a3b8">
                  <i class="fas fa-user" style="color:#6366f1"></i>
                  <span>${accountName} | ${accountNumber}</span>
                </div>
              </div>
              <p style="margin-top:1rem;font-size:0.8rem;color:#64748b">
                <i class="fas fa-info-circle"></i> 
                You will have <strong style="color:#e2e8f0">${MAX_DAILY - currentCount - 1}</strong> withdrawal slot(s) remaining today after this.
              </p>
            `,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Yes, Submit',
            cancelButtonText: 'Cancel',
            confirmButtonColor: '#6366f1',
            cancelButtonColor: '#64748b',
            background: '#0f172a',
            color: '#e2e8f0'
          });

          if (!result.isConfirmed) return;

          try {
            Swal.fire({
              title: 'Processing...',
              html: '<p style="color:#94a3b8">Please wait while we submit your request</p>',
              allowOutsideClick: false,
              background: '#0f172a',
              didOpen: () => Swal.showLoading()
            });

            await runTransaction(db, async (tx) => {
              const snap           = await tx.get(userRef);
              const currentBalance = snap.data().wallet || 0;
              if (currentBalance < amount) throw new Error("Insufficient balance. Please refresh and try again.");

              tx.update(userRef, { wallet: currentBalance - amount });

              tx.set(doc(db, `users/${user.uid}/withdrawals`, withdrawalId), {
                withdrawalId,
                userId:        user.uid,
                username:      userData.fullName || 'User',
                userEmail:     userData.email    || '',
                amount,
                fee,
                amountAfterFee: finalAmount,
                bankName,
                accountName,
                accountNumber,
                status:        "pending",
                createdAt:     serverTimestamp()
              });
            });

            await Swal.fire({
              icon: 'success',
              title: 'Withdrawal Submitted!',
              html: `
                <p style="color:#e2e8f0">Your request has been submitted successfully.</p>
                <p style="color:#22c55e;font-size:1.2rem;margin-top:0.5rem">${formatMoney(finalAmount)}</p>
                <p style="color:#94a3b8;margin-top:1rem;font-size:0.9rem">Awaiting admin approval</p>
              `,
              background: '#0f172a',
              confirmButtonColor: '#6366f1'
            });

            window.location.href = "dashboard.html";

          } catch (err) {
            console.error('Withdrawal error:', err);
            Swal.fire({
              icon: 'error',
              title: 'Withdrawal Failed',
              text: err.message || 'An error occurred. Please try again.',
              background: '#0f172a',
              confirmButtonColor: '#ef4444'
            });
          }
        });

      } catch (err) {
        console.error('Page load error:', err);
        container.innerHTML = `
          <div class="error-card">
            <i class="fas fa-exclamation-circle"></i>
            <h2 style="color:#ef4444;margin-bottom:1rem">Error Loading Page</h2>
            <p style="color:#94a3b8;margin-bottom:1.5rem">${err.message || 'Unable to load withdrawal page'}</p>
            <button class="retry-btn" onclick="location.reload()">
              <i class="fas fa-redo"></i> Retry
            </button>
          </div>
          <button class="btn" onclick="location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
          </button>
        `;
      }
    });
  </script>
</body>
</html>
