<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
  <title>TEXIS · Withdraw Funds</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--teal:#0d9488;--teal-dark:#0f766e;--teal-light:#14b8a6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--bg:#f6f8fa;--card:#fff;--text:#1a1a2e;--sub:#5a6072;--muted:#9ca3af;--border:#e5e7eb}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .container{width:100%;max-width:480px;background:var(--card);border-radius:24px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid var(--border)}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .back-btn{width:38px;height:38px;background:var(--bg);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--sub);text-decoration:none;font-size:15px;transition:all .2s}
    .back-btn:hover{background:var(--teal);color:#fff}
    .topbar h1{font-family:'Sora',sans-serif;font-size:20px;font-weight:800}
    .balance-card{background:linear-gradient(135deg,var(--teal-dark),var(--teal),var(--teal-light));border-radius:18px;padding:20px;text-align:center;margin-bottom:20px;color:#fff}
    .balance-card .lbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .balance-card .val{font-family:'Sora',sans-serif;font-size:32px;font-weight:800}
    .banner{background:#f0fdfa;border:1px solid #99f6e4;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--teal)}
    .banner.closed{background:#fef2f2;border-color:#fecaca;color:var(--red)}
    .banner i{font-size:18px}
    .limit-track{display:flex;gap:8px;margin-bottom:16px}
    .limit-slot{flex:1;height:6px;border-radius:10px;background:#e5e7eb}.limit-slot.used{background:var(--teal)}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
    .form-group input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:all .2s}
    .form-group input:focus{border-color:var(--teal)}
    .fee-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px;margin-bottom:16px}
    .fee-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
    .fee-row.total{border-top:1px solid #fde68a;margin-top:6px;padding-top:8px;font-weight:700}
    .submit-btn{width:100%;padding:16px;background:var(--teal);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
    .submit-btn:hover{background:var(--teal-dark)}.submit-btn:disabled{background:#cbd5e1;color:#94a3b8;cursor:not-allowed}
    .disabled-card{text-align:center;padding:32px 16px}
    .disabled-card i{font-size:44px;color:var(--red);margin-bottom:12px}
    .disabled-card h2{font-family:'Sora',sans-serif;font-size:18px;margin-bottom:8px}
    .disabled-card p{font-size:13px;color:var(--sub);line-height:1.6}
    .disabled-card .countdown{font-family:monospace;font-size:24px;font-weight:700;color:var(--teal);margin-top:12px}
  </style>
</head>
<body>

<div class="container" id="mainContent">
  <div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="font-size:28px;color:var(--teal);"></i><p style="color:var(--sub);margin-top:12px;">Loading...</p></div>
</div>

<script>
  const firebaseConfig={apiKey:"AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",authDomain:"cashbridge-a688e.firebaseapp.com",projectId:"cashbridge-a688e",storageBucket:"cashbridge-a688e.firebasestorage.app",messagingSenderId:"345273765518",appId:"1:345273765518:web:29ee0b8f9717cdb50203df"};
  if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(),db=firebase.firestore(),FV=firebase.firestore.FieldValue,fmt=v=>'₦'+Number(v||0).toLocaleString();
  const MIN=1000,FEE_PCT=15,MAX_DAILY=2;

  function isSunday(){return new Date().getDay()===0}
  function isWithinWindow(){if(isSunday())return!1;const h=new Date().getHours();return h>=8&&h<17}
  function getTimeUntilOpen(){const n=new Date();let o=new Date();o.setHours(8,0,0,0);if(n>=o||isSunday())o.setDate(o.getDate()+1);const d=o-n;return`${String(Math.floor(d/3600000)).padStart(2,'0')}:${String(Math.floor((d%3600000)/60000)).padStart(2,'0')}:${String(Math.floor((d%60000)/1000)).padStart(2,'0')}`}

  async function countTodayTx(uid){const s=new Date();s.setHours(0,0,0,0);const e=new Date();e.setHours(23,59,59,999);const snap=await db.collection('users').doc(uid).collection('withdrawals').where('createdAt','>=',s).where('createdAt','<=',e).get();return snap.size}

  async function hasActivePlan(uid){const snap=await db.collection('users').doc(uid).collection('activePlans').where('status','==','active').get();let has=!1;snap.forEach(d=>{if(d.data().daysLeft>0)has=!0});return has}

  auth.onAuthStateChanged(async user=>{
    if(!user){window.location.href='login.html';return}
    const c=document.getElementById('mainContent');
    try{
      const snap=await db.collection('users').doc(user.uid).get();
      if(!snap.exists){window.location.href='login.html';return}
      const data=snap.data(),balance=Number(data.wallet||0);

      // Check withdrawal enabled
      let enabled=!0;try{const s=await db.collection('settings').doc('withdrawalSystem').get();if(s.exists)enabled=s.data().enabled!==!1}catch(e){}
      if(!enabled){c.innerHTML=`<div class="disabled-card"><i class="fas fa-exclamation-triangle"></i><h2>Withdrawals Disabled</h2><p>Withdrawals have been disabled by admin.</p></div><a href="dashboard.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">Back to Dashboard</a>`;return}

      // Sunday check
      if(isSunday()){c.innerHTML=`<div class="disabled-card"><i class="fas fa-calendar-times"></i><h2>No Withdrawals on Sunday</h2><p>Withdrawals resume Monday at 8:00 AM.</p><div class="countdown" id="cd">${getTimeUntilOpen()}</div></div><a href="dashboard.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">Back to Dashboard</a>`;setInterval(()=>{const el=document.getElementById('cd');if(el)el.textContent=getTimeUntilOpen()},1000);return}

      // Time window
      if(!isWithinWindow()){c.innerHTML=`<div class="disabled-card"><i class="fas fa-clock"></i><h2>Outside Withdrawal Hours</h2><p>Mon–Sat, 8AM–5PM only.</p><div class="countdown" id="cd">${getTimeUntilOpen()}</div></div><a href="dashboard.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">Back to Dashboard</a>`;setInterval(()=>{const el=document.getElementById('cd');if(el)el.textContent=getTimeUntilOpen()},1000);return}

      // Active plan
      const hasPlan=await hasActivePlan(user.uid);
      if(!hasPlan){c.innerHTML=`<div class="disabled-card"><i class="fas fa-lock" style="color:var(--amber);"></i><h2 style="color:var(--amber);">Active Investment Required</h2><p>Purchase a plan to unlock withdrawals.</p></div><a href="plans.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">View Plans</a>`;return}

      // Daily limit
      const todayCount=await countTodayTx(user.uid),slotsLeft=MAX_DAILY-todayCount;
      if(slotsLeft<=0){c.innerHTML=`<div class="disabled-card"><i class="fas fa-ban"></i><h2>Daily Limit Reached</h2><p>Max ${MAX_DAILY} withdrawals per day. Resets at midnight.</p></div><a href="dashboard.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">Back to Dashboard</a>`;return}

      // Min balance
      if(balance<MIN){c.innerHTML=`<div class="disabled-card"><i class="fas fa-wallet" style="color:var(--amber);"></i><h2 style="color:var(--amber);">Insufficient Balance</h2><p>Min: ${fmt(MIN)} · Your balance: ${fmt(balance)}</p></div><a href="dashboard.html" class="submit-btn" style="text-decoration:none;margin-top:16px;">Back to Dashboard</a>`;return}

      // ✅ RENDER FORM
      c.innerHTML=`
        <div class="topbar"><a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a><h1>Withdraw Funds</h1></div>
        <div class="banner"><i class="fas fa-check-circle"></i><div><b>Withdrawal Window Open</b><br><small>Mon–Sat, 8AM–5PM</small></div></div>
        <div class="limit-track"><div class="limit-slot ${todayCount>=1?'used':''}"></div><div class="limit-slot ${todayCount>=2?'used':''}"></div></div>
        <p style="font-size:10px;color:var(--muted);text-align:right;margin-bottom:12px;">${todayCount}/${MAX_DAILY} used · ${slotsLeft} left</p>
        <div class="balance-card"><div class="lbl"><i class="fas fa-wallet"></i> Available Balance</div><div class="val">${fmt(balance)}</div></div>
        <div class="form-group"><label>Amount (₦)</label><input type="number" id="amount" min="${MIN}" max="${balance}" placeholder="Min: ₦${MIN.toLocaleString()}" oninput="updateFee()"/></div>
        <div class="fee-box" id="feeBox" style="display:none">
          <div class="fee-row"><span>Amount</span><span id="amtDisp">₦0</span></div>
          <div class="fee-row"><span>Fee (${FEE_PCT}%)</span><span style="color:var(--amber);" id="feeDisp">₦0</span></div>
          <div class="fee-row total"><span>You Receive</span><span style="color:var(--green);" id="finalDisp">₦0</span></div>
        </div>
        <div class="form-group"><label>Bank Name</label><input type="text" id="bankName" placeholder="e.g., GTBank, Access Bank"/></div>
        <div class="form-group"><label>Account Name</label><input type="text" id="accountName" placeholder="Full name on account"/></div>
        <div class="form-group"><label>Account Number</label><input type="text" id="accountNumber" maxlength="10" placeholder="10-digit account number"/></div>
        <button class="submit-btn" id="submitBtn" onclick="doWithdraw()"><i class="fas fa-paper-plane"></i> Submit Withdrawal</button>
      `;

      window.updateFee=()=>{const a=Number(document.getElementById('amount').value),fb=document.getElementById('feeBox');if(a>=MIN&&a<=balance){const fee=Math.floor(a*(FEE_PCT/100));document.getElementById('amtDisp').textContent=fmt(a);document.getElementById('feeDisp').textContent=fmt(fee);document.getElementById('finalDisp').textContent=fmt(a-fee);fb.style.display='block'}else{fb.style.display='none'}};

      window.doWithdraw=async()=>{
        const amount=Number(document.getElementById('amount').value),bankName=document.getElementById('bankName').value.trim(),accountName=document.getElementById('accountName').value.trim(),accountNumber=document.getElementById('accountNumber').value.trim();
        if(isSunday())return Swal.fire({icon:'warning',title:'Sunday Closed',confirmButtonColor:'#0d9488'});
        if(!isWithinWindow())return Swal.fire({icon:'warning',title:'Window Closed',confirmButtonColor:'#0d9488'});
        if(await countTodayTx(user.uid)>=MAX_DAILY)return Swal.fire({icon:'warning',title:'Daily Limit',confirmButtonColor:'#0d9488'});
        if(!(await hasActivePlan(user.uid)))return Swal.fire({icon:'warning',title:'Active Plan Required',confirmButtonColor:'#0d9488'});
        if(amount<MIN||amount>balance)return Swal.fire({icon:'warning',title:'Invalid Amount',confirmButtonColor:'#0d9488'});
        if(accountNumber.length!==10||!/^\d+$/.test(accountNumber))return Swal.fire({icon:'warning',title:'Invalid Account',text:'Must be 10 digits.',confirmButtonColor:'#0d9488'});
        if(!bankName||!accountName)return Swal.fire({icon:'warning',title:'Missing Info',confirmButtonColor:'#0d9488'});

        const fee=Math.floor(amount*(FEE_PCT/100)),finalAmt=amount-fee,wid='WTH_'+Date.now();
        const ok=await Swal.fire({title:'Confirm',html:`<div style="text-align:left;background:#f0fdfa;border-radius:12px;padding:12px;margin:8px 0;"><div>Amount: <b>${fmt(amount)}</b></div><div>Fee: <b style="color:#d97706;">${fmt(fee)}</b></div><div>Receive: <b style="color:#10b981;">${fmt(finalAmt)}</b></div></div><div>Bank: <b>${bankName}</b></div><div>Account: <b>${accountName}</b> · ${accountNumber}</div>`,icon:'question',showCancelButton:!0,confirmButtonText:'Submit',confirmButtonColor:'#0d9488'});
        if(!ok.isConfirmed)return;
        Swal.fire({title:'Processing...',allowOutsideClick:!1,didOpen:()=>Swal.showLoading()});
        try{
          await db.runTransaction(async t=>{const ur=db.collection('users').doc(user.uid),sn=await t.get(ur);if((sn.data().wallet||0)<amount)throw new Error('Insufficient balance');t.update(ur,{wallet:FV.increment(-amount)});t.set(db.collection('users').doc(user.uid).collection('withdrawals').doc(wid),{withdrawalId:wid,userId:user.uid,username:data.fullName||'User',amount,fee,amountAfterFee:finalAmt,bankName,accountName,accountNumber,status:'pending',createdAt:FV.serverTimestamp()})});
          Swal.fire({icon:'success',title:'Submitted!',text:`${fmt(finalAmt)} pending approval.`,confirmButtonColor:'#0d9488'});
          setTimeout(()=>window.location.href='dashboard.html',1500)
        }catch(e){Swal.fire({icon:'error',title:'Failed',text:e.message,confirmButtonColor:'#ef4444'})}
      };

    }catch(e){c.innerHTML=`<div class="disabled-card"><i class="fas fa-exclamation-circle"></i><h2>Error</h2><p>${e.message}</p><button class="submit-btn" onclick="location.reload()" style="margin-top:12px;">Retry</button></div>`}
  });
</script>
</body>
</html>
