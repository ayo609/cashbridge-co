  <style>

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:110px;background-image:radial-gradient(ellipse at 0% 0%,#e0f2fe 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,#ccfbf1 0%,transparent 50%)}
    .topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

    .plan-card .pop-tag{position:absolute;top:12px;right:12px;background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:10px}

    .plan-card .pc-name{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
    .plan-card .pc-price{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--teal);margin-bottom:14px}
    .plan-card .pc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f1f5f9}

    .locked-alert{background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-top:10px;font-size:11px;color:#92400e;display:flex;align-items:center;gap:8px}

    .weekend-notice{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;margin-top:10px;font-size:12px;color:#dc2626;display:flex;align-items:center;gap:8px}
    .toast{position:fixed;bottom:100px;right:20px;background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 12px 32px rgba(0,0,0,.1);display:flex;align-items:center;gap:12px;z-index:999;animation:slideIn .3s ease;border-left:4px solid var(--teal);max-width:380px}
    @keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
    .toast i{font-size:20px}.toast.success{border-color:var(--green)}.toast.warning{border-color:var(--amber)}
    .bottom-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:50px;padding:6px 10px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.08);z-index:200}

    @media(max-width:600px){.plans-grid{grid-template-columns:1fr}.nav-item span{display:none}.nav-item{padding:12px 14px}}

<script>
  const firebaseConfig = {apiKey:"AIzaSyCoya4moqwNCuVI-EtzLcMt2gD6QNUdyCQ",authDomain:"texis-b7180.firebaseapp.com",projectId:"texis-b7180",storageBucket:"texis-b7180.firebasestorage.app",messagingSenderId:"848854390209",appId:"1:848854390209:web:c5babd1ca5e0e42ba08b40"};
  if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(),db=firebase.firestore(),FV=firebase.firestore.FieldValue,fmt=v=>'₦'+Number(v||0).toLocaleString();

  const ALL_PLANS=[{id:1,name:'📊 Basic Plan',capital:10000,daily:1000,days:20,totalProfit:20000,icon:'fa-chart-simple',popular:false},{id:2,name:'📈 Silver Plan',capital:20000,daily:2000,days:20,totalProfit:40000,icon:'fa-chart-line',popular:false},{id:3,name:'🥇 Gold Plan',capital:30000,daily:3000,days:20,totalProfit:60000,icon:'fa-coins',popular:false},{id:4,name:'💎 Platinum Plan',capital:40000,daily:4000,days:20,totalProfit:80000,icon:'fa-gem',popular:false},{id:5,name:'👑 Diamond Plan',capital:50000,daily:5000,days:20,totalProfit:100000,icon:'fa-crown',popular:true}];
  const REF_RATES={level1:0.10,level2:0.02,level3:0.01},LOCK_DAY=7,TOTAL_DAYS=20,MAX_PER_PLAN=6; // ✅ CHANGED TO 6

  let currentUser=null,userData=null,processing=false,allUserPlans=[],countdownTimer=null,payoutTimer=null,weekendCheckTimer=null,lastPayoutDate='',highestInvested=0;

  function isWeekend(date){if(!date)date=new Date();const d=date.getDay();return d===0||d===6}

  function getNextPayoutTime(){
    const now=new Date();
    if(isWeekend(now)){let monday=new Date(now);const daysUntilMonday=now.getDay()===0?1:2;monday.setDate(monday.getDate()+daysUntilMonday);monday.setHours(0,0,0,0);return{time:monday,isWeekend:true}}
    if(now.getDay()===5){let monday=new Date(now);monday.setDate(monday.getDate()+3);monday.setHours(0,0,0,0);return{time:monday,isWeekend:false}}
    const todayMidnight=new Date(now);todayMidnight.setHours(24,0,0,0);return{time:todayMidnight,isWeekend:false};
  }

  function toast(t,m,s='success'){const icons={success:'check-circle',warning:'exclamation-triangle',error:'exclamation-circle'};const e=document.createElement('div');e.className=`toast ${s}`;e.innerHTML=`<i class="fas fa-${icons[s]||icons.success}"></i><div><b>${t}</b><br><small>${m}</small></div>`;document.body.appendChild(e);setTimeout(()=>e.remove(),4500)}
  function fmtCD(ms){if(ms<=0)return'00:00:00';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}

  function updateMidCD(){
    const now=new Date(),next=getNextPayoutTime(),ms=next.time-now,display=fmtCD(Math.max(0,ms)),isWeekendNow=isWeekend(now),isFriday=now.getDay()===5;
    document.querySelectorAll('.cd-time').forEach(e=>e.textContent=display);
    document.querySelectorAll('.countdown').forEach(e=>{if(isWeekendNow)e.classList.add('weekend');else e.classList.remove('weekend')});
    document.querySelectorAll('.cd-label').forEach(e=>{if(isWeekendNow)e.innerHTML='<i class="fas fa-calendar-xmark"></i> Weekend — Next Payout Monday 12AM';else if(isFriday)e.innerHTML='<i class="fas fa-hourglass-half"></i> Friday — Next Payout Monday 12AM';else e.innerHTML='<i class="fas fa-hourglass-half"></i> Next Payout Tonight 12AM'});
  }

  function startMidCD(){if(countdownTimer)clearInterval(countdownTimer);updateMidCD();countdownTimer=setInterval(updateMidCD,1000)}

  function payoutDue(lastPayoutDate){if(!lastPayoutDate)return false;const now=new Date();if(isWeekend(now))return false;const todayMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);const lastDate=lastPayoutDate.toDate?lastPayoutDate.toDate():new Date(lastPayoutDate);if(lastDate.getDay()===5&&now.getDay()===1){const monday=new Date(now);monday.setDate(monday.getDate()-3);return lastDate<=monday}return lastDate<todayMidnight}
  function firstDue(startDate){if(!startDate)return false;const now=new Date();if(isWeekend(now))return false;const todayMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);const sDate=startDate.toDate?startDate.toDate():new Date(startDate);return sDate<todayMidnight}

  function renderPlans(){const el=document.getElementById('plansContainer');if(!el)return;const planCounts={};allUserPlans.forEach(p=>{if(p.planId)planCounts[p.planId]=(planCounts[p.planId]||0)+1});el.innerHTML=ALL_PLANS.map(p=>{const c=planCounts[p.id]||0,l=c>=MAX_PER_PLAN,ca=userData&&(userData.wallet||0)>=p.capital,mr=p.capital>=highestInvested,il=!mr&&highestInvested>0;let dr='';if(l)dr='Limit Reached';else if(!ca)dr='Insufficient Balance';else if(il)dr=`Min ₦${highestInvested.toLocaleString()}`;return`<div class="plan-card ${p.popular?'featured':''} ${(l||il)?'locked-plan':''}">${p.popular?'<div class="pop-tag"><i class="fas fa-star"></i> POPULAR</div>':''}<div class="pc-icon"><i class="fas ${p.icon}"></i></div><div class="pc-name">${p.name}</div><div class="pc-price">${fmt(p.capital)}</div><div class="pc-row"><span class="lbl">📈 Daily ROI (Mon-Fri)</span><span class="val grn">${fmt(p.daily)}</span></div><div class="pc-row"><span class="lbl">⏱️ Duration</span><span class="val">${TOTAL_DAYS} weekdays</span></div><div class="pc-row"><span class="lbl">🔒 Locks at Day</span><span class="val amb">${LOCK_DAY}</span></div><div class="pc-row"><span class="lbl">💰 Total Profit</span><span class="val amb">${fmt(p.totalProfit)}</span></div><span style="display:inline-block;margin-top:10px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;background:#f1f5f9;color:var(--sub)">${c}/${MAX_PER_PLAN} purchased</span><button class="buy-btn" ${(l||!ca||il)?'disabled':''} onclick="buyPlan(${p.id},${p.capital},'${p.name.replace(/'/g,"\\'")}',${p.daily})"><i class="fas ${(l||!ca||il)?'fa-lock':'fa-rocket'}"></i> ${dr||'Invest Now'}</button></div>`}).join('')}

  function renderActivePlans(){const container=document.getElementById('activePlansContainer'),title=document.getElementById('activeTitle'),ce=document.getElementById('activeCount');if(!allUserPlans.length){title.style.display='none';container.innerHTML='';return}title.style.display='flex';ce.textContent=allUserPlans.length;const now=new Date(),isWeekendNow=isWeekend(now),isFriday=now.getDay()===5;const sorted=[...allUserPlans].sort((a,b)=>{const o={'active':1,'locked':2,'completed':3};return(o[a.status]||4)-(o[b.status]||4)});container.innerHTML=sorted.map(p=>{const il=p.status==='locked',ic=p.status==='completed',ia=p.status==='active',rp=p.roiPaid||0;let bc='active-badge',bt='ACTIVE';if(il){bc='locked-badge';bt='🔒 LOCKED'}if(ic){bc='completed-badge';bt='✅ COMPLETED'}let cdHTML='';if(ia){const next=getNextPayoutTime(),ms=next.time-now,display=fmtCD(Math.max(0,ms));let cdLabel='';if(isWeekendNow)cdLabel='Weekend — Next Payout Monday 12AM';else if(isFriday)cdLabel='Friday — Next Payout Monday 12AM';else cdLabel='Next Payout Tonight 12AM';cdHTML=`<div class="countdown${isWeekendNow||isFriday?' weekend':''}"><div class="cd-label">${cdLabel}</div><div class="cd-time">${display}</div></div>${isWeekendNow||isFriday?'<div class="weekend-notice"><i class="fas fa-info-circle"></i> ROI not credited on weekends. Next payout: Monday 12AM</div>':''}<div style="margin-top:8px;font-size:10px;color:var(--amber);text-align:center">⚠️ Locks after ${LOCK_DAY-rp} more payout${(LOCK_DAY-rp)!==1?'s':''}</div>`}return`<div class="active-card ${il?'locked-card':''}"><div class="ac-badge ${bc}"><i class="fas fa-${il?'lock':ic?'check-circle':'check-circle'}"></i> ${bt}</div><div class="pc-name" style="margin-top:24px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700">${p.planName}</div><div class="pc-price" style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--teal);margin:8px 0">${fmt(p.capital)}</div><div class="pc-row"><span class="lbl">📈 Daily ROI</span><span class="val grn">${fmt(p.dailyEarning)}</span></div><div class="pc-row"><span class="lbl">📊 ROI Paid</span><span class="val">${rp} / ${TOTAL_DAYS} days</span></div><div class="pc-row"><span class="lbl">💰 Total Earned</span><span class="val amb">${fmt(p.totalEarned||0)}</span></div>${il?`<div class="locked-alert"><i class="fas fa-lock"></i><div><b>Plan Locked at Day ${LOCK_DAY}</b><br>Purchase another plan (₦${p.capital.toLocaleString()} or higher) to unlock.</div></div>`:ic?`<div style="margin-top:12px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;padding:12px;text-align:center;font-size:13px;color:var(--teal);font-weight:600"><i class="fas fa-trophy"></i> Completed! Profit: ${fmt(p.totalEarned||0)}</div>`:cdHTML}</div>`}).join('');updateMidCD()}

  async function loadAllData(){if(!currentUser)return;try{const snap=await db.collection('users').doc(currentUser.uid).get();if(!snap.exists){renderPlans();return}userData=snap.data();document.getElementById('walletDisplay').textContent=fmt(userData.wallet||0);const planSnap=await db.collection('users').doc(currentUser.uid).collection('activePlans').orderBy('createdAt','desc').limit(30).get();allUserPlans=[];highestInvested=0;planSnap.forEach(d=>{const p=d.data();allUserPlans.push({id:d.id,...p});if(p.capital>highestInvested)highestInvested=p.capital});renderPlans();renderActivePlans()}catch(e){renderPlans()}}

  // ✅ REFERRAL BONUSES — Optimized single-read chain
  async function payReferralBonuses(amount){if(!currentUser||!amount||amount<=0)return{paid:false,totalPaid:0,levels:0,details:''};try{const userSnap=await db.collection('users').doc(currentUser.uid).get();if(!userSnap.exists)return{paid:false,totalPaid:0,levels:0,details:''};const ul=userSnap.data();if(ul.referralBonusPaid===true)return{paid:false,totalPaid:0,levels:0,details:'Already paid'};const chain=[];let rid=ul.referrerUid||ul.referredBy||null;if(!rid||rid==='direct'||rid==='none'||rid.trim()===''||rid===currentUser.uid){await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true});return{paid:false,totalPaid:0,levels:0,details:'No valid referrer'}}chain.push(rid);try{const l1=await db.collection('users').doc(rid).get();if(l1.exists){const l2id=l1.data().referrerUid||l1.data().referredBy||null;if(l2id&&l2id!=='direct'&&l2id!=='none'&&l2id.trim()!==''&&l2id!==currentUser.uid&&!chain.includes(l2id)){chain.push(l2id);try{const l2=await db.collection('users').doc(l2id).get();if(l2.exists){const l3id=l2.data().referrerUid||l2.data().referredBy||null;if(l3id&&l3id!=='direct'&&l3id!=='none'&&l3id.trim()!==''&&l3id!==currentUser.uid&&!chain.includes(l3id))chain.push(l3id)}}catch(e){}}}}catch(e){}if(!chain.length){await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true});return{paid:false,totalPaid:0,levels:0,details:'No chain'}}const rates=[{level:1,rate:REF_RATES.level1,label:'10%'},{level:2,rate:REF_RATES.level2,label:'2%'},{level:3,rate:REF_RATES.level3,label:'1%'}];let tp=0,lp=0;const details=[];for(let i=0;i<chain.length;i++){const uid=chain[i],ri=rates[i];if(!ri)break;const bonus=Math.floor(amount*ri.rate);if(bonus<=0)continue;try{await db.collection('users').doc(uid).update({wallet:FV.increment(bonus),totalEarnings:FV.increment(bonus),totalRefEarnings:FV.increment(bonus),referralCount:FV.increment(i===0?1:0),['level'+(i+1)+'Count']:FV.increment(1)});await db.collection('users').doc(uid).collection('transactions').add({type:'referral_bonus',amount:bonus,status:'completed',description:`🎁 Level ${i+1} ref bonus (${ri.label}) from ${ul.fullName||'new user'} — ₦${bonus.toLocaleString()}`,referredUser:currentUser.uid,investmentAmount:amount,level:i+1,rate:ri.rate,createdAt:FV.serverTimestamp()});const rd=db.collection('users').doc(uid).collection('referrals').doc(currentUser.uid),er=await rd.get();await rd.set({uid:currentUser.uid,level:i+1,commission:ri.rate*100,referredAt:ul.createdAt||FV.serverTimestamp(),fullName:ul.fullName||'User',username:ul.username||'',email:ul.email||'',totalEarned:(er.exists?er.data().totalEarned||0:0)+bonus,lastInvestment:amount,lastInvestmentDate:FV.serverTimestamp(),firstPurchaseBonus:true},{merge:true});tp+=bonus;lp++;details.push(`L${i+1}: ₦${bonus.toLocaleString()} (${ri.label})`)}catch(e){}}await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true,referralBonusAmount:tp,referralBonusLevels:lp,referralBonusPaidAt:FV.serverTimestamp(),referralBonusDetails:details.join(', ')});return{paid:tp>0,totalPaid:tp,levels:lp,details:details.join(', ')}}catch(e){return{paid:false,totalPaid:0,levels:0,details:''}}}

  async function runPayouts(){if(!currentUser||!allUserPlans.length)return;if(isWeekend())return;const today=new Date().toDateString();if(lastPayoutDate===today)return;try{let done=0;for(const p of allUserPlans){if(p.status==='completed'||p.status==='locked')continue;if(p.roiPaid>=TOTAL_DAYS)continue;let due=false;if(p.lastPayoutDate){due=payoutDue(p.lastPayoutDate)}else{due=firstDue(p.startDate)}if(!due)continue;try{const planRef=db.collection('users').doc(currentUser.uid).collection('activePlans').doc(p.id),fresh=await planRef.get();if(!fresh.exists||(fresh.data().status!=='active'&&fresh.data().status!=='locked'))continue;const d=fresh.data();let fd=false;if(d.lastPayoutDate){fd=payoutDue(d.lastPayoutDate)}else{fd=firstDue(d.startDate)}if(!fd)continue;const nrp=(d.roiPaid||0)+1;if(nrp===LOCK_DAY){await planRef.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:LOCK_DAY,totalEarned:(d.totalEarned||0),status:'locked',lockedAt:FV.serverTimestamp(),lockedAtDay:LOCK_DAY});p.status='locked';p.roiPaid=LOCK_DAY;done++;toast('🔒 Locked!',`${p.planName} at Day ${LOCK_DAY}`,'warning')}else if(nrp>=TOTAL_DAYS){await planRef.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:TOTAL_DAYS,totalEarned:(d.totalEarned||0)+d.dailyEarning,status:'completed',completedAt:FV.serverTimestamp()});await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(d.dailyEarning),totalEarnings:FV.increment(d.dailyEarning)});await db.collection('users').doc(currentUser.uid).collection('transactions').add({type:'payout',amount:d.dailyEarning,planId:p.id,planName:p.planName,status:'completed',description:`💰 Final ROI Day ${TOTAL_DAYS} — ${p.planName}`,createdAt:FV.serverTimestamp()});p.status='completed';p.roiPaid=TOTAL_DAYS;p.totalEarned=(p.totalEarned||0)+d.dailyEarning;if(userData)userData.wallet=(userData.wallet||0)+d.dailyEarning;done++;toast('🏆 Completed!',`${p.planName} — all ${TOTAL_DAYS} days!`,'success')}else{await planRef.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:nrp,totalEarned:(d.totalEarned||0)+d.dailyEarning});await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(d.dailyEarning),totalEarnings:FV.increment(d.dailyEarning)});await db.collection('users').doc(currentUser.uid).collection('transactions').add({type:'payout',amount:d.dailyEarning,planId:p.id,planName:p.planName,status:'completed',description:`💰 ROI Day ${nrp} — ${p.planName}`,createdAt:FV.serverTimestamp()});p.roiPaid=nrp;p.totalEarned=(p.totalEarned||0)+d.dailyEarning;p.lastPayoutDate=new Date();if(userData)userData.wallet=(userData.wallet||0)+d.dailyEarning;done++;toast('💰 Payout!',`+${fmt(d.dailyEarning)} (Day ${nrp})`,'success')}}catch(e){}}if(done>0){lastPayoutDate=today;document.getElementById('walletDisplay').textContent=fmt(userData?.wallet||0);renderActivePlans()}}catch(e){}}

  function startWeekendMonitor(){if(weekendCheckTimer)clearInterval(weekendCheckTimer);weekendCheckTimer=setInterval(async()=>{if(isWeekend()&&currentUser){const today=new Date();today.setHours(0,0,0,0);try{const txSnap=await db.collection('users').doc(currentUser.uid).collection('transactions').where('type','==','payout').where('createdAt','>=',today).limit(5).get();let wt=0;txSnap.forEach(doc=>{const tx=doc.data();if(!tx.reversed)wt+=tx.amount||0});if(wt>0){await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(-wt),totalEarnings:FV.increment(-wt)});if(userData)userData.wallet=(userData.wallet||0)-wt;document.getElementById('walletDisplay').textContent=fmt(userData?.wallet||0);toast('🚫 Weekend Blocked','₦'+wt.toLocaleString()+' reversed','warning')}}catch(e){}}},60000)}

  window.buyPlan=async function(planId,capital,name,daily){if(processing)return;if(!userData)return Swal.fire({icon:'error',title:'Please wait',confirmButtonColor:'#0d9488'});if(highestInvested>0&&capital<highestInvested)return Swal.fire({icon:'warning',title:'Amount Rule',html:`Must invest <b>₦${highestInvested.toLocaleString()}</b> or higher.`,confirmButtonColor:'#0d9488'});if((userData.wallet||0)<capital)return Swal.fire({icon:'warning',title:'Insufficient Balance',html:`Need <b>${fmt(capital)}</b><br>Balance: <b>${fmt(userData?.wallet||0)}</b>`,confirmButtonColor:'#0d9488'});const count=allUserPlans.filter(p=>p.planId===planId).length;if(count>=MAX_PER_PLAN)return Swal.fire({icon:'error',title:'Limit Reached',text:`Max ${MAX_PER_PLAN} per plan.`,confirmButtonColor:'#0d9488'});const lockedPlans=allUserPlans.filter(p=>p.status==='locked'),unlockMsg=lockedPlans.length>0?`<p style="color:var(--amber);margin-top:8px;font-size:13px;">🔓 Will <b>UNLOCK ${lockedPlans.length} locked plan(s)</b>!</p>`:'',ww=isWeekend()?`<p style="color:#dc2626;margin-top:8px;font-size:12px;">⚠️ Weekend — first payout Monday 12AM</p>`:'';const ok=await Swal.fire({title:'Confirm Investment',html:`<div style="text-align:center"><b>${name}</b><div style="background:#f0fdfa;border-radius:14px;padding:14px;margin-top:12px;text-align:left"><div>💰 Capital: <b>${fmt(capital)}</b></div><div>📈 Daily: <b style="color:#10b981">${fmt(daily)}</b></div><div>📅 Duration: <b>${TOTAL_DAYS} weekdays</b></div><div>🔒 Locks at: <b style="color:#d97706">Day ${LOCK_DAY}</b></div><div>🏆 Total: <b style="color:#d97706">${fmt(daily*TOTAL_DAYS)}</b></div></div>${unlockMsg}${ww}<p style="margin-top:12px;font-size:12px;color:#64748b">⏰ First payout at 12AM Mon-Fri</p></div>`,icon:'question',showCancelButton:true,confirmButtonText:'Invest Now',confirmButtonColor:'#0d9488'});if(!ok.isConfirmed)return;processing=true;Swal.fire({title:'Processing...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});try{await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(-capital)});const pid='plan_'+Date.now()+'_'+planId;await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(pid).set({planId,planName:name,capital,dailyEarning:daily,totalReturn:daily*TOTAL_DAYS,roiPaid:0,status:'active',startDate:FV.serverTimestamp(),totalEarned:0,lastPayoutDate:null,purchasedOnWeekend:isWeekend(),lockDay:LOCK_DAY,createdAt:FV.serverTimestamp()});let uc=0;for(const lp of lockedPlans){try{await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(lp.id).update({status:'active',unlockedAt:FV.serverTimestamp(),unlockedByPlanId:pid});lp.status='active';uc++}catch(e){}}const rr=await payReferralBonuses(capital);await db.collection('users').doc(currentUser.uid).collection('transactions').add({type:'investment',amount:capital,planName:name,planId:pid,status:'completed',description:'📊 Invested in '+name,createdAt:FV.serverTimestamp()}).catch(()=>{});userData.wallet=(userData.wallet||0)-capital;if(capital>highestInvested)highestInvested=capital;allUserPlans.push({id:pid,planId,planName:name,capital,dailyEarning:daily,roiPaid:0,status:'active',totalEarned:0,lastPayoutDate:null,startDate:new Date()});document.getElementById('walletDisplay').textContent=fmt(userData.wallet);renderPlans();renderActivePlans();Swal.close();await Swal.fire({icon:'success',title:'✅ Active!',html:`${name} — first payout at 12AM Mon-Fri.${uc>0?`<br>🔓 ${uc} plan(s) unlocked!`:''}${rr.paid?`<br>🎁 Ref bonuses: ${rr.details}`:''}`,timer:4500,showConfirmButton:false});toast('🎉 Active!',`${name} earning ${fmt(daily)}/weekday`+(uc>0?` · ${uc} unlocked!`:'')+(rr.paid?' + Ref paid!':''),'success')}catch(e){let msg='Purchase failed.';if(e.code==='resource-exhausted')msg='⚠️ System busy.';Swal.fire({icon:'error',title:'Failed',text:msg,confirmButtonColor:'#ef4444'});await loadAllData()}finally{processing=false}};

  auth.onAuthStateChanged(async user=>{if(!user){window.location.href='login.html';return}currentUser=user;renderPlans();await loadAllData();startMidCD();startWeekendMonitor();if(payoutTimer)clearInterval(payoutTimer);payoutTimer=setInterval(runPayouts,60000);setTimeout(runPayouts,3000)});
  setTimeout(()=>{if(!currentUser)renderPlans()},3000);
</script>
