<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashBridge • Investment Plans</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --bg-dark: #0a0f1e;
  --card-bg: rgba(15, 23, 42, 0.7);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --border: rgba(255, 255, 255, 0.05);
  --glass: rgba(15, 23, 42, 0.5);
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  font-family: 'Plus Jakarta Sans', sans-serif; 
}

body {
  background: #0a0f1e;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
    linear-gradient(145deg, #0f172a 0%, #020617 100%);
  color: var(--text-primary);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 100px;
}

/* Animated Background Blobs */
.blob {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.2;
  animation: float 20s infinite alternate;
  z-index: 0;
  pointer-events: none;
}

.blob-1 {
  top: -100px;
  right: -100px;
  background: linear-gradient(145deg, #6366f1, #a855f7);
  animation-delay: -2s;
}

.blob-2 {
  bottom: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: linear-gradient(145deg, #ec4899, #f59e0b);
  animation-delay: -7s;
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, 30px) scale(1.1); }
}

/* Toast Notification */
.toast-notification {
  position: fixed;
  top: 20px;
  right: 20px;
  min-width: 300px;
  max-width: 400px;
  padding: 1rem 1.2rem;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  color: white;
  font-weight: 500;
  z-index: 9999;
  animation: slideInRight 0.3s ease;
  box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.toast-notification.success { border-left: 4px solid #22c55e; }
.toast-notification.error { border-left: 4px solid #ef4444; }
.toast-notification.warning { border-left: 4px solid #f59e0b; }
.toast-notification.info { border-left: 4px solid #6366f1; }

.toast-notification i {
  font-size: 1.3rem;
}

.toast-notification.success i { color: #22c55e; }
.toast-notification.error i { color: #ef4444; }
.toast-notification.warning i { color: #f59e0b; }
.toast-notification.info i { color: #6366f1; }

.toast-content {
  flex: 1;
}

.toast-title {
  font-weight: 700;
  margin-bottom: 0.2rem;
}

.toast-message {
  font-size: 0.85rem;
  color: #94a3b8;
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(100%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* Payout Notice */
.payout-notice {
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: 20px;
  padding: 1rem 1.5rem;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  backdrop-filter: blur(10px);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { border-color: rgba(99, 102, 241, 0.3); }
  50% { border-color: rgba(236, 72, 153, 0.5); }
}

.payout-notice i {
  font-size: 1.5rem;
  color: var(--primary);
}

.payout-notice span {
  font-size: 0.9rem;
  color: var(--text-light);
}

.payout-notice strong {
  color: var(--success);
}

/* Main Container */
.plans-page {
  position: relative;
  z-index: 10;
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 1.5rem 100px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  animation: slideDown 0.6s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.brand-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: white;
  transform: rotate(-5deg);
  box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.4);
}

.brand-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.wallet-badge {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 30px;
  padding: 0.6rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  backdrop-filter: blur(10px);
}

.wallet-badge i {
  color: #6366f1;
  font-size: 1rem;
}

.wallet-badge span {
  font-size: 0.9rem;
  color: #94a3b8;
}

.wallet-badge strong {
  color: white;
  font-weight: 600;
}

/* Page Title */
.page-title {
  margin-bottom: 2rem;
}

.page-title h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

.page-title p {
  color: #94a3b8;
  font-size: 0.9rem;
}

/* Section Title */
.section-title {
  font-size: 1.3rem;
  font-weight: 600;
  margin: 2rem 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-title i {
  color: #6366f1;
}

.section-title .badge {
  background: rgba(99, 102, 241, 0.15);
  color: var(--primary);
  font-size: 0.7rem;
  padding: 0.2rem 0.8rem;
  border-radius: 30px;
  margin-left: 0.5rem;
}

/* Plans Grid */
.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.5rem;
  margin-bottom: 3rem;
}

/* Plan Card */
.plan-card {
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 28px;
  padding: 2rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.plan-card:hover:not(.locked) {
  transform: translateY(-5px);
  border-color: #6366f1;
  box-shadow: 0 30px 50px -20px rgba(99, 102, 241, 0.4);
}

.popular {
  border: 2px solid #ec4899;
}

.popular::before {
  content: "⭐ POPULAR";
  position: absolute;
  top: 10px;
  right: -30px;
  background: linear-gradient(135deg, #ec4899, #f59e0b);
  color: white;
  padding: 5px 40px;
  font-size: 0.7rem;
  font-weight: 700;
  transform: rotate(45deg);
  box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
}

.purchased {
  border: 2px solid #22c55e;
}

.purchased::before {
  content: "✓ ACTIVE";
  position: absolute;
  top: 10px;
  left: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 0.7rem;
  font-weight: 700;
  box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
}

.plan-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: white;
}

.plan-capital {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1rem;
}

.plan-daily {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 16px;
  padding: 0.8rem;
  margin: 1rem 0;
  text-align: center;
}

.plan-daily span {
  color: #22c55e;
  font-size: 1.2rem;
  font-weight: 600;
  display: block;
  margin-top: 0.3rem;
}

.plan-total {
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 16px;
  padding: 0.8rem;
  text-align: center;
  margin: 1rem 0;
}

.plan-total span {
  color: #f59e0b;
  font-size: 1.2rem;
  font-weight: 600;
  display: block;
  margin-top: 0.3rem;
}

.plan-meta {
  display: flex;
  justify-content: space-between;
  color: #94a3b8;
  font-size: 0.85rem;
  margin: 1rem 0;
  padding: 0.5rem 0;
  border-top: 1px dashed rgba(255, 255, 255, 0.05);
  border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
}

/* Buttons */
.btn {
  width: 100%;
  padding: 0.8rem;
  border: none;
  border-radius: 16px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 40px;
  padding: 0.5rem;
  display: flex;
  gap: 0.5rem;
  z-index: 100;
  box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.5rem 1.2rem;
  border-radius: 30px;
  color: #94a3b8;
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 500;
  transition: all 0.3s ease;
  gap: 0.2rem;
}

.nav-item i {
  font-size: 1rem;
}

.nav-item.active {
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
}

/* Responsive */
@media (max-width: 768px) {
  .plans-page {
    padding: 1rem 1rem 100px;
  }
  .plans-grid {
    grid-template-columns: 1fr;
  }
  .bottom-nav {
    width: 90%;
    padding: 0.3rem;
  }
  .nav-item {
    padding: 0.4rem 0.8rem;
  }
}
</style>
</head>
<body>

<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="plans-page">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, runTransaction,
  updateDoc, increment, serverTimestamp, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;
let processing = false;
let payoutInterval = null;

const formatMoney = (n) => '₦' + Number(n || 0).toLocaleString();

// Convert Firestore Timestamp to JS Date
function toJsDate(val) {
  if (!val) return null;
  if (typeof val.toDate === 'function') return val.toDate();
  if (val instanceof Date) return val;
  return new Date(val);
}

// Toast notification function
const showToast = (title, message, type = 'success') => {
  const toast = document.createElement('div');
  toast.className = `toast-notification ${type}`;
  
  let icon = 'fa-check-circle';
  if (type === 'error') icon = 'fa-exclamation-circle';
  if (type === 'warning') icon = 'fa-exclamation-triangle';
  if (type === 'info') icon = 'fa-info-circle';
  
  toast.innerHTML = `
    <i class="fas ${icon}"></i>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-message">${message}</div>
    </div>
  `;
  
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
};

// INVESTMENT PLANS
const INVESTMENT_PLANS = [
  { id: 'mini', name: 'Mini Plan', capital: 3000, daily: 500, total: 12500, duration: 25, roi: 125 },
  { id: 'starter', name: 'Starter Plan', capital: 5000, daily: 800, total: 20000, duration: 25, roi: 125 },
  { id: 'basic', name: 'Basic Plan', capital: 10000, daily: 1000, total: 25000, duration: 25, roi: 125 },
  { id: 'bronze', name: 'Bronze Plan', capital: 12000, daily: 1200, total: 30000, duration: 25, roi: 125 },
  { id: 'silver', name: 'Silver Plan', capital: 15000, daily: 1500, total: 37500, duration: 25, roi: 125, popular: true },
  { id: 'gold', name: 'Gold Plan', capital: 20000, daily: 2300, total: 57500, duration: 25, roi: 125 },
  { id: 'platinum', name: 'Platinum Plan', capital: 25000, daily: 3200, total: 80000, duration: 25, roi: 125 },
  { id: 'ruby', name: 'Ruby Plan', capital: 30000, daily: 4000, total: 100000, duration: 25, roi: 125 },
  { id: 'emerald', name: 'Emerald Plan', capital: 50000, daily: 7300, total: 183500, duration: 25, roi: 125 },
  { id: 'sapphire', name: 'Sapphire Plan', capital: 60000, daily: 8300, total: 207500, duration: 25, roi: 125 },
  { id: 'diamond', name: 'Diamond Plan', capital: 100000, daily: 15000, total: 375000, duration: 25, roi: 125 },
  { id: 'space', name: 'Space Plan', capital: 200000, daily: 30000, total: 750000, duration: 25, roi: 125 },
  { id: 'drone', name: 'Drone Plan', capital: 300000, daily: 50000, total: 1250000, duration: 25, roi: 125 },
  { id: 'mega', name: 'Mega Plan', capital: 500000, daily: 75000, total: 1875000, duration: 25, roi: 125 }
];

// Load user data and plans
async function loadData() {
  if (!currentUser) return;
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
      showToast('Error', 'User profile not found', 'error');
      return;
    }
    userData = userSnap.data();
    document.getElementById('walletDisplay').textContent = formatMoney(userData.wallet || 0);
    renderPlans(INVESTMENT_PLANS);
    
    const activePlansSnap = await getDocs(collection(db, `users/${currentUser.uid}/activePlans`));
    const activePlans = [];
    activePlansSnap.forEach(d => { if (d.data().status === 'active') activePlans.push({ docId: d.id, ...d.data() }); });
    
    if (activePlans.length > 0) {
      document.getElementById('activeTitle').style.display = 'block';
      renderActivePlans(activePlans);
    } else {
      document.getElementById('activeTitle').style.display = 'none';
      document.getElementById('activePlansContainer').innerHTML = '';
    }
    
    // Run auto-payout engine after loading
    await runAutoPayoutEngine();
    
  } catch (err) {
    console.error('Load error:', err);
    showToast('Error', 'Failed to load data', 'error');
  }
}

function renderPlans(plans) {
  const container = document.getElementById('plansContainer');
  if (!container) return;
  
  container.innerHTML = plans.map((p) => `
    <div class="plan-card ${p.popular ? 'popular' : ''}">
      <div class="plan-name">${p.name}</div>
      <div class="plan-capital">${formatMoney(p.capital)}</div>
      <div class="plan-daily">Daily Earnings<span>${formatMoney(p.daily)}</span></div>
      <div class="plan-total">Total Return<span>${formatMoney(p.total)}</span></div>
      <div class="plan-meta"><span><i class="fas fa-clock"></i> ${p.duration} days</span><span><i class="fas fa-chart-line"></i> ${p.roi}% ROI</span></div>
      <button class="btn btn-primary" onclick="buyPlan('${p.id}', ${p.capital}, '${p.name}', ${p.daily}, ${p.total}, ${p.duration}, ${p.roi})"><i class="fas fa-rocket"></i> Invest Now</button>
    </div>
  `).join('');
}

function renderActivePlans(plans) {
  const container = document.getElementById('activePlansContainer');
  if (!container) return;

  container.innerHTML = plans.map(p => {
    const daysLeft = p.daysLeft || 0;
    // Compute next payout time from lastClaimed or startDate
    const lastClaimedDate = toJsDate(p.lastClaimed) || toJsDate(p.startDate) || new Date();
    const nextPayoutTime = new Date(lastClaimedDate.getTime() + 24 * 60 * 60 * 1000);
    const countdownId = `countdown_${p.docId}`;
    return `
      <div class="plan-card purchased">
        <div class="plan-name">${p.planName}</div>
        <div class="plan-capital">${formatMoney(p.capital)}</div>
        <div class="days-left"><i class="fas fa-hourglass-half"></i> Days Left: ${daysLeft}</div>
        <div class="plan-daily">
          Next Auto-Payout in
          <span id="${countdownId}" style="font-family:monospace;color:#f59e0b;font-size:1.1rem;">--:--:--</span>
        </div>
        <div class="plan-daily">Daily Earnings<span>${formatMoney(p.dailyEarning)}</span></div>
      </div>
    `;
  }).join('');

  // Start live countdowns
  plans.forEach(p => {
    const lastClaimedDate = toJsDate(p.lastClaimed) || toJsDate(p.startDate) || new Date();
    const nextPayoutTime = new Date(lastClaimedDate.getTime() + 24 * 60 * 60 * 1000);
    const countdownId = `countdown_${p.docId}`;
    startCountdown(countdownId, nextPayoutTime);
  });
}

// Countdown timers map so we can clear them later
const activeCountdowns = {};

function startCountdown(elementId, targetTime) {
  // Clear any existing interval for this element
  if (activeCountdowns[elementId]) clearInterval(activeCountdowns[elementId]);

  function update() {
    const el = document.getElementById(elementId);
    if (!el) { clearInterval(activeCountdowns[elementId]); return; }
    const now = Date.now();
    const diff = targetTime.getTime() - now;
    if (diff <= 0) {
      el.textContent = '✅ Ready!';
      el.style.color = '#22c55e';
      clearInterval(activeCountdowns[elementId]);
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  update(); // run immediately
  activeCountdowns[elementId] = setInterval(update, 1000);
}

// ============================================================
// AUTO PAYOUT ENGINE - Works like Primevest
// Runs when page loads and every hour
// ============================================================
async function runAutoPayoutEngine() {
  if (!currentUser) return;
  
  const notice = document.getElementById('payoutNotice');
  const statusEl = document.getElementById('payoutStatus');
  const now = new Date();
  
  try {
    // Get all active investments
    const investmentsRef = collection(db, `users/${currentUser.uid}/activePlans`);
    const investmentsSnap = await getDocs(investmentsRef);
    
    if (investmentsSnap.empty) return;
    
    const pendingPayouts = [];
    
    investmentsSnap.forEach(doc => {
      const inv = { id: doc.id, ...doc.data() };
      if (inv.status !== 'active') return;
      if (inv.daysLeft <= 0) return;
      
      const lastClaimed = inv.lastClaimed?.toDate?.() || inv.startDate?.toDate?.() || new Date();
      const nextPayout = new Date(lastClaimed.getTime() + (24 * 60 * 60 * 1000));
      
      // Check if payout is due
      if (now >= nextPayout) {
        // Calculate how many days overdue
        const msOverdue = now.getTime() - nextPayout.getTime();
        const daysOverdue = Math.floor(msOverdue / (24 * 60 * 60 * 1000)) + 1;
        const maxDays = Math.min(daysOverdue, inv.daysLeft);
        
        if (maxDays > 0) {
          pendingPayouts.push({
            inv,
            cycles: maxDays,
            totalCredit: inv.dailyEarning * maxDays
          });
        }
      }
    });
    
    if (pendingPayouts.length === 0) return;
    
    // Show notice
    notice.style.display = 'flex';
    let processed = 0;
    let totalCredited = 0;
    
    for (const { inv, cycles, totalCredit } of pendingPayouts) {
      try {
        const userRef = doc(db, 'users', currentUser.uid);
        const planRef = doc(db, `users/${currentUser.uid}/activePlans`, inv.id);
        
        await runTransaction(db, async (t) => {
          const planSnap = await t.get(planRef);
          if (!planSnap.exists() || planSnap.data().status !== 'active') return;
          
          const planData = planSnap.data();
          const newDaysLeft = planData.daysLeft - cycles;
          const newTotalEarned = (planData.totalEarned || 0) + totalCredit;
          const newLastClaimed = new Date();
          
          t.update(planRef, {
            lastClaimed: serverTimestamp(),
            daysLeft: newDaysLeft,
            totalEarned: newTotalEarned,
            ...(newDaysLeft <= 0 && { status: 'completed', completedAt: serverTimestamp() })
          });
          
          t.update(userRef, {
            wallet: increment(totalCredit),
            totalEarnings: increment(totalCredit)
          });
          
          // Create transaction record
          const txRef = doc(collection(db, `users/${currentUser.uid}/transactions`));
          t.set(txRef, {
            type: 'auto_roi',
            amount: totalCredit,
            days: cycles,
            dailyRate: inv.dailyEarning,
            planName: inv.planName,
            investmentId: inv.id,
            description: `Auto-payout: ${cycles} day(s) of ROI from ${inv.planName}`,
            status: 'completed',
            createdAt: serverTimestamp()
          });
        });
        
        processed++;
        totalCredited += totalCredit;
        statusEl.textContent = `Credited ${processed}/${pendingPayouts.length} payouts`;
        
        showToast('💰 Auto-Payout!', `${formatMoney(totalCredit)} credited from ${inv.planName}${cycles > 1 ? ` (${cycles} days)` : ''}`, 'success');
        
      } catch (error) {
        console.error('Auto-payout error:', inv.id, error);
      }
    }
    
    if (processed > 0) {
      // Update displayed balance
      userData.wallet = (userData.wallet || 0) + totalCredited;
      document.getElementById('walletDisplay').textContent = formatMoney(userData.wallet);
      
      // Show final notice
      statusEl.textContent = `${processed} payout(s) processed! ₦${totalCredited.toLocaleString()} credited`;
      setTimeout(() => {
        notice.style.display = 'none';
      }, 5000);
      
      // Reload data to update active plans display
      await loadData();
    } else {
      notice.style.display = 'none';
    }
    
  } catch (error) {
    console.error('Auto-payout engine error:', error);
    notice.style.display = 'none';
  }
}

// ============================================================
// REFERRAL BONUS DISTRIBUTION — FIXED
// ============================================================
async function payReferralBonuses(investmentAmount) {
  console.log('\n💰💰💰 PAYING REFERRAL BONUSES 💰💰💰');
  console.log('Investment Amount:', formatMoney(investmentAmount));

  try {
    // Always fetch a fresh copy of the current user's data
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) { console.warn('User doc not found'); return; }

    const currentUserData = userSnap.data();
    const referralChain = {
      level1: currentUserData.referredBy      || null,
      level2: currentUserData.level2Referrer  || null,
      level3: currentUserData.level3Referrer  || null
    };
    console.log('Referral Chain:', referralChain);

    const levels = [
      { uid: referralChain.level1, rate: 0.20, label: 'Level 1 (20%)' },
      { uid: referralChain.level2, rate: 0.02, label: 'Level 2 (2%)'  },
      { uid: referralChain.level3, rate: 0.01, label: 'Level 3 (1%)'  }
    ];

    let bonusesPaid = 0;

    for (let i = 0; i < levels.length; i++) {
      const { uid, rate, label } = levels[i];
      if (!uid) { console.log(`${label}: No referrer — skipping`); continue; }

      const bonus = Math.floor(investmentAmount * rate);
      if (bonus <= 0) continue;

      try {
        const uplinerRef = doc(db, 'users', uid);

        // Use a transaction to safely credit the upliner
        await runTransaction(db, async (t) => {
          const uplinerSnap = await t.get(uplinerRef);
          if (!uplinerSnap.exists()) {
            console.warn(`${label}: Upliner ${uid} not found — skipping`);
            return;
          }

          // Credit wallet and totalEarnings atomically
          t.update(uplinerRef, {
            wallet:        increment(bonus),
            totalEarnings: increment(bonus)
          });

          // Update referral record — use plain values, no serverTimestamp inside set+merge with increment
          const referralRef = doc(db, `users/${uid}/referrals`, currentUser.uid);
          t.set(referralRef, {
            referredUserId:      currentUser.uid,
            referredUserName:    currentUserData.fullName  || 'User',
            referredUserEmail:   currentUserData.email     || '',
            referredUsername:    currentUserData.username  || 'user',
            level:               i + 1,
            commission:          rate * 100,
            lastInvestment:      investmentAmount,
            lastInvestmentDate:  serverTimestamp(),
            updatedAt:           serverTimestamp()
          }, { merge: true });

          // Separate increment update so it doesn't clash with serverTimestamp in set
          t.update(referralRef, { totalEarned: increment(bonus) });
        });

        console.log(`✅ ${label}: ₦${bonus.toLocaleString()} sent to ${uid}`);
        bonusesPaid++;

        const toastType = label.startsWith('Level 1') ? 'success' : label.startsWith('Level 2') ? 'info' : 'warning';
        showToast('💰 Referral Bonus!', `${label}: ${formatMoney(bonus)} credited to upliner`, toastType);

      } catch (err) {
        console.error(`❌ ${label} bonus failed:`, err.message);
      }
    }

    if (bonusesPaid > 0) {
      showToast('🎉 Referral Bonuses Sent!', `${bonusesPaid} upliner(s) rewarded successfully`, 'success');
    } else {
      console.log('No referral bonuses paid (no referral chain found).');
    }

  } catch (error) {
    console.error('❌ Referral payment error:', error);
  }
}
