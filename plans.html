<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashBridge • Investment Plans</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root {
  --bg: #0a0e17;
  --card: rgba(15, 23, 42, 0.65);
  --text: #f1f5f9;
  --text-light: #94a3b8;
  --primary: #22c55e;
  --accent: #eab308;
  --border: rgba(34, 197, 94, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

body {
  background: linear-gradient(to bottom, #0a0e17, #020617);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

.hero-header {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  padding: 4rem 5% 3.5rem;
  text-align: center;
  position: relative;
  border-bottom-left-radius: 36px;
  border-bottom-right-radius: 36px;
}

.hero-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  margin-bottom: 1rem;
}

.wallet-balance {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.9);
  font-weight: 600;
}

.wallet-balance span {
  font-size: 1.8rem;
  color: #fff;
  font-weight: 700;
}

.container {
  max-width: 1400px;
  margin: -3rem auto 0;
  padding: 0 5%;
  position: relative;
  z-index: 2;
}

.section-title {
  font-size: 2.2rem;
  color: var(--accent);
  text-align: center;
  margin: 4rem 0 2.5rem;
  font-family: 'Playfair Display', serif;
}

.section-title::after {
  content: '';
  width: 80px;
  height: 4px;
  background: linear-gradient(to right, var(--primary), var(--accent));
  display: block;
  margin: 1rem auto;
  border-radius: 2px;
}

.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2rem;
  margin-bottom: 3rem;
}

.plan-card {
  background: var(--card);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.plan-card:hover:not(.locked) {
  transform: translateY(-12px);
  border-color: var(--primary);
  box-shadow: 0 30px 70px rgba(34,197,94,0.3);
}

.popular::after {
  content: "⭐ POPULAR";
  position: absolute;
  top: 16px;
  right: -45px;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  color: #000;
  padding: 8px 60px;
  font-size: 0.85rem;
  font-weight: 800;
  transform: rotate(45deg);
  box-shadow: 0 4px 15px rgba(234,179,8,0.4);
}

.locked {
  opacity: 0.6;
  filter: grayscale(0.5);
}

.locked::before {
  content: "🔒 LOCKED";
  position: absolute;
  top: 20px;
  left: 20px;
  background: #ef4444;
  color: #fff;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 800;
  z-index: 1;
}

.unlock-requirement {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid #ef4444;
  border-radius: 12px;
  padding: 1rem;
  margin: 1rem 0;
  color: #fca5a5;
  font-size: 0.9rem;
}

.plan-name {
  font-size: 1.8rem;
  color: var(--accent);
  margin-bottom: 1rem;
  font-weight: 700;
  font-family: 'Playfair Display', serif;
}

.capital {
  font-size: 2.8rem;
  color: var(--primary);
  font-weight: 700;
  margin: 1rem 0;
}

.daily {
  background: rgba(34,197,94,0.15);
  padding: 1rem;
  border-radius: 12px;
  font-size: 1.3rem;
  color: var(--primary);
  margin: 1rem 0;
  font-weight: 600;
}

.total {
  background: linear-gradient(135deg, var(--primary), #16a34a);
  color: white;
  padding: 1.2rem;
  border-radius: 12px;
  font-size: 1.5rem;
  font-weight: 700;
  margin: 1rem 0;
  box-shadow: 0 8px 20px rgba(34,197,94,0.3);
}

.btn-buy, .btn-claim {
  width: 100%;
  padding: 1.2rem;
  background: linear-gradient(135deg, var(--primary), #16a34a);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(34,197,94,0.4);
  margin-top: 1rem;
}

.btn-buy:hover:not(:disabled), .btn-claim:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(34,197,94,0.6);
}

.btn-buy:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-claim {
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 10px 30px rgba(234,179,8,0.4); }
  50% { box-shadow: 0 15px 40px rgba(234,179,8,0.7); }
}

.purchased {
  border: 2px solid var(--primary);
}

.purchased::before {
  content: "✓ ACTIVE";
  position: absolute;
  top: 20px;
  left: 20px;
  background: var(--primary);
  color: #000;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 800;
  z-index: 1;
}

.countdown {
  font-size: 1.3rem;
  color: var(--accent);
  font-weight: 700;
  margin: 1.5rem 0;
  background: rgba(234,179,8,0.1);
  border-radius: 12px;
  padding: 0.8rem;
}

.days-left {
  font-size: 0.95rem;
  color: var(--text-light);
  margin-top: 0.5rem;
}

.toast {
  position: fixed;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  padding: 1.2rem 2.5rem;
  border-radius: 50px;
  color: white;
  font-weight: 700;
  z-index: 3000;
  animation: slideDown 0.5s ease;
  max-width: 90%;
  text-align: center;
}

.toast.gold { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #000; }
.toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
.toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); color: #000; }

@keyframes slideDown {
  from { transform: translateY(-150px) translateX(-50%); opacity: 0; }
  to { transform: translateY(0) translateX(-50%); opacity: 1; }
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 1rem 0;
  z-index: 1000;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  color: var(--text-light);
  text-decoration: none;
  font-size: 0.85rem;
  transition: all 0.3s;
}

.nav-item i { font-size: 1.5rem; }
.nav-item:hover, .nav-item.active { color: var(--primary); }

@media (max-width: 768px) {
  .plans-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="hero-header">
  <h1>🚀 Investment Plans</h1>
  <div class="wallet-balance">
    💰 Balance: <span id="walletDisplay">₦0</span>
  </div>
</div>

<div class="container">
  <h2 class="section-title">Choose Your Plan</h2>
  <div class="plans-grid" id="plansContainer">
    <p style="text-align:center;">Loading plans...</p>
  </div>

  <h2 class="section-title" id="activeTitle" style="display:none;">My Active Plans</h2>
  <div class="plans-grid" id="activePlansContainer"></div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <i class="fas fa-home"></i>
    <span>Home</span>
  </a>
  <a href="plans.html" class="nav-item active">
    <i class="fas fa-chart-line"></i>
    <span>Plans</span>
  </a>
  <a href="withdrawal.html" class="nav-item">
    <i class="fas fa-money-bill-wave"></i>
    <span>Withdraw</span>
  </a>
  <a href="profile.html" class="nav-item">
    <i class="fas fa-user"></i>
    <span>Profile</span>
  </a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, runTransaction,
  updateDoc, setDoc, increment, serverTimestamp, query, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;
let processing = false;
let timers = new Map();

const money = (n) => '₦' + Number(n || 0).toLocaleString();

const toast = (msg, type = 'success') => {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
};

async function loadData() {
  if (!currentUser) return;
  
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    
    if (!userSnap.exists()) {
      toast('User profile not found', 'error');
      return;
    }
    
    userData = userSnap.data();
    document.getElementById('walletDisplay').textContent = money(userData.wallet || 0);
    
    // Load investment plans
    const plansSnap = await getDocs(collection(db, 'plans'));
    const plans = [];
    plansSnap.forEach(d => plans.push({ id: d.id, ...d.data() }));
    
    renderPlans(plans);
    
    // Load user's active plans
    const activePlansSnap = await getDocs(collection(db, `users/${currentUser.uid}/activePlans`));
    const activePlans = [];
    activePlansSnap.forEach(d => {
      const data = d.data();
      if (data.status === 'active') {  // ONLY active plans
        activePlans.push({ docId: d.id, ...data });
      }
    });
    
    if (activePlans.length > 0) {
      document.getElementById('activeTitle').style.display = 'block';
      renderActivePlans(activePlans);
    } else {
      document.getElementById('activeTitle').style.display = 'none';
      document.getElementById('activePlansContainer').innerHTML = '';
    }
    
  } catch (err) {
    console.error('Load error:', err);
    toast('Failed to load data', 'error');
  }
}

function renderPlans(plans) {
  const container = document.getElementById('plansContainer');
  
  if (plans.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-light)">No plans available</p>';
    return;
  }
  
  container.innerHTML = plans.map((p, i) => `
    <div class="plan-card ${i === 1 ? 'popular' : ''}">
      <div class="plan-name">${p.name}</div>
      <div class="capital">${money(p.capital)}</div>
      <div class="daily">Daily: ${money(p.daily)}</div>
      <div class="total">Total: ${money(p.total)}</div>
      <p style="margin:1rem 0;color:var(--text-light)">Duration: ${p.duration || 30} days</p>
      <p style="margin:0.5rem 0;color:var(--text-light);font-size:0.9rem">ROI: ${p.roi}%</p>
      <button class="btn-buy" onclick="buyPlan('${p.id}', ${p.capital}, '${p.name}', ${p.daily}, ${p.total}, ${p.duration || 30}, ${p.roi})">
        <i class="fas fa-shopping-cart"></i> Invest Now
      </button>
    </div>
  `).join('');
}

function renderActivePlans(plans) {
  const container = document.getElementById('activePlansContainer');
  
  container.innerHTML = plans.map(p => {
    const lastClaimed = p.lastClaimed?.toMillis?.() || p.startDate?.toMillis?.() || Date.now();
    const nextClaim = lastClaimed + (24 * 60 * 60 * 1000);
    const canClaim = Date.now() >= nextClaim;
    const daysLeft = p.daysLeft || 0;
    
    return `
      <div class="plan-card purchased">
        <div class="plan-name">${p.planName}</div>
        <div class="capital">${money(p.capital)}</div>
        <div class="days-left">Days Left: ${daysLeft}</div>
        ${canClaim && daysLeft > 0 ? 
          `<button class="btn-claim" onclick="claim('${p.docId}', ${p.dailyEarning})">
            <i class="fas fa-gift"></i> Claim ${money(p.dailyEarning)}
          </button>` :
          `<div class="countdown">
            <div class="timer" data-next="${nextClaim}">Calculating...</div>
          </div>`
        }
      </div>
    `;
  }).join('');
  
  startTimers();
}

window.buyPlan = async function(planId, capital, name, daily, total, duration, roi) {
  if (processing) return;
  
  if (!userData || userData.wallet < capital) {
    return Swal.fire({
      icon: 'warning',
      title: 'Insufficient Balance',
      html: `You need ${money(capital)} to invest in this plan.<br>Current balance: ${money(userData?.wallet || 0)}`,
      confirmButtonColor: '#22c55e'
    });
  }
  
  const result = await Swal.fire({
    title: `Invest in ${name}?`,
    html: `
      <div style="text-align:left;line-height:2;padding:1rem">
        <p><b>Capital:</b> ${money(capital)}</p>
        <p><b>Daily Earnings:</b> ${money(daily)}</p>
        <p><b>Total Return:</b> ${money(total)}</p>
        <p><b>Duration:</b> ${duration} days</p>
        <p><b>ROI:</b> ${roi}%</p>
        <hr style="margin:1rem 0">
        <p style="color:#22c55e"><b>Your new balance:</b> ${money((userData.wallet || 0) - capital)}</p>
      </div>
    `,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Yes, Invest!',
    confirmButtonColor: '#22c55e'
  });
  
  if (!result.isConfirmed) return;
  
  processing = true;
  Swal.fire({ title: 'Processing Investment...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const docId = `plan_${Date.now()}_${planId}`;
    const planRef = doc(db, `users/${currentUser.uid}/activePlans`, docId);
    
    // Investment transaction
    await runTransaction(db, async (t) => {
      const snap = await t.get(userRef);
      if (!snap.exists() || snap.data().wallet < capital) {
        throw new Error("Insufficient funds");
      }
      
      t.update(userRef, {
        wallet: increment(-capital)
      });
      
      t.set(planRef, {
        planId: planId,
        planName: name,
        capital: capital,
        dailyEarning: daily,
        totalReturn: total,
        roi: roi,
        duration: duration,
        daysLeft: duration,
        status: 'active',
        startDate: serverTimestamp(),
        endDate: new Date(Date.now() + (duration * 24 * 60 * 60 * 1000)),
        lastClaimed: serverTimestamp(),
        createdAt: serverTimestamp(),
        totalEarned: 0
      });
    });
    
    console.log('✅ Investment successful');
    
    // CRITICAL: Pay referral bonuses AFTER transaction
    await payReferralBonuses(capital);
    
    Swal.fire({
      icon: 'success',
      title: 'Investment Successful!',
      html: `${name} Plan activated!<br>Earn ${money(daily)} daily for ${duration} days!`,
      confirmButtonColor: '#22c55e',
      timer: 3000
    });
    
    toast(`${name} Plan Activated!`, 'success');
    await loadData();
    
  } catch (err) {
    console.error('❌ Investment error:', err);
    Swal.fire({ 
      icon: 'error', 
      title: 'Investment Failed', 
      text: err.message, 
      confirmButtonColor: '#22c55e' 
    });
  } finally {
    processing = false;
  }
}

// FIXED REFERRAL BONUS SYSTEM

  console.log('\n💰💰💰 REFERRAL BONUS PAYMENT STARTING 💰💰💰');
  console.log('Investment Amount:', money(investmentAmount));
  console.log('Current User:', currentUser.uid);
  console.log('═════════════════════════════════════════════\n');
  
  try {
    // Get current user's referral data
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    
    if (!userSnap.exists()) {
      console.log('❌ User not found');
      return;
    }
    
    const currentUserData = userSnap.data();
    console.log('User Data:', {
      referredBy: currentUserData.referredBy,
      level2Referrer: currentUserData.level2Referrer,
      level3Referrer: currentUserData.level3Referrer
    });
    
    // LEVEL 1: Direct Referrer - 20%
    if (currentUserData.referredBy) {
      const level1Bonus = Math.floor(investmentAmount * 0.20);

      console.log('Referrer ID:', currentUserData.referredBy);
      console.log('Bonus Amount:', money(level1Bonus), '(20%)');
      
      try {
        const level1Ref = doc(db, 'users', currentUserData.referredBy);
        const level1Snap = await getDoc(level1Ref);

window.claim = async function(docId, daily) {
  if (processing) return;
  
  processing = true;
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const planRef = doc(db, `users/${currentUser.uid}/activePlans`, docId);
    
    await runTransaction(db, async (t) => {
      const snap = await t.get(planRef);
      if (!snap.exists()) throw new Error("Plan not found");
      
      const data = snap.data();
      const lastTime = data.lastClaimed?.toMillis?.() || data.startDate?.toMillis?.();
      
      if (Date.now() - lastTime < 24 * 60 * 60 * 1000 - 5000) {
        throw new Error("Please wait 24 hours between claims");
      }
      
      if (data.daysLeft <= 0 || data.status !== 'active') {
        throw new Error("Plan has ended");
      }
      
      const newDays = data.daysLeft - 1;
      const newEarned = (data.totalEarned || 0) + daily;
      
      t.update(planRef, {
        lastClaimed: serverTimestamp(),
        daysLeft: newDays,
        totalEarned: newEarned,
        ...(newDays <= 0 && { 
          status: 'completed', 
          completedAt: serverTimestamp() 
        })
      });
      
      t.update(userRef, {
        wallet: increment(daily),
        totalEarnings: increment(daily)
      });
    });
    
    Swal.fire({
      icon: 'success',
      title: 'Claimed!',
      html: `Earned <strong style="color:#22c55e;">${money(daily)}</strong>`,
      timer: 2500,
      showConfirmButton: false
    });
    
    toast(`${money(daily)} credited!`, 'success');
    await loadData();
    
  } catch (err) {
    Swal.close();
    toast(err.message, 'error');
  } finally {
    processing = false;
  }
}

function formatTime(ms) {
  if (ms <= 0) return "Ready to claim!";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimers() {
  timers.forEach(clearInterval);
  timers.clear();
  
  document.querySelectorAll('.timer').forEach(el => {
    const next = Number(el.dataset.next);
    const update = () => {
      const remaining = next - Date.now();
      el.textContent = formatTime(remaining);
      if (remaining <= 0) {
        clearInterval(interval);
        loadData();
      }
    };
    update();
    const interval = setInterval(update, 1000);
    timers.set(el, interval);
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  await loadData();
  setInterval(loadData, 60000); // Refresh every minute
});

window.addEventListener('beforeunload', () => {
  timers.forEach(clearInterval);
  timers.clear();
});
</script>
