<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
  <title>TEXIS · Investment Plans</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--teal:#0d9488;--teal-dark:#0f766e;--teal-light:#14b8a6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--gold:#f4b942;--bg:#f0f4f8;--card:#fff;--text:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--shadow-sm:0 1px 3px rgba(0,0,0,.04);--shadow:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 12px 32px rgba(0,0,0,.08);--radius:20px;--radius-sm:14px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:110px;background-image:radial-gradient(ellipse at 0% 0%,#e0f2fe 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,#ccfbf1 0%,transparent 50%)}
    
    .topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .topbar .brand{display:flex;align-items:center;gap:10px;font-family:'Outfit',sans-serif;font-weight:800;font-size:19px}
    .topbar .brand .dot{width:10px;height:10px;background:var(--teal);border-radius:50%;box-shadow:0 0 12px var(--teal-light)}
    .balance-pill{background:linear-gradient(135deg,#f0fdfa,#e6fffa);border:1px solid #99f6e4;border-radius:30px;padding:8px 18px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
    .balance-pill i{color:var(--teal)}
    
    .main{max-width:1000px;margin:0 auto;padding:24px 16px}
    .page-head{margin-bottom:24px;text-align:center}
    .page-head h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
    .page-head p{font-size:14px;color:var(--sub)}
    .badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
    .badge{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px}
    .badge-warn{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
    .badge-info{background:#f0fdfa;color:var(--teal);border:1px solid #99f6e4}
    .badge-lock{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .badge-weekend{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    
    .section-head{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;margin:8px 0 16px;display:flex;align-items:center;gap:8px}
    .section-head i{color:var(--teal)}
    
    .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
    .plan-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all .25s;position:relative;box-shadow:var(--shadow-sm)}
    .plan-card:hover{border-color:var(--teal);box-shadow:var(--shadow-lg);transform:translateY(-3px)}
    .plan-card.featured{border:2px solid var(--teal);background:linear-gradient(180deg,#f0fdfa,#fff)}
    .plan-card.locked-plan{opacity:.5;pointer-events:none;background:#f8fafc}
    .plan-card .pop-tag{position:absolute;top:12px;right:12px;background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:10px}
    .plan-card .pc-icon{font-size:34px;margin-bottom:12px}
    .plan-card .pc-name{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
    .plan-card .pc-price{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--teal);margin-bottom:14px}
    .plan-card .pc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f1f5f9}
    .plan-card .pc-row:last-of-type{border:none}
    .pc-row .lbl{color:var(--muted)}.pc-row .val{font-weight:700}
    .pc-row .val.grn{color:var(--green)}.pc-row .val.amb{color:var(--amber)}
    .buy-btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;font-family:inherit;box-shadow:0 4px 16px rgba(13,148,136,.2)}
    .buy-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,148,136,.3)}
    .buy-btn:disabled{background:#cbd5e1;color:#94a3b8;cursor:not-allowed;box-shadow:none}
    
    /* ACTIVE PLAN CARD */
    .active-card{background:var(--card);border:2px solid #bbf7d0;border-radius:var(--radius);padding:22px;position:relative;box-shadow:var(--shadow-sm)}
    .active-card.locked-card{border-color:var(--amber);background:linear-gradient(180deg,#fffbeb,#fff)}
    .active-card .ac-badge{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;padding:5px 12px;border-radius:10px}
    .ac-badge.active-badge{background:#f0fdf4;color:var(--green)}
    .ac-badge.locked-badge{background:#fffbeb;color:#d97706}
    .ac-badge.completed-badge{background:#f0fdfa;color:var(--teal)}
    
    .locked-alert{background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-top:10px;font-size:11px;color:#92400e;display:flex;align-items:center;gap:8px}
    
    .countdown{margin-top:12px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;padding:12px;text-align:center;font-family:'Outfit',monospace}
    .countdown .cd-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .countdown .cd-time{font-size:20px;font-weight:700;color:var(--teal)}
    .countdown.weekend{background:#fef2f2;border-color:#fecaca}
    .countdown.weekend .cd-time{color:#dc2626}
    
    .weekend-notice{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;margin-top:10px;font-size:12px;color:#dc2626;display:flex;align-items:center;gap:8px}
    
    .toast{position:fixed;bottom:100px;right:20px;background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 12px 32px rgba(0,0,0,.1);display:flex;align-items:center;gap:12px;z-index:999;animation:slideIn .3s ease;border-left:4px solid var(--teal);max-width:380px}
    @keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
    .toast i{font-size:20px}.toast.success{border-color:var(--green)}.toast.warning{border-color:var(--amber)}
    
    .bottom-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:50px;padding:6px 10px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.08);z-index:200}
    .nav-item{padding:12px 18px;border-radius:40px;display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-weight:600;font-size:12px;transition:all .2s}
    .nav-item.active{background:var(--teal);color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.3)}
    .nav-item:hover:not(.active){color:var(--teal);background:rgba(13,148,136,.05)}
    
    @media(max-width:600px){.plans-grid{grid-template-columns:1fr}.nav-item span{display:none}.nav-item{padding:12px 14px}}
  </style>
</head>
<body>

<div class="topbar"><div class="brand"><div class="dot"></div>TEXIS</div><div class="balance-pill"><i class="fas fa-wallet"></i> <span id="walletDisplay">₦0</span></div></div>

<div class="main">
  <div class="page-head">
    <h1>Investment Plans</h1>
    <p>Earn daily ROI on weekdays at 12:00 AM · 7-day unlocking system</p>
    <div class="badges">
      <span class="badge badge-lock"><i class="fas fa-lock"></i> 7-Day Lock System</span>
      <span class="badge badge-info"><i class="fas fa-clock"></i> Payout 12AM Weekdays</span>
      <span class="badge badge-weekend"><i class="fas fa-calendar-xmark"></i> No ROI Sat-Sun</span>
      <span class="badge badge-info"><i class="fas fa-gift"></i> Ref Bonus: 1st Purchase</span>
    </div>
  </div>

  <div class="section-head"><i class="fas fa-store"></i> Available Plans</div>
  <div class="plans-grid" id="plansContainer">
    <div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="font-size:28px;display:block;margin-bottom:12px;"></i>Loading plans...</div>
  </div>

  <div class="section-head" id="activeTitle" style="display:none;"><i class="fas fa-chart-line"></i> My Investments <span id="activeCount" style="font-size:14px;color:var(--muted);">0</span></div>
  <div class="plans-grid" id="activePlansContainer"></div>
</div>

<div class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
  <a href="plans.html" class="nav-item active"><i class="fas fa-layer-group"></i><span>Plans</span></a>
  <a href="referral.html" class="nav-item"><i class="fas fa-users"></i><span>Referral</span></a>
  <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
</div>

<script>
  // ✅ NEW FIREBASE CONFIG — TEXIS Phase 2
  const firebaseConfig = {
    apiKey: "AIzaSyCoya4moqwNCuVI-EtzLcMt2gD6QNUdyCQ",
    authDomain: "texis-b7180.firebaseapp.com",
    projectId: "texis-b7180",
    storageBucket: "texis-b7180.firebasestorage.app",
    messagingSenderId: "848854390209",
    appId: "1:848854390209:web:c5babd1ca5e0e42ba08b40"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const FV = firebase.firestore.FieldValue;
  const fmt = v => '₦' + Number(v || 0).toLocaleString();

  // ✅ PLAN DEFINITIONS (5 plans, 20 weekdays each)
  const ALL_PLANS = [
    { id: 1, name: '📊 Basic Plan', capital: 10000, daily: 1000, days: 20, totalProfit: 20000, icon: 'fa-chart-simple', popular: false },
    { id: 2, name: '📈 Silver Plan', capital: 20000, daily: 2000, days: 20, totalProfit: 40000, icon: 'fa-chart-line', popular: false },
    { id: 3, name: '🥇 Gold Plan', capital: 30000, daily: 3000, days: 20, totalProfit: 60000, icon: 'fa-coins', popular: false },
    { id: 4, name: '💎 Platinum Plan', capital: 40000, daily: 4000, days: 20, totalProfit: 80000, icon: 'fa-gem', popular: false },
    { id: 5, name: '👑 Diamond Plan', capital: 50000, daily: 5000, days: 20, totalProfit: 100000, icon: 'fa-crown', popular: true }
  ];

  // ✅ CORRECTED REFERRAL RATES
  const REF_RATES = { level1: 0.10, level2: 0.02, level3: 0.01 };
  const LOCK_DAY = 7; // Lock after 7 ROI payouts
  const TOTAL_DAYS = 20; // Total duration
  const MAX_PER_PLAN = 3;

  let currentUser = null, userData = null, processing = false;
  let allUserPlans = []; // All plans from Firestore
  let countdownTimer = null, payoutTimer = null, weekendCheckTimer = null;
  let lastPayoutDate = '';
  let highestInvested = 0; // Track highest investment amount

  // ✅ WEEKEND CHECK
  function isWeekend(date) { if (!date) date = new Date(); const d = date.getDay(); return d === 0 || d === 6; }
  function getNextWeekdayPayout() { const now = new Date(); let next = new Date(now); next.setHours(24, 0, 0, 0); while (isWeekend(next)) next.setDate(next.getDate() + 1); return next; }
  function msToNextPayout() { return getNextWeekdayPayout() - new Date(); }

  function toast(t, m, s = 'success') {
    const icons = { success: 'check-circle', warning: 'exclamation-triangle', error: 'exclamation-circle' };
    const e = document.createElement('div');
    e.className = `toast ${s}`;
    e.innerHTML = `<i class="fas fa-${icons[s] || icons.success}"></i><div><b>${t}</b><br><small>${m}</small></div>`;
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 4500);
  }

  function fmtCD(ms) {
    if (ms <= 0) return '00:00:00';
    const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }

  function updateMidCD() {
    const now = new Date(), isWeekendNow = isWeekend(now), ms = msToNextPayout(), display = fmtCD(ms);
    document.querySelectorAll('.cd-time').forEach(e => e.textContent = display);
    document.querySelectorAll('.countdown').forEach(e => { if (isWeekendNow) e.classList.add('weekend'); else e.classList.remove('weekend'); });
    document.querySelectorAll('.cd-label').forEach(e => { if (isWeekendNow) e.innerHTML = '<i class="fas fa-calendar-xmark"></i> Weekend — Next Payout Monday'; else e.innerHTML = '<i class="fas fa-hourglass-half"></i> Next Payout 12AM'; });
  }

  function startMidCD() { if (countdownTimer) clearInterval(countdownTimer); updateMidCD(); countdownTimer = setInterval(updateMidCD, 1000); }

  // ✅ PAYOUT DUE CHECK
  function payoutDue(lastPayoutDate) {
    if (!lastPayoutDate) return false;
    const now = new Date();
    if (isWeekend(now)) return false;
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const lastDate = lastPayoutDate.toDate ? lastPayoutDate.toDate() : new Date(lastPayoutDate);
    if (lastDate.getDay() === 5 && now.getDay() === 1) { const monday = new Date(now); monday.setDate(monday.getDate() - 3); return lastDate <= monday; }
    return lastDate < todayMidnight;
  }

  function firstDue(startDate) {
    if (!startDate) return false;
    const now = new Date();
    if (isWeekend(now)) return false;
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
    const sDate = startDate.toDate ? startDate.toDate() : new Date(startDate);
    return sDate < todayMidnight;
  }

  // ✅ RENDER AVAILABLE PLANS
  function renderPlans() {
    const el = document.getElementById('plansContainer');
    if (!el) return;

    // Count purchases per plan
    const planCounts = {};
    allUserPlans.forEach(p => { if (p.planId) planCounts[p.planId] = (planCounts[p.planId] || 0) + 1; });

    el.innerHTML = ALL_PLANS.map(p => {
      const count = planCounts[p.id] || 0;
      const limitReached = count >= MAX_PER_PLAN;
      const canAfford = userData && (userData.wallet || 0) >= p.capital;
      const meetsAmountRule = p.capital >= highestInvested;
      const isLocked = !meetsAmountRule && highestInvested > 0;
      let disabledReason = '';
      if (limitReached) disabledReason = 'Limit Reached';
      else if (!canAfford) disabledReason = 'Insufficient Balance';
      else if (isLocked) disabledReason = `Min ₦${highestInvested.toLocaleString()}`;

      return `
        <div class="plan-card ${p.popular ? 'featured' : ''} ${(limitReached || isLocked) ? 'locked-plan' : ''}">
          ${p.popular ? '<div class="pop-tag"><i class="fas fa-star"></i> POPULAR</div>' : ''}
          <div class="pc-icon"><i class="fas ${p.icon}"></i></div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-price">${fmt(p.capital)}</div>
          <div class="pc-row"><span class="lbl">📈 Daily ROI (Weekdays)</span><span class="val grn">${fmt(p.daily)}</span></div>
          <div class="pc-row"><span class="lbl">⏱️ Duration</span><span class="val">${TOTAL_DAYS} weekdays</span></div>
          <div class="pc-row"><span class="lbl">🔒 Locks at Day</span><span class="val amb">${LOCK_DAY}</span></div>
          <div class="pc-row"><span class="lbl">💰 Total Profit</span><span class="val amb">${fmt(p.totalProfit)}</span></div>
          <span style="display:inline-block;margin-top:10px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;background:#f1f5f9;color:var(--sub)">${count}/${MAX_PER_PLAN} purchased</span>
          <button class="buy-btn" ${(limitReached || !canAfford || isLocked) ? 'disabled' : ''} 
            onclick="buyPlan(${p.id},${p.capital},'${p.name.replace(/'/g,"\\'")}',${p.daily})">
            <i class="fas ${(limitReached || !canAfford || isLocked) ? 'fa-lock' : 'fa-rocket'}"></i> 
            ${disabledReason || 'Invest Now'}
          </button>
        </div>`;
    }).join('');
  }

  // ✅ RENDER ACTIVE/LOCKED PLANS
  function renderActivePlans() {
    const container = document.getElementById('activePlansContainer');
    const title = document.getElementById('activeTitle');
    const countEl = document.getElementById('activeCount');

    if (!allUserPlans.length) {
      title.style.display = 'none';
      container.innerHTML = '';
      return;
    }

    title.style.display = 'flex';
    countEl.textContent = allUserPlans.length;

    const isWeekendNow = isWeekend();

    // Sort: active first, then locked, then completed
    const sorted = [...allUserPlans].sort((a, b) => {
      const order = { 'active': 1, 'locked': 2, 'completed': 3 };
      return (order[a.status] || 4) - (order[b.status] || 4);
    });

    container.innerHTML = sorted.map(p => {
      const isLocked = p.status === 'locked';
      const isCompleted = p.status === 'completed';
      const isActive = p.status === 'active';
      const roiPaid = p.roiPaid || 0;
      const daysLeft = isCompleted ? 0 : (TOTAL_DAYS - roiPaid);

      let badgeClass = 'active-badge';
      let badgeText = 'ACTIVE';
      if (isLocked) { badgeClass = 'locked-badge'; badgeText = '🔒 LOCKED'; }
      if (isCompleted) { badgeClass = 'completed-badge'; badgeText = '✅ COMPLETED'; }

      return `
        <div class="active-card ${isLocked ? 'locked-card' : ''}">
          <div class="ac-badge ${badgeClass}"><i class="fas fa-${isLocked ? 'lock' : isCompleted ? 'check-circle' : 'check-circle'}"></i> ${badgeText}</div>
          <div class="pc-name" style="margin-top:24px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;">${p.planName}</div>
          <div class="pc-price" style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--teal);margin:8px 0;">${fmt(p.capital)}</div>
          <div class="pc-row"><span class="lbl">📈 Daily ROI</span><span class="val grn">${fmt(p.dailyEarning)}</span></div>
          <div class="pc-row"><span class="lbl">📊 ROI Paid</span><span class="val">${roiPaid} / ${TOTAL_DAYS} days</span></div>
          <div class="pc-row"><span class="lbl">⏱️ Days Left</span><span class="val">${daysLeft}</span></div>
          <div class="pc-row"><span class="lbl">💰 Total Earned</span><span class="val amb">${fmt(p.totalEarned || 0)}</span></div>
          ${isLocked ? `
            <div class="locked-alert">
              <i class="fas fa-lock"></i>
              <div><b>Plan Locked at Day ${LOCK_DAY}</b><br>Purchase another plan (₦${p.capital.toLocaleString()} or higher) to unlock and continue earning.</div>
            </div>
          ` : isCompleted ? `
            <div style="margin-top:12px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;padding:12px;text-align:center;font-size:13px;color:var(--teal);font-weight:600;">
              <i class="fas fa-trophy"></i> Plan completed! Total profit: ${fmt(p.totalEarned || 0)}
            </div>
          ` : `
            <div class="countdown${isWeekendNow ? ' weekend' : ''}">
              <div class="cd-label">${isWeekendNow ? '<i class="fas fa-calendar-xmark"></i> Weekend — No Payout' : '<i class="fas fa-hourglass-half"></i> Next Payout 12AM'}</div>
              <div class="cd-time">--:--:--</div>
            </div>
            ${isWeekendNow ? '<div class="weekend-notice"><i class="fas fa-info-circle"></i> ROI not credited on weekends. Next payout: Monday 12AM</div>' : ''}
            <div style="margin-top:8px;font-size:10px;color:var(--amber);text-align:center;">
              ⚠️ Locks after ${LOCK_DAY - roiPaid} more payout${(LOCK_DAY - roiPaid) !== 1 ? 's' : ''} — buy another plan to continue
            </div>
          `}
        </div>`;
    }).join('');
    updateMidCD();
  }

  // ✅ LOAD ALL DATA
  async function loadAllData() {
    if (!currentUser) return;
    console.log('Loading plans for:', currentUser.uid);

    try {
      const snap = await db.collection('users').doc(currentUser.uid).get();
      if (!snap.exists) { renderPlans(); return; }

      userData = snap.data();
      document.getElementById('walletDisplay').textContent = fmt(userData.wallet || 0);

      // ✅ DETERMINE HIGHEST INVESTMENT
      const planSnap = await db.collection('users').doc(currentUser.uid).collection('activePlans')
        .orderBy('createdAt', 'desc').limit(20).get();

      allUserPlans = [];
      highestInvested = 0;

      planSnap.forEach(d => {
        const p = d.data();
        allUserPlans.push({ id: d.id, ...p });
        if (p.capital > highestInvested) highestInvested = p.capital;
      });

      // Also check wallet for manually added funds
      const totalInvested = userData.totalInvested || userData.totalDeposits || 0;
      if (totalInvested > highestInvested) highestInvested = totalInvested;

      console.log('Loaded:', { plans: allUserPlans.length, highestInvested, wallet: userData.wallet });

      renderPlans();
      renderActivePlans();
    } catch (e) {
      console.error('Load error:', e);
      renderPlans();
    }
  }

  // ✅ REFERRAL BONUSES (First purchase only, paid instantly)
  async function payReferralBonuses(amount) {
    if (!currentUser || !amount || amount <= 0) return { paid: false, totalPaid: 0, levels: 0, details: '' };

    try {
      const userSnap = await db.collection('users').doc(currentUser.uid).get();
      if (!userSnap.exists) return { paid: false, totalPaid: 0, levels: 0, details: '' };
      const userDataLocal = userSnap.data();

      // ✅ ONE-TIME ONLY
      if (userDataLocal.referralBonusPaid === true) {
        console.log('Referral bonus already paid');
        return { paid: false, totalPaid: 0, levels: 0, details: 'Already paid' };
      }

      const chain = [];
      let referrerId = userDataLocal.referrerUid || userDataLocal.referredBy || null;

      if (!referrerId || referrerId === 'direct' || referrerId === 'none' || referrerId.trim() === '' || referrerId === currentUser.uid) {
        await db.collection('users').doc(currentUser.uid).update({ referralBonusPaid: true, referralBonusAttemptedAt: FV.serverTimestamp() });
        return { paid: false, totalPaid: 0, levels: 0, details: 'No valid referrer' };
      }

      chain.push(referrerId);

      // Get Level 2
      try {
        const l1Snap = await db.collection('users').doc(referrerId).get();
        if (l1Snap.exists) {
          const l2id = l1Snap.data().referrerUid || l1Snap.data().referredBy || null;
          if (l2id && l2id !== 'direct' && l2id !== 'none' && l2id.trim() !== '' && l2id !== currentUser.uid && !chain.includes(l2id)) {
            chain.push(l2id);
            // Get Level 3
            try {
              const l2Snap = await db.collection('users').doc(l2id).get();
              if (l2Snap.exists) {
                const l3id = l2Snap.data().referrerUid || l2Snap.data().referredBy || null;
                if (l3id && l3id !== 'direct' && l3id !== 'none' && l3id.trim() !== '' && l3id !== currentUser.uid && !chain.includes(l3id)) {
                  chain.push(l3id);
                }
              }
            } catch (e) { /* silent */ }
          }
        }
      } catch (e) { /* silent */ }

      if (!chain.length) {
        await db.collection('users').doc(currentUser.uid).update({ referralBonusPaid: true });
        return { paid: false, totalPaid: 0, levels: 0, details: 'No chain' };
      }

      const rates = [
        { level: 1, rate: REF_RATES.level1, label: '10%' },
        { level: 2, rate: REF_RATES.level2, label: '2%' },
        { level: 3, rate: REF_RATES.level3, label: '1%' }
      ];

      let totalPaid = 0, levelsPaid = 0;
      const details = [];

      for (let i = 0; i < chain.length; i++) {
        const uid = chain[i];
        const rateInfo = rates[i];
        if (!rateInfo) break;
        const bonus = Math.floor(amount * rateInfo.rate);
        if (bonus <= 0) continue;

        try {
          // ✅ CREDIT UPLINER WALLET INSTANTLY
          await db.collection('users').doc(uid).update({
            wallet: FV.increment(bonus),
            totalEarnings: FV.increment(bonus),
            totalRefEarnings: FV.increment(bonus),
            referralCount: FV.increment(i === 0 ? 1 : 0),
            ['level' + (i + 1) + 'Count']: FV.increment(1)
          });

          // ✅ SEND NOTIFICATION MESSAGE
          await db.collection('users').doc(uid).collection('transactions').add({
            type: 'referral_bonus',
            amount: bonus,
            status: 'completed',
            description: `🎁 Level ${i + 1} referral bonus (${rateInfo.label}) from ${userDataLocal.fullName || 'a new user'} — ₦${bonus.toLocaleString()} credited instantly!`,
            referredUser: currentUser.uid,
            referredUserName: userDataLocal.fullName || 'User',
            investmentAmount: amount,
            level: i + 1,
            rate: rateInfo.rate,
            createdAt: FV.serverTimestamp()
          });

          // Update referral record
          const refDoc = db.collection('users').doc(uid).collection('referrals').doc(currentUser.uid);
          const existingRef = await refDoc.get();
          await refDoc.set({
            uid: currentUser.uid, level: i + 1, commission: rateInfo.rate * 100,
            referredAt: userDataLocal.createdAt || FV.serverTimestamp(),
            fullName: userDataLocal.fullName || 'User',
            username: userDataLocal.username || '',
            email: userDataLocal.email || '',
            totalEarned: (existingRef.exists ? existingRef.data().totalEarned || 0 : 0) + bonus,
            lastInvestment: amount, lastInvestmentDate: FV.serverTimestamp(),
            firstPurchaseBonus: true
          }, { merge: true });

          totalPaid += bonus;
          levelsPaid++;
          details.push(`L${i + 1}: ₦${bonus.toLocaleString()} (${rateInfo.label})`);
          console.log(`✅ Ref bonus: L${i + 1}, UID: ${uid}, ₦${bonus}`);
        } catch (e) { console.error(`Failed L${i + 1}:`, e); }
      }

      await db.collection('users').doc(currentUser.uid).update({
        referralBonusPaid: true,
        referralBonusAmount: totalPaid,
        referralBonusLevels: levelsPaid,
        referralBonusPaidAt: FV.serverTimestamp(),
        referralBonusDetails: details.join(', ')
      });

      return { paid: totalPaid > 0, totalPaid, levels: levelsPaid, details: details.join(', ') };
    } catch (e) {
      console.error('Ref bonus error:', e);
      return { paid: false, totalPaid: 0, levels: 0, details: '' };
    }
  }

  // ✅✅✅ PAYOUT SYSTEM — 7-DAY LOCK ✅✅✅
  async function runPayouts() {
    if (!currentUser || !allUserPlans.length) return;
    if (isWeekend()) return; // No payouts on weekends

    const today = new Date().toDateString();
    if (lastPayoutDate === today) return;

    try {
      let done = 0;

      for (const p of allUserPlans) {
        if (p.status === 'completed' || p.status === 'locked') continue; // Skip completed/locked
        if (p.roiPaid >= TOTAL_DAYS) continue;

        let due = false;
        if (p.lastPayoutDate) { due = payoutDue(p.lastPayoutDate); }
        else { due = firstDue(p.startDate); }
        if (!due) continue;

        try {
          const planRef = db.collection('users').doc(currentUser.uid).collection('activePlans').doc(p.id);
          const fresh = await planRef.get();
          if (!fresh.exists || (fresh.data().status !== 'active' && fresh.data().status !== 'locked')) continue;
          const d = fresh.data();

          let fd = false;
          if (d.lastPayoutDate) { fd = payoutDue(d.lastPayoutDate); }
          else { fd = firstDue(d.startDate); }
          if (!fd) continue;

          const newRoiPaid = (d.roiPaid || 0) + 1;

          // ✅ CHECK IF PLAN SHOULD LOCK AT DAY 7
          if (newRoiPaid === LOCK_DAY) {
            // LOCK THE PLAN — Don't pay this ROI until unlocked
            await planRef.update({
              lastPayoutDate: FV.serverTimestamp(),
              roiPaid: LOCK_DAY,
              totalEarned: (d.totalEarned || 0), // Don't add the 7th ROI yet
              status: 'locked',
              lockedAt: FV.serverTimestamp(),
              lockedAtDay: LOCK_DAY
            });

            p.status = 'locked';
            p.roiPaid = LOCK_DAY;
            done++;
            toast('🔒 Plan Locked!', `${p.planName} locked at Day ${LOCK_DAY} — buy another plan to unlock`, 'warning');
          }
          // ✅ CHECK IF PLAN COMPLETES
          else if (newRoiPaid >= TOTAL_DAYS) {
            // Pay last ROI and complete
            await planRef.update({
              lastPayoutDate: FV.serverTimestamp(),
              roiPaid: TOTAL_DAYS,
              totalEarned: (d.totalEarned || 0) + d.dailyEarning,
              status: 'completed',
              completedAt: FV.serverTimestamp()
            });
            await db.collection('users').doc(currentUser.uid).update({
              wallet: FV.increment(d.dailyEarning),
              totalEarnings: FV.increment(d.dailyEarning)
            });
            await db.collection('users').doc(currentUser.uid).collection('transactions').add({
              type: 'payout', amount: d.dailyEarning, planId: p.id, planName: p.planName,
              status: 'completed', description: `💰 Final ROI Day ${TOTAL_DAYS} from ${p.planName}`,
              createdAt: FV.serverTimestamp(), payoutDay: new Date().getDay()
            });

            p.status = 'completed';
            p.roiPaid = TOTAL_DAYS;
            p.totalEarned = (p.totalEarned || 0) + d.dailyEarning;
            if (userData) userData.wallet = (userData.wallet || 0) + d.dailyEarning;
            done++;
            toast('🏆 Plan Completed!', `${p.planName} — all ${TOTAL_DAYS} days paid!`, 'success');
          }
          // ✅ NORMAL DAILY PAYOUT
          else {
            await planRef.update({
              lastPayoutDate: FV.serverTimestamp(),
              roiPaid: newRoiPaid,
              totalEarned: (d.totalEarned || 0) + d.dailyEarning
            });
            await db.collection('users').doc(currentUser.uid).update({
              wallet: FV.increment(d.dailyEarning),
              totalEarnings: FV.increment(d.dailyEarning)
            });
            await db.collection('users').doc(currentUser.uid).collection('transactions').add({
              type: 'payout', amount: d.dailyEarning, planId: p.id, planName: p.planName,
              status: 'completed', description: `💰 Daily ROI Day ${newRoiPaid} from ${p.planName}`,
              createdAt: FV.serverTimestamp(), payoutDay: new Date().getDay()
            });

            p.roiPaid = newRoiPaid;
            p.totalEarned = (p.totalEarned || 0) + d.dailyEarning;
            p.lastPayoutDate = new Date();
            if (userData) userData.wallet = (userData.wallet || 0) + d.dailyEarning;
            done++;
            toast('💰 Payout!', `+${fmt(d.dailyEarning)} from ${p.planName} (Day ${newRoiPaid})`, 'success');
          }
        } catch (e) { console.error('Payout error:', p.id, e); }
      }

      if (done > 0) {
        lastPayoutDate = today;
        document.getElementById('walletDisplay').textContent = fmt(userData?.wallet || 0);
        renderActivePlans();
      }
    } catch (e) { console.error('runPayouts error:', e); }
  }

  // ✅✅✅ BUY PLAN — With 7-Day Lock Logic & Amount Rules ✅✅✅
  window.buyPlan = async function (planId, capital, name, daily) {
    if (processing) return;
    if (!userData) return Swal.fire({ icon: 'error', title: 'Please wait', text: 'Loading your data...', confirmButtonColor: '#0d9488' });

    // ✅ AMOUNT RULE CHECK
    if (highestInvested > 0 && capital < highestInvested) {
      return Swal.fire({
        icon: 'warning', title: 'Amount Rule',
        html: `You must invest <b>₦${highestInvested.toLocaleString()}</b> or higher.<br><br>Your highest investment so far is <b>${fmt(highestInvested)}</b>.`,
        confirmButtonColor: '#0d9488'
      });
    }

    // Check balance
    if ((userData.wallet || 0) < capital) {
      return Swal.fire({
        icon: 'warning', title: 'Insufficient Balance',
        html: `Need <b>${fmt(capital)}</b><br>Balance: <b>${fmt(userData?.wallet || 0)}</b>`,
        confirmButtonColor: '#0d9488'
      });
    }

    // Check limit
    const count = allUserPlans.filter(p => p.planId === planId).length;
    if (count >= MAX_PER_PLAN) {
      return Swal.fire({ icon: 'error', title: 'Limit Reached', text: `Max ${MAX_PER_PLAN} purchases per plan.`, confirmButtonColor: '#0d9488' });
    }

    // Check if any plan is locked — unlocking info
    const lockedPlans = allUserPlans.filter(p => p.status === 'locked');
    const unlockMsg = lockedPlans.length > 0
      ? `<p style="color:var(--amber);margin-top:8px;font-size:13px;">🔓 Purchasing will <b>UNLOCK ${lockedPlans.length} locked plan(s)</b> — they'll continue from Day ${LOCK_DAY + 1}!</p>`
      : '';

    const weekendWarning = isWeekend() ? `<p style="color:#dc2626;margin-top:8px;font-size:12px;">⚠️ Today is weekend — first payout will be Monday 12AM</p>` : '';

    const ok = await Swal.fire({
      title: 'Confirm Investment',
      html: `
        <div style="text-align:center">
          <b>${name}</b>
          <div style="background:#f0fdfa;border-radius:14px;padding:14px;margin-top:12px;text-align:left;">
            <div>💰 Capital: <b>${fmt(capital)}</b></div>
            <div>📈 Daily ROI: <b style="color:#10b981;">${fmt(daily)}</b></div>
            <div>📅 Duration: <b>${TOTAL_DAYS} weekdays</b></div>
            <div>🔒 Locks at: <b style="color:#d97706;">Day ${LOCK_DAY}</b> (7th payout)</div>
            <div>🏆 Total Profit: <b style="color:#d97706;">${fmt(daily * TOTAL_DAYS)}</b></div>
          </div>
          ${unlockMsg}
          ${weekendWarning}
          <p style="margin-top:12px;font-size:12px;color:#64748b;">⏰ First payout at 12AM (weekdays only)</p>
          <p style="font-size:11px;color:var(--amber);">⚠️ This plan locks at Day 7 — buy another to continue earning</p>
        </div>`,
      icon: 'question', showCancelButton: true,
      confirmButtonText: 'Invest Now', confirmButtonColor: '#0d9488'
    });
    if (!ok.isConfirmed) return;

    processing = true;
    Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      // Deduct wallet
      await db.collection('users').doc(currentUser.uid).update({ wallet: FV.increment(-capital) });

      // Create new plan
      const pid = 'plan_' + Date.now() + '_' + planId;
      await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(pid).set({
        planId, planName: name, capital, dailyEarning: daily,
        totalReturn: daily * TOTAL_DAYS, roiPaid: 0,
        status: 'active', startDate: FV.serverTimestamp(),
        totalEarned: 0, lastPayoutDate: null,
        purchasedOnWeekend: isWeekend(), lockDay: LOCK_DAY,
        createdAt: FV.serverTimestamp()
      });

      // ✅ UNLOCK ALL LOCKED PLANS
      let unlockedCount = 0;
      for (const lp of lockedPlans) {
        try {
          await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(lp.id).update({
            status: 'active',
            unlockedAt: FV.serverTimestamp(),
            unlockedByPlanId: pid
          });
          lp.status = 'active';
          unlockedCount++;
        } catch (e) { console.error('Unlock error:', e); }
      }

      // Pay referral bonuses (first purchase only)
      const refResult = await payReferralBonuses(capital);

      // Log transaction
      await db.collection('users').doc(currentUser.uid).collection('transactions').add({
        type: 'investment', amount: capital, planName: name, planId: pid,
        status: 'completed', description: '📊 Invested in ' + name,
        createdAt: FV.serverTimestamp()
      }).catch(() => {});

      // Update local state
      userData.wallet = (userData.wallet || 0) - capital;
      if (capital > highestInvested) highestInvested = capital;
      allUserPlans.push({
        id: pid, planId, planName: name, capital, dailyEarning: daily,
        roiPaid: 0, status: 'active', totalEarned: 0,
        lastPayoutDate: null, startDate: new Date()
      });

      document.getElementById('walletDisplay').textContent = fmt(userData.wallet);
      renderPlans();
      renderActivePlans();
      Swal.close();

      const unlockText = unlockedCount > 0 ? `<br>🔓 Also unlocked <b>${unlockedCount}</b> plan(s)!` : '';
      const refText = refResult.paid ? `<br>🎁 Referral bonuses sent: ${refResult.details}` : '';

      await Swal.fire({
        icon: 'success', title: '✅ Active!',
        html: `${name} — first payout at 12AM weekdays.${unlockText}${refText}<br><small style="color:var(--amber);">Locks after 7 payouts</small>`,
        timer: 4500, showConfirmButton: false
      });

      toast('🎉 Plan Active!', `${name} earning ${fmt(daily)}/weekday` + (unlockedCount > 0 ? ` · ${unlockedCount} unlocked!` : ''), 'success');
    } catch (e) {
      console.error('Buy error:', e);
      let msg = 'Purchase failed.';
      if (e.code === 'resource-exhausted') msg = '⚠️ System busy. Try again.';
      Swal.fire({ icon: 'error', title: 'Failed', text: msg, confirmButtonColor: '#ef4444' });
      await loadAllData();
    } finally { processing = false; }
  };

  // ✅ WEEKEND MONITOR
  function startWeekendMonitor() {
    if (weekendCheckTimer) clearInterval(weekendCheckTimer);
    weekendCheckTimer = setInterval(async () => {
      if (isWeekend() && currentUser) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        try {
          const txSnap = await db.collection('users').doc(currentUser.uid).collection('transactions')
            .where('type', '==', 'payout').where('createdAt', '>=', today).limit(5).get();
          let weekendTotal = 0;
          txSnap.forEach(doc => { const tx = doc.data(); if (!tx.reversed) weekendTotal += tx.amount || 0; });
          if (weekendTotal > 0) {
            await db.collection('users').doc(currentUser.uid).update({
              wallet: FV.increment(-weekendTotal), totalEarnings: FV.increment(-weekendTotal)
            });
            if (userData) userData.wallet = (userData.wallet || 0) - weekendTotal;
            document.getElementById('walletDisplay').textContent = fmt(userData?.wallet || 0);
            toast('🚫 Weekend Payout Blocked', '₦' + weekendTotal.toLocaleString() + ' reversed', 'warning');
          }
        } catch (e) { /* silent */ }
      }
    }, 60000);
  }

  // ✅ AUTH
  auth.onAuthStateChanged(async user => {
    console.log('Auth:', user?.uid || 'none');
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    renderPlans();
    await loadAllData();
    startMidCD();
    startWeekendMonitor();

    if (payoutTimer) clearInterval(payoutTimer);
    payoutTimer = setInterval(runPayouts, 60000);
    setTimeout(runPayouts, 3000);
  });

  // Fallback
  setTimeout(() => { if (!currentUser) renderPlans(); }, 3000);

  console.log('✅ Plans page ready — Phase 2 · 7-Day Lock System');
</script>
