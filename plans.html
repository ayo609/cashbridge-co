<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CashBridge • Investment Plans</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --bg-dark: #0a0f1e;
  --card-bg: rgba(15, 23, 42, 0.7);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --border: rgba(255, 255, 255, 0.05);
  --glass: rgba(15, 23, 42, 0.5);
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  font-family: 'Plus Jakarta Sans', sans-serif; 
}

body {
  background: #0a0f1e;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
    linear-gradient(145deg, #0f172a 0%, #020617 100%);
  color: var(--text-primary);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding-bottom: 100px;
}

/* Animated Background Blobs */
.blob {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.2;
  animation: float 20s infinite alternate;
  z-index: 0;
  pointer-events: none;
}

.blob-1 {
  top: -100px;
  right: -100px;
  background: linear-gradient(145deg, #6366f1, #a855f7);
  animation-delay: -2s;
}

.blob-2 {
  bottom: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: linear-gradient(145deg, #ec4899, #f59e0b);
  animation-delay: -7s;
}

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, 30px) scale(1.1); }
}

/* Toast Notification - TOP LEFT */
.toast-notification {
  position: fixed;
  top: 20px;
  left: 20px;
  min-width: 300px;
  max-width: 400px;
  padding: 1rem 1.2rem;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  color: white;
  font-weight: 500;
  z-index: 9999;
  animation: slideInLeft 0.3s ease;
  box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.toast-notification.success { border-left: 4px solid #22c55e; }
.toast-notification.error { border-left: 4px solid #ef4444; }
.toast-notification.warning { border-left: 4px solid #f59e0b; }
.toast-notification.info { border-left: 4px solid #6366f1; }

.toast-notification i {
  font-size: 1.3rem;
}

.toast-notification.success i { color: #22c55e; }
.toast-notification.error i { color: #ef4444; }
.toast-notification.warning i { color: #f59e0b; }
.toast-notification.info i { color: #6366f1; }

.toast-content {
  flex: 1;
}

.toast-title {
  font-weight: 700;
  margin-bottom: 0.2rem;
}

.toast-message {
  font-size: 0.85rem;
  color: #94a3b8;
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-100%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* Main Container */
.plans-page {
  position: relative;
  z-index: 10;
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem 1.5rem 100px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  animation: slideDown 0.6s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.brand-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: white;
  transform: rotate(-5deg);
  box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.4);
}

.brand-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.wallet-badge {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 30px;
  padding: 0.6rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  backdrop-filter: blur(10px);
}

.wallet-badge i {
  color: #6366f1;
  font-size: 1rem;
}

.wallet-badge span {
  font-size: 0.9rem;
  color: #94a3b8;
}

.wallet-badge strong {
  color: white;
  font-weight: 600;
}

/* Page Title */
.page-title {
  margin-bottom: 2rem;
}

.page-title h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}

.page-title p {
  color: #94a3b8;
  font-size: 0.9rem;
}

/* Section Title */
.section-title {
  font-size: 1.3rem;
  font-weight: 600;
  margin: 2rem 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.section-title i {
  color: #6366f1;
}

/* Plans Grid */
.plans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-bottom: 3rem;
}

/* Plan Card */
.plan-card {
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 28px;
  padding: 2rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.plan-card:hover:not(.locked) {
  transform: translateY(-5px);
  border-color: #6366f1;
  box-shadow: 0 30px 50px -20px rgba(99, 102, 241, 0.4);
}

.popular {
  border: 2px solid #ec4899;
}

.popular::before {
  content: "⭐ POPULAR";
  position: absolute;
  top: 10px;
  right: -30px;
  background: linear-gradient(135deg, #ec4899, #f59e0b);
  color: white;
  padding: 5px 40px;
  font-size: 0.7rem;
  font-weight: 700;
  transform: rotate(45deg);
  box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
}

.purchased {
  border: 2px solid #22c55e;
}

.purchased::before {
  content: "✓ ACTIVE";
  position: absolute;
  top: 10px;
  left: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 0.7rem;
  font-weight: 700;
  box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
}

.plan-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: white;
}

.plan-capital {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 1rem;
}

.plan-daily {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 16px;
  padding: 1rem;
  margin: 1rem 0;
  text-align: center;
}

.plan-daily span {
  color: #22c55e;
  font-size: 1.3rem;
  font-weight: 600;
  display: block;
  margin-top: 0.3rem;
}

.plan-total {
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
  border: 1px solid rgba(255, 255, 255, 0.03);
  border-radius: 16px;
  padding: 1rem;
  text-align: center;
  margin: 1rem 0;
}

.plan-total span {
  color: #f59e0b;
  font-size: 1.3rem;
  font-weight: 600;
  display: block;
  margin-top: 0.3rem;
}

.plan-meta {
  display: flex;
  justify-content: space-between;
  color: #94a3b8;
  font-size: 0.9rem;
  margin: 1rem 0;
  padding: 0.5rem 0;
  border-top: 1px dashed rgba(255, 255, 255, 0.05);
  border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
}

/* Buttons */
.btn {
  width: 100%;
  padding: 0.8rem;
  border: none;
  border-radius: 16px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-claim {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
  animation: pulse 2s infinite;
}

.btn-claim:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px -5px #f59e0b;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 5px 20px -5px #f59e0b; }
  50% { box-shadow: 0 15px 30px -5px #f59e0b; }
}

/* Countdown */
.countdown {
  font-size: 1.1rem;
  color: #f59e0b;
  font-weight: 600;
  text-align: center;
  margin: 1rem 0;
}

.timer {
  font-family: 'Space Grotesk', monospace;
  font-size: 1.3rem;
  background: rgba(245, 158, 11, 0.1);
  padding: 0.5rem;
  border-radius: 12px;
  margin-top: 0.5rem;
}

.days-left {
  color: #94a3b8;
  font-size: 0.9rem;
  text-align: center;
  margin-top: 0.5rem;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 40px;
  padding: 0.5rem;
  display: flex;
  gap: 0.5rem;
  z-index: 100;
  box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.5rem 1.2rem;
  border-radius: 30px;
  color: #94a3b8;
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 500;
  transition: all 0.3s ease;
  gap: 0.2rem;
}

.nav-item i {
  font-size: 1rem;
}

.nav-item.active {
  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;
  box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
}

/* Responsive */
@media (max-width: 768px) {
  .plans-page {
    padding: 1rem 1rem 100px;
  }

  .plans-grid {
    grid-template-columns: 1fr;
  }

  .bottom-nav {
    width: 90%;
    padding: 0.3rem;
  }

  .nav-item {
    padding: 0.4rem 0.8rem;
  }
}
</style>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, runTransaction,
  updateDoc, increment, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
  authDomain: "cashbridge-a688e.firebaseapp.com",
  projectId: "cashbridge-a688e",
  storageBucket: "cashbridge-a688e.firebasestorage.app",
  messagingSenderId: "345273765518",
  appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;
let processing = false;
let timers = new Map();

const formatMoney = (n) => '₦' + Number(n || 0).toLocaleString();

// Toast notification function - TOP LEFT
const showToast = (title, message, type = 'success') => {
  const toast = document.createElement('div');
  toast.className = `toast-notification ${type}`;
  
  let icon = 'fa-check-circle';
  if (type === 'error') icon = 'fa-exclamation-circle';
  if (type === 'warning') icon = 'fa-exclamation-triangle';
  if (type === 'info') icon = 'fa-info-circle';
  
  toast.innerHTML = `
    <i class="fas ${icon}"></i>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-message">${message}</div>
    </div>
  `;
  
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideOutLeft 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
};

// Add slideOut animation
const style = document.createElement('style');
style.textContent = `
  @keyframes slideOutLeft {
    from {
      opacity: 1;
      transform: translateX(0);
    }
    to {
      opacity: 0;
      transform: translateX(-100%);
    }
  }
`;
document.head.appendChild(style);

// INVESTMENT PLANS
const INVESTMENT_PLANS = [
  { id: 'mini', name: 'Mini Plan', capital: 3000, daily: 500, total: 12500, duration: 25, roi: 125 },
  { id: 'starter', name: 'Starter Plan', capital: 5000, daily: 800, total: 20000, duration: 25, roi: 125 },
  { id: 'basic', name: 'Basic Plan', capital: 10000, daily: 1000, total: 25000, duration: 25, roi: 125 },
  { id: 'bronze', name: 'Bronze Plan', capital: 12000, daily: 1200, total: 30000, duration: 25, roi: 125 },
  { id: 'silver', name: 'Silver Plan', capital: 15000, daily: 1500, total: 37500, duration: 25, roi: 125, popular: true },
  { id: 'gold', name: 'Gold Plan', capital: 20000, daily: 2300, total: 57500, duration: 25, roi: 125 },
  { id: 'platinum', name: 'Platinum Plan', capital: 25000, daily: 3200, total: 80000, duration: 25, roi: 125 },
  { id: 'ruby', name: 'Ruby Plan', capital: 30000, daily: 4000, total: 100000, duration: 25, roi: 125 },
  { id: 'emerald', name: 'Emerald Plan', capital: 50000, daily: 7300, total: 183500, duration: 25, roi: 125 },
  { id: 'sapphire', name: 'Sapphire Plan', capital: 60000, daily: 8300, total: 207500, duration: 25, roi: 125 },
  { id: 'diamond', name: 'Diamond Plan', capital: 100000, daily: 15000, total: 375000, duration: 25, roi: 125 }
  { id: 'space', name: 'Space Plan', capital: 200000, daily: 30000, total: 750000, duration: 25, roi: 125 }
  { id: 'drone', name: 'Drone Plan', capital: 300000, daily: 50000, total: 1250000, duration: 25, roi: 125 }
];

// Load user data and plans
async function loadData() {
  if (!currentUser) return;
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) {
      showToast('Error', 'User profile not found', 'error');
      return;
    }
    userData = userSnap.data();
    document.getElementById('walletDisplay').textContent = formatMoney(userData.wallet || 0);
    renderPlans(INVESTMENT_PLANS);
    
    const activePlansSnap = await getDocs(collection(db, `users/${currentUser.uid}/activePlans`));
    const activePlans = [];
    activePlansSnap.forEach(d => { if (d.data().status === 'active') activePlans.push({ docId: d.id, ...d.data() }); });
    
    if (activePlans.length > 0) {
      document.getElementById('activeTitle').style.display = 'block';
      renderActivePlans(activePlans);
    } else {
      document.getElementById('activeTitle').style.display = 'none';
      document.getElementById('activePlansContainer').innerHTML = '';
    }
  } catch (err) {
    console.error('Load error:', err);
    showToast('Error', 'Failed to load data', 'error');
  }
}

function renderPlans(plans) {
  const container = document.getElementById('plansContainer');
  container.innerHTML = plans.map((p) => `
    <div class="plan-card ${p.popular ? 'popular' : ''}">
      <div class="plan-name">${p.name}</div>
      <div class="plan-capital">${formatMoney(p.capital)}</div>
      <div class="plan-daily">Daily Earnings<span>${formatMoney(p.daily)}</span></div>
      <div class="plan-total">Total Return<span>${formatMoney(p.total)}</span></div>
      <div class="plan-meta"><span><i class="fas fa-clock"></i> ${p.duration} days</span><span><i class="fas fa-chart-line"></i> ${p.roi}% ROI</span></div>
      <button class="btn btn-primary" onclick="buyPlan('${p.id}', ${p.capital}, '${p.name}', ${p.daily}, ${p.total}, ${p.duration}, ${p.roi})"><i class="fas fa-rocket"></i> Invest Now</button>
    </div>
  `).join('');
}

function renderActivePlans(plans) {
  const container = document.getElementById('activePlansContainer');
  container.innerHTML = plans.map(p => {
    const lastClaimed = p.lastClaimed?.toMillis?.() || p.startDate?.toMillis?.() || Date.now();
    const nextClaim = lastClaimed + (24 * 60 * 60 * 1000);
    const canClaim = Date.now() >= nextClaim;
    const daysLeft = p.daysLeft || 0;
    return `
      <div class="plan-card purchased">
        <div class="plan-name">${p.planName}</div>
        <div class="plan-capital">${formatMoney(p.capital)}</div>
        <div class="days-left"><i class="fas fa-hourglass-half"></i> Days Left: ${daysLeft}</div>
        ${canClaim && daysLeft > 0 ? 
          `<button class="btn btn-claim" onclick="claimDaily('${p.docId}', ${p.dailyEarning})"><i class="fas fa-gift"></i> Claim ${formatMoney(p.dailyEarning)}</button>` :
          `<div class="countdown">Next claim in:<div class="timer" data-next="${nextClaim}">Calculating...</div></div>`
        }
      </div>
    `;
  }).join('');
  startTimers();
}

// ============================================================
// BUY PLAN WITH REFERRAL BONUS DISTRIBUTION
// ============================================================
window.buyPlan = async function(planId, capital, name, daily, total, duration, roi) {
  if (processing) return;
  if (!userData || userData.wallet < capital) {
    return Swal.fire({
      icon: 'warning', title: 'Insufficient Balance',
      html: `You need ${formatMoney(capital)} to invest.<br>Current balance: ${formatMoney(userData?.wallet || 0)}`,

// Claim daily earnings
window.claimDaily = async function(docId, daily) {
  if (processing) return;
  processing = true;
  Swal.fire({ title: 'Claiming...', allowOutsideClick: false, background: '#0f172a', didOpen: () => Swal.showLoading() });
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const planRef = doc(db, `users/${currentUser.uid}/activePlans`, docId);
    await runTransaction(db, async (t) => {
      const snap = await t.get(planRef);
      if (!snap.exists()) throw new Error("Plan not found");
      const data = snap.data();
      const lastTime = data.lastClaimed?.toMillis?.() || data.startDate?.toMillis?.();
      if (Date.now() - lastTime < 24 * 60 * 60 * 1000 - 5000) throw new Error("Please wait 24 hours between claims");
      if (data.daysLeft <= 0 || data.status !== 'active') throw new Error("Plan has ended");
      const newDays = data.daysLeft - 1;
      const newEarned = (data.totalEarned || 0) + daily;
      t.update(planRef, { lastClaimed: serverTimestamp(), daysLeft: newDays, totalEarned: newEarned, ...(newDays <= 0 && { status: 'completed', completedAt: serverTimestamp() }) });
      t.update(userRef, { wallet: increment(daily), totalEarnings: increment(daily) });
    });
    Swal.close();
    showToast('Claim Successful!', `${formatMoney(daily)} added to your wallet`, 'success');
    await loadData();
  } catch (err) {
    Swal.close();
    showToast('Claim Failed', err.message, 'error');
  } finally { processing = false; }
};

// Timer functions
function formatTime(ms) {
  if (ms <= 0) return "Ready!";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimers() {
  timers.forEach(clearInterval);
  timers.clear();
  document.querySelectorAll('.timer').forEach(el => {
    const next = Number(el.dataset.next);
    const update = () => {
      const remaining = next - Date.now();
      el.textContent = formatTime(remaining);
      if (remaining <= 0) { clearInterval(interval); loadData(); }
    };
    update();
    const interval = setInterval(update, 1000);
    timers.set(el, interval);
  });
}
