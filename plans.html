  <style>
    :root{--teal:#0d9488;--teal-dark:#0f766e;--teal-light:#14b8a6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--bg:#f0f4f8;--card:#fff;--text:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--shadow-sm:0 1px 3px rgba(0,0,0,.04);--shadow:0 4px 16px rgba(0,0,0,.06);--radius:20px;--radius-sm:14px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:110px;background-image:radial-gradient(ellipse at 0% 0%,#e0f2fe 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,#ccfbf1 0%,transparent 50%)}
    .topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .topbar .brand{display:flex;align-items:center;gap:10px;font-family:'Outfit',sans-serif;font-weight:800;font-size:19px}
    .topbar .brand .dot{width:10px;height:10px;background:var(--teal);border-radius:50%;box-shadow:0 0 12px var(--teal-light)}
    .balance-pill{background:linear-gradient(135deg,#f0fdfa,#e6fffa);border:1px solid #99f6e4;border-radius:30px;padding:8px 18px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
    .balance-pill i{color:var(--teal)}
    .main{max-width:1000px;margin:0 auto;padding:24px 16px}
    .page-head{margin-bottom:24px;text-align:center}
    .page-head h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800}
    .page-head p{font-size:14px;color:var(--sub)}
    .badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
    .badge{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px}
    .badge-first{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .badge-lock{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .badge-info{background:#f0fdfa;color:var(--teal);border:1px solid #99f6e4}
    .badge-weekend{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .section-head{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;margin:8px 0 16px;display:flex;align-items:center;gap:8px}
    .section-head i{color:var(--teal)}
    .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px}
    .plan-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all .25s;position:relative;box-shadow:var(--shadow-sm)}
    .plan-card:hover{border-color:var(--teal);box-shadow:var(--shadow-lg);transform:translateY(-3px)}
    .plan-card.featured{border:2px solid var(--teal)}
    .plan-card.blocked{opacity:.5;pointer-events:none}
    .plan-card .pop-tag{position:absolute;top:12px;right:12px;background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:10px}
    .plan-card .pc-icon{font-size:34px;margin-bottom:12px}
    .plan-card .pc-name{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700}
    .plan-card .pc-price{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--teal);margin-bottom:14px}
    .plan-card .pc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f1f5f9}
    .plan-card .pc-row:last-of-type{border:none}.pc-row .lbl{color:var(--muted)}.pc-row .val{font-weight:700}
    .pc-row .val.grn{color:var(--green)}.pc-row .val.amb{color:var(--amber)}
    .buy-btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;font-family:inherit;box-shadow:0 4px 16px rgba(13,148,136,.2)}
    .buy-btn:hover:not(:disabled){transform:translateY(-2px)}
    .buy-btn:disabled{background:#cbd5e1;color:#94a3b8;cursor:not-allowed;box-shadow:none}
    .active-card{background:var(--card);border:2px solid #bbf7d0;border-radius:var(--radius);padding:22px;position:relative;box-shadow:var(--shadow-sm)}
    .active-card.first-plan{border-color:var(--green);background:linear-gradient(180deg,#f0fdf4,#fff)}
    .active-card.locked-card{border-color:var(--amber);background:linear-gradient(180deg,#fffbeb,#fff)}
    .active-card .ac-badge{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;padding:5px 12px;border-radius:10px;display:flex;align-items:center;gap:4px}
    .ac-badge.first-badge{background:#f0fdf4;color:#16a34a}
    .ac-badge.active-badge{background:#f0fdf4;color:var(--green)}
    .ac-badge.locked-badge{background:#fffbeb;color:#d97706}
    .ac-badge.completed-badge{background:#f0fdfa;color:var(--teal)}
    .plan-position-tag{display:inline-block;padding:3px 8px;border-radius:8px;font-size:9px;font-weight:700;margin-left:6px}
    .plan-position-tag.first{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .plan-position-tag.second{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
    .locked-alert{background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-top:10px;font-size:11px;color:#92400e;display:flex;align-items:center;gap:8px}
    .countdown{margin-top:12px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;padding:12px;text-align:center;font-family:'Outfit',monospace}
    .countdown .cd-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .countdown .cd-time{font-size:22px;font-weight:700;color:var(--teal)}
    .countdown.weekend{background:#fef2f2;border-color:#fecaca}.countdown.weekend .cd-time{color:#dc2626}
    .weekend-notice{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;margin-top:10px;font-size:12px;color:#dc2626;display:flex;align-items:center;gap:8px}
    .toast{position:fixed;bottom:100px;right:20px;background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 12px 32px rgba(0,0,0,.1);display:flex;align-items:center;gap:12px;z-index:999;animation:slideIn .3s ease;border-left:4px solid var(--teal);max-width:380px}
    @keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
    .toast i{font-size:20px}.toast.success{border-color:var(--green)}.toast.warning{border-color:var(--amber)}
    .bottom-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:50px;padding:6px 10px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.08);z-index:200}
    .nav-item{padding:12px 18px;border-radius:40px;display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-weight:600;font-size:12px;transition:all .2s}
    .nav-item.active{background:var(--teal);color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.3)}.nav-item:hover:not(.active){color:var(--teal);background:rgba(13,148,136,.05)}
    @media(max-width:600px){.plans-grid{grid-template-columns:1fr}.nav-item span{display:none}.nav-item{padding:12px 14px}}
  </style>
</head>

<div class="main">

<script>
  const firebaseConfig = {apiKey:"AIzaSyCoya4moqwNCuVI-EtzLcMt2gD6QNUdyCQ",authDomain:"texis-b7180.firebaseapp.com",projectId:"texis-b7180",storageBucket:"texis-b7180.firebasestorage.app",messagingSenderId:"848854390209",appId:"1:848854390209:web:c5babd1ca5e0e42ba08b40"};
  if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(),db=firebase.firestore(),FV=firebase.firestore.FieldValue,fmt=v=>'₦'+Number(v||0).toLocaleString();
  const ALL_PLANS=[{id:1,name:'📊 Basic Plan',capital:10000,daily:1000,totalProfit:20000,icon:'fa-chart-simple',popular:false},{id:2,name:'📈 Silver Plan',capital:20000,daily:2000,totalProfit:40000,icon:'fa-chart-line',popular:false},{id:3,name:'🥇 Gold Plan',capital:30000,daily:3000,totalProfit:60000,icon:'fa-coins',popular:false},{id:4,name:'💎 Platinum Plan',capital:40000,daily:4000,totalProfit:80000,icon:'fa-gem',popular:false},{id:5,name:'👑 Diamond Plan',capital:50000,daily:5000,totalProfit:100000,icon:'fa-crown',popular:true}];
  const REF_RATES={level1:0.10,level2:0.02,level3:0.01},LOCK_DAY=7,TOTAL_DAYS=20,MAX_ACTIVE=2,MAX_PER_PLAN=6;
  let currentUser=null,userData=null,processing=false,allUserPlans=[],countdownTimer=null,payoutTimer=null,lastPayoutDate='',highestInvested=0;

  function isWeekend(d){if(!d)d=new Date();const day=d.getDay();return day===0||day===6}
  function getNextPayoutTime(){const now=new Date();const tm=new Date(now);tm.setHours(24,0,0,0);if(now.getDay()===6){let m=new Date(now);m.setDate(m.getDate()+2);m.setHours(0,0,0,0);return{time:m,label:'Weekend — Next Payout Monday 12AM',weekend:true}}if(now.getDay()===0){let m=new Date(now);m.setDate(m.getDate()+1);m.setHours(0,0,0,0);return{time:m,label:'Weekend — Next Payout Monday 12AM',weekend:true}}return{time:tm,label:'Next Payout Tonight 12AM',weekend:false}}
  function toast(t,m,s='success'){const icons={success:'check-circle',warning:'exclamation-triangle',error:'exclamation-circle'};const e=document.createElement('div');e.className=`toast ${s}`;e.innerHTML=`<i class="fas fa-${icons[s]||icons.success}"></i><div><b>${t}</b><br><small>${m}</small></div>`;document.body.appendChild(e);setTimeout(()=>e.remove(),4500)}
  function fmtCD(ms){if(ms<=0)return'00:00:00';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
  function updateMidCD(){const now=new Date(),next=getNextPayoutTime(),ms=next.time-now;document.querySelectorAll('.cd-time').forEach(e=>e.textContent=fmtCD(Math.max(0,ms)));document.querySelectorAll('.countdown').forEach(e=>{if(next.weekend)e.classList.add('weekend');else e.classList.remove('weekend')});document.querySelectorAll('.cd-label').forEach(e=>{e.innerHTML='<i class="fas fa-'+(next.weekend?'calendar-xmark':'hourglass-half')+'"></i> '+next.label})}
  function startMidCD(){if(countdownTimer)clearInterval(countdownTimer);updateMidCD();countdownTimer=setInterval(updateMidCD,1000)}
  function payoutDue(lpd){if(!lpd)return false;const now=new Date();if(isWeekend(now))return false;const tm=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);const ld=lpd.toDate?lpd.toDate():new Date(lpd);return ld<tm}
  function firstDue(sd){if(!sd)return false;const now=new Date();if(isWeekend(now))return false;const tm=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);const sDate=sd.toDate?sd.toDate():new Date(sd);return sDate<tm}
  function getActiveCount(){return allUserPlans.filter(p=>p.status==='active').length}
  function fmtDate(d){if(!d)return'—';try{const dt=d.toDate?d.toDate():new Date(d);return dt.toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'2-digit'})}catch(e){return'—'}}

  function renderPlans(){
    const el=document.getElementById('plansContainer');if(!el)return;
    const pc={};allUserPlans.forEach(p=>{if(p.planId)pc[p.planId]=(pc[p.planId]||0)+1});
    const activeCount=getActiveCount();const canBuyMore=activeCount<MAX_ACTIVE;
    el.innerHTML=ALL_PLANS.map(p=>{const c=pc[p.id]||0,l=c>=MAX_PER_PLAN,ca=userData&&(userData.wallet||0)>=p.capital,mr=p.capital>=highestInvested,il=!mr&&highestInvested>0;let dr='';if(l)dr='Limit';else if(!canBuyMore)dr=`Max ${MAX_ACTIVE} Active`;else if(!ca)dr='Low Balance';else if(il)dr=`Min ₦${highestInvested.toLocaleString()}`;const blocked=l||!canBuyMore||!ca||il;return`<div class="plan-card ${p.popular?'featured':''} ${blocked?'blocked':''}">${p.popular?'<div class="pop-tag"><i class="fas fa-star"></i> POPULAR</div>':''}<div class="pc-icon"><i class="fas ${p.icon}"></i></div><div class="pc-name">${p.name}</div><div class="pc-price">${fmt(p.capital)}</div><div class="pc-row"><span class="lbl">📈 Daily (Mon-Fri)</span><span class="val grn">${fmt(p.daily)}</span></div><div class="pc-row"><span class="lbl">⏱️ Duration</span><span class="val">${TOTAL_DAYS} days</span></div><div class="pc-row"><span class="lbl">🔒 Lock Rule</span><span class="val amb">1st Plan: Full · 2nd: Day ${LOCK_DAY}</span></div><div class="pc-row"><span class="lbl">💰 Total</span><span class="val amb">${fmt(p.totalProfit)}</span></div><span style="display:inline-block;margin-top:10px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;background:#f1f5f9;color:var(--sub)">${c}/${MAX_PER_PLAN} · ${activeCount}/${MAX_ACTIVE} active</span><button class="buy-btn" ${blocked?'disabled':''} onclick="buyPlan(${p.id},${p.capital},'${p.name.replace(/'/g,"\\'")}',${p.daily})"><i class="fas ${blocked?'fa-lock':'fa-rocket'}"></i> ${dr||'Invest Now'}</button></div>`}).join('')}

  function renderActivePlans(){
    const c=document.getElementById('activePlansContainer'),t=document.getElementById('activeTitle'),ce=document.getElementById('activeCount');
    if(!allUserPlans.length){t.style.display='none';c.innerHTML='';return}
    t.style.display='flex';ce.textContent=allUserPlans.length;
    const now=new Date(),next=getNextPayoutTime(),ms=next.time-now,display=fmtCD(Math.max(0,ms));
    // Sort by creation date (oldest first)
    const sorted=[...allUserPlans].sort((a,b)=>(a.createdAt?.toMillis?.()||a.startDate?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||b.startDate?.toMillis?.()||0));
    c.innerHTML=sorted.map((p,idx)=>{const il=p.status==='locked',ic=p.status==='completed',ia=p.status==='active',rp=p.roiPaid||0,isFirst=ia&&idx===0,isSecond=ia&&idx===1;let bc='active-badge',bt='ACTIVE',extraClass='';if(isFirst){bc='first-badge';bt='⭐ 1ST PLAN';extraClass='first-plan'}if(isSecond){bt='2ND PLAN'}if(il){bc='locked-badge';bt='🔒 LOCKED';extraClass='locked-card'}if(ic){bc='completed-badge';bt='✅ DONE'}const purchaseDate=fmtDate(p.createdAt||p.startDate);let cdHTML='';if(ia){const lockMsg=isFirst?'✅ 1st Plan — runs full 20 days (no lock)':isSecond?'⚠️ 2nd Plan — locks at Day '+LOCK_DAY:'⚠️ Will lock at Day '+LOCK_DAY;cdHTML=`<div class="countdown${next.weekend?' weekend':''}"><div class="cd-label"><i class="fas fa-${next.weekend?'calendar-xmark':'hourglass-half'}"></i> ${next.label}</div><div class="cd-time">${display}</div></div>${next.weekend?'<div class="weekend-notice"><i class="fas fa-info-circle"></i> No payouts Sat-Sun. Next: Monday 12AM</div>':''}<div style="margin-top:8px;font-size:10px;color:${isFirst?'var(--green)':'var(--amber)'};text-align:center">${lockMsg}</div>`}return`<div class="active-card ${extraClass}"><div class="ac-badge ${bc}"><i class="fas fa-${il?'lock':ic?'check-circle':'check-circle'}"></i> ${bt}</div><div class="pc-name" style="margin-top:24px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700">${p.planName}</div><div class="pc-price" style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;color:var(--teal);margin:8px 0">${fmt(p.capital)}</div><div class="pc-row"><span class="lbl">📅 Purchased</span><span class="val">${purchaseDate}</span></div><div class="pc-row"><span class="lbl">📈 Daily</span><span class="val grn">${fmt(p.dailyEarning)}</span></div><div class="pc-row"><span class="lbl">📊 ROI Paid</span><span class="val">${rp}/${TOTAL_DAYS} days</span></div><div class="pc-row"><span class="lbl">💰 Earned</span><span class="val amb">${fmt(p.totalEarned||0)}</span></div>${il?`<div class="locked-alert"><i class="fas fa-lock"></i><div><b>Locked at Day ${LOCK_DAY}</b><br>Buy another plan (₦${p.capital.toLocaleString()}+) to unlock.</div></div>`:ic?`<div style="margin-top:12px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;padding:12px;text-align:center;font-size:13px;color:var(--teal);font-weight:600"><i class="fas fa-trophy"></i> Completed! +${fmt(p.totalEarned||0)}</div>`:cdHTML}</div>`}).join('');updateMidCD()}

  async function loadAllData(){if(!currentUser)return;try{const snap=await db.collection('users').doc(currentUser.uid).get();if(!snap.exists){renderPlans();return}userData=snap.data();document.getElementById('walletDisplay').textContent=fmt(userData.wallet||0);const ps=await db.collection('users').doc(currentUser.uid).collection('activePlans').orderBy('createdAt','asc').limit(30).get();allUserPlans=[];highestInvested=0;ps.forEach(d=>{const p=d.data();allUserPlans.push({id:d.id,...p});if(p.capital>highestInvested)highestInvested=p.capital});renderPlans();renderActivePlans()}catch(e){renderPlans()}}

  async function payReferralBonuses(amount){if(!currentUser||!amount||amount<=0)return{paid:false,totalPaid:0,levels:0,details:''};try{const us=await db.collection('users').doc(currentUser.uid).get();if(!us.exists)return{paid:false,totalPaid:0,levels:0,details:''};const ul=us.data();if(ul.referralBonusPaid===true)return{paid:false,totalPaid:0,levels:0,details:'Already paid'};const chain=[];let rid=ul.referrerUid||ul.referredBy||null;if(!rid||rid==='direct'||rid==='none'||rid.trim()===''||rid===currentUser.uid){await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true});return{paid:false,totalPaid:0,levels:0,details:'No referrer'}}chain.push(rid);try{const l1=await db.collection('users').doc(rid).get();if(l1.exists){const l2id=l1.data().referrerUid||l1.data().referredBy||null;if(l2id&&l2id!=='direct'&&l2id!=='none'&&l2id.trim()!==''&&l2id!==currentUser.uid&&!chain.includes(l2id)){chain.push(l2id);try{const l2=await db.collection('users').doc(l2id).get();if(l2.exists){const l3id=l2.data().referrerUid||l2.data().referredBy||null;if(l3id&&l3id!=='direct'&&l3id!=='none'&&l3id.trim()!==''&&l3id!==currentUser.uid&&!chain.includes(l3id))chain.push(l3id)}}catch(e){}}}}catch(e){}if(!chain.length){await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true});return{paid:false,totalPaid:0,levels:0,details:'No chain'}}const rates=[{level:1,rate:REF_RATES.level1,label:'10%'},{level:2,rate:REF_RATES.level2,label:'2%'},{level:3,rate:REF_RATES.level3,label:'1%'}];let tp=0,lp=0;const details=[];for(let i=0;i<chain.length;i++){const uid=chain[i],ri=rates[i];if(!ri)break;const bonus=Math.floor(amount*ri.rate);if(bonus<=0)continue;try{await db.collection('users').doc(uid).update({wallet:FV.increment(bonus),totalEarnings:FV.increment(bonus),totalRefEarnings:FV.increment(bonus),referralCount:FV.increment(i===0?1:0)});await db.collection('users').doc(uid).collection('transactions').add({type:'referral_bonus',amount:bonus,status:'completed',description:`🎁 L${i+1} ref bonus (${ri.label}) from ${ul.fullName||'new user'} — ₦${bonus.toLocaleString()}`,referredUser:currentUser.uid,level:i+1,rate:ri.rate,createdAt:FV.serverTimestamp()});const rd=db.collection('users').doc(uid).collection('referrals').doc(currentUser.uid),er=await rd.get();await rd.set({uid:currentUser.uid,level:i+1,commission:ri.rate*100,fullName:ul.fullName||'User',username:ul.username||'',email:ul.email||'',totalEarned:(er.exists?er.data().totalEarned||0:0)+bonus,lastInvestment:amount,lastInvestmentDate:FV.serverTimestamp(),firstPurchaseBonus:true},{merge:true});tp+=bonus;lp++;details.push(`L${i+1}:₦${bonus.toLocaleString()}`)}catch(e){}}await db.collection('users').doc(currentUser.uid).update({referralBonusPaid:true,referralBonusAmount:tp,referralBonusLevels:lp,referralBonusPaidAt:FV.serverTimestamp()});return{paid:tp>0,totalPaid:tp,levels:lp,details:details.join(', ')}}catch(e){return{paid:false,totalPaid:0,levels:0,details:''}}}

  async function runPayouts(){
    if(!currentUser||!allUserPlans.length)return;if(isWeekend())return;
    const today=new Date().toDateString();if(lastPayoutDate===today)return;
    try{let done=0;
    const sortedPlans=[...allUserPlans].filter(p=>p.status==='active').sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));
    for(let i=0;i<sortedPlans.length;i++){const p=sortedPlans[i];if(p.roiPaid>=TOTAL_DAYS)continue;let due=false;if(p.lastPayoutDate)due=payoutDue(p.lastPayoutDate);else due=firstDue(p.startDate);if(!due)continue;try{const pr=db.collection('users').doc(currentUser.uid).collection('activePlans').doc(p.id),fresh=await pr.get();if(!fresh.exists||fresh.data().status!=='active')continue;const d=fresh.data();let fd=false;if(d.lastPayoutDate)fd=payoutDue(d.lastPayoutDate);else fd=firstDue(d.startDate);if(!fd)continue;const nrp=(d.roiPaid||0)+1;
    const isFirstPlan=(i===0);
    if(nrp===LOCK_DAY&&!isFirstPlan){await pr.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:LOCK_DAY,status:'locked',lockedAt:FV.serverTimestamp()});p.status='locked';p.roiPaid=LOCK_DAY;done++;toast('🔒 2nd Plan Locked!','Locked at Day '+LOCK_DAY+' — 1st plan continues','warning')}
    else if(nrp>=TOTAL_DAYS){await pr.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:TOTAL_DAYS,totalEarned:(d.totalEarned||0)+d.dailyEarning,status:'completed'});await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(d.dailyEarning),totalEarnings:FV.increment(d.dailyEarning)});p.status='completed';p.roiPaid=TOTAL_DAYS;p.totalEarned=(p.totalEarned||0)+d.dailyEarning;if(userData)userData.wallet=(userData.wallet||0)+d.dailyEarning;done++}
    else{await pr.update({lastPayoutDate:FV.serverTimestamp(),roiPaid:nrp,totalEarned:(d.totalEarned||0)+d.dailyEarning});await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(d.dailyEarning),totalEarnings:FV.increment(d.dailyEarning)});p.roiPaid=nrp;p.totalEarned=(p.totalEarned||0)+d.dailyEarning;p.lastPayoutDate=new Date();if(userData)userData.wallet=(userData.wallet||0)+d.dailyEarning;done++}}catch(e){}}if(done>0){lastPayoutDate=today;document.getElementById('walletDisplay').textContent=fmt(userData?.wallet||0);renderActivePlans()}}catch(e){}}

  window.buyPlan=async function(pid,capital,name,daily){if(processing)return;if(!userData)return Swal.fire({icon:'error',title:'Loading...',confirmButtonColor:'#0d9488'});if(getActiveCount()>=MAX_ACTIVE)return Swal.fire({icon:'warning',title:'Max 2 Active',text:'Only 2 active plans at a time.',confirmButtonColor:'#0d9488'});if(highestInvested>0&&capital<highestInvested)return Swal.fire({icon:'warning',title:'Amount Rule',html:`Must invest <b>₦${highestInvested.toLocaleString()}</b> or higher.`,confirmButtonColor:'#0d9488'});if((userData.wallet||0)<capital)return Swal.fire({icon:'warning',title:'Low Balance',html:`Need <b>${fmt(capital)}</b><br>Have: <b>${fmt(userData?.wallet||0)}</b>`,confirmButtonColor:'#0d9488'});const count=allUserPlans.filter(p=>p.planId===pid).length;if(count>=MAX_PER_PLAN)return Swal.fire({icon:'error',title:'Limit',text:`Max ${MAX_PER_PLAN} per plan.`,confirmButtonColor:'#0d9488'});const lockedPlans=allUserPlans.filter(p=>p.status==='locked'),um=lockedPlans.length>0?`<p style="color:var(--amber);margin-top:8px">🔓 Will <b>UNLOCK ${lockedPlans.length}</b> plan(s)!</p>`:'',ww=isWeekend()?`<p style="color:#dc2626;margin-top:8px">⚠️ Weekend — first payout Monday 12AM</p>`:'';const posLabel=getActiveCount()===0?'⭐ 1ST PLAN (Full 20 days)':'⚠️ 2ND PLAN (Locks at Day 7)';const ok=await Swal.fire({title:'Confirm',html:`<div style="text-align:center"><b>${name}</b><span class="plan-position-tag ${getActiveCount()===0?'first':'second'}" style="display:inline-block;margin-top:4px">${posLabel}</span><div style="background:#f0fdfa;border-radius:14px;padding:14px;margin-top:12px;text-align:left"><div>💰 Capital: <b>${fmt(capital)}</b></div><div>📈 Daily: <b style="color:#10b981">${fmt(daily)}</b></div><div>📅 Duration: <b>${TOTAL_DAYS} days</b></div><div>🔒 Lock: <b style="color:#d97706">${getActiveCount()===0?'No lock (1st plan)':'Day '+LOCK_DAY+' (2nd plan)'}</b></div><div>🏆 Total: <b style="color:#d97706">${fmt(daily*TOTAL_DAYS)}</b></div></div>${um}${ww}<p style="margin-top:12px;font-size:12px;color:#64748b">⏰ First payout at 12AM Mon-Fri · Max ${MAX_ACTIVE} active</p></div>`,icon:'question',showCancelButton:true,confirmButtonText:'Invest',confirmButtonColor:'#0d9488'});if(!ok.isConfirmed)return;processing=true;Swal.fire({title:'Processing...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});try{await db.collection('users').doc(currentUser.uid).update({wallet:FV.increment(-capital)});const npid='plan_'+Date.now()+'_'+pid;await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(npid).set({planId:pid,planName:name,capital,dailyEarning:daily,totalReturn:daily*TOTAL_DAYS,roiPaid:0,status:'active',startDate:FV.serverTimestamp(),totalEarned:0,lastPayoutDate:null,lockDay:LOCK_DAY,createdAt:FV.serverTimestamp()});let uc=0;for(const lp of lockedPlans){try{await db.collection('users').doc(currentUser.uid).collection('activePlans').doc(lp.id).update({status:'active',unlockedAt:FV.serverTimestamp()});lp.status='active';uc++}catch(e){}}const rr=await payReferralBonuses(capital);userData.wallet=(userData.wallet||0)-capital;if(capital>highestInvested)highestInvested=capital;allUserPlans.push({id:npid,planId:pid,planName:name,capital,dailyEarning:daily,roiPaid:0,status:'active',totalEarned:0,lastPayoutDate:null,startDate:new Date(),createdAt:new Date()});document.getElementById('walletDisplay').textContent=fmt(userData.wallet);renderPlans();renderActivePlans();Swal.close();await Swal.fire({icon:'success',title:'✅ Active!',html:`${name} — 12AM Mon-Fri.<br><span class="plan-position-tag ${getActiveCount()<=1?'first':'second'}">${getActiveCount()<=1?'⭐ 1ST PLAN — Full 20 days':'⚠️ 2ND PLAN — Locks Day '+LOCK_DAY}</span>${uc>0?`<br>🔓 ${uc} unlocked!`:''}${rr.paid?`<br>🎁 Ref: ${rr.details}`:''}`,timer:4500,showConfirmButton:false})}catch(e){let msg='Failed.';if(e.code==='resource-exhausted')msg='System busy.';Swal.fire({icon:'error',title:'Error',text:msg,confirmButtonColor:'#ef4444'});await loadAllData()}finally{processing=false}};

  auth.onAuthStateChanged(async user=>{if(!user){window.location.href='login.html';return}currentUser=user;renderPlans();await loadAllData();startMidCD();if(payoutTimer)clearInterval(payoutTimer);payoutTimer=setInterval(runPayouts,60000);setTimeout(runPayouts,3000)});
  setTimeout(()=>{if(!currentUser)renderPlans()},3000);
</script>
