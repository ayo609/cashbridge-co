// Toast notification
function showToast(title, message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast-notification';
  toast.style.borderLeftColor = type === 'success' ? '#00e5a0' : type === 'error' ? '#ef4444' : '#fbbf24';
  toast.innerHTML = `
    <div style="display:flex;align-items:center;gap:0.8rem;">
      <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}" style="color:${type === 'success' ? '#00e5a0' : type === 'error' ? '#ef4444' : '#fbbf24'};font-size:1.2rem;"></i>
      <div><strong>${title}</strong><br><small style="color:#94a3b8">${message}</small></div>
    </div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

// Render available plans with images
function renderPlans() {
  const container = document.getElementById('plansContainer');
  if (!container) return;
  
  container.innerHTML = INVESTMENT_PLANS.map(p => `
    <div class="plan-card ${p.popular ? 'popular' : ''}">
      ${p.popular ? '<div class="popular-badge"><i class="fas fa-star"></i> POPULAR</div>' : ''}
      <div class="plan-image">

      <div class="plan-detail-row"><span class="detail-label">Total Return</span><span class="detail-value total-profit">${formatNgn(p.totalProfit)}</span></div>
      <div class="plan-detail-row"><span class="detail-label">ROI</span><span class="detail-value">${Math.round((p.totalProfit/p.capital)*100)}%</span></div>
      <button class="btn-buy" onclick="window.buyPlan(${p.id}, ${p.capital}, '${p.name.replace(/'/g, "\\'")}', ${p.daily}, ${p.totalProfit}, ${p.days})">
        <i class="fas fa-rocket"></i> Invest Now

  `).join('');
}

// Render active plans with countdown
function renderActivePlans(activePlans) {
  const container = document.getElementById('activePlansContainer');
  if (!container) return;
  
  if (activePlans.length === 0) {
    document.getElementById('activeTitle').style.display = 'none';
    container.innerHTML = '';
    return;
  }
  
  document.getElementById('activeTitle').style.display = 'block';
  
  container.innerHTML = activePlans.map(p => `
    <div class="active-plan-card">
      <div class="purchased-badge"><i class="fas fa-check-circle"></i> ACTIVE</div>
      <div class="plan-name">${p.planName}</div>
      <div class="plan-price">${formatNgn(p.capital)}</div>
      <div class="plan-detail-row"><span class="detail-label">Daily Profit</span><span class="detail-value daily-profit">${formatNgn(p.dailyEarning)}</span></div>
      <div class="plan-detail-row"><span class="detail-label">Days Left</span><span class="detail-value">${p.daysLeft}</span></div>
      <div class="plan-detail-row"><span class="detail-label">Total Earned</span><span class="detail-value total-profit">${formatNgn(p.totalEarned || 0)}</span></div>
      <div class="countdown-timer" id="countdown_${p.id.replace(/[^a-zA-Z0-9]/g, '_')}"><i class="fas fa-hourglass-half"></i> Calculating next payout...</div>
    </div>
  `).join('');
  
  // Start countdown timers
  activePlans.forEach(p => {
    const lastClaimed = p.lastClaimed?.toDate?.() || p.startDate?.toDate?.() || new Date();
    const nextPayout = new Date(lastClaimed.getTime() + 24 * 60 * 60 * 1000);
    const safeId = p.id.replace(/[^a-zA-Z0-9]/g, '_');
    startCountdown(`countdown_${safeId}`, nextPayout);
  });
}

function startCountdown(elementId, targetTime) {
  const update = () => {
    const el = document.getElementById(elementId);
    if (!el) return;
    const diff = targetTime.getTime() - Date.now();
    if (diff <= 0) {
      el.innerHTML = '<i class="fas fa-clock"></i> Payout ready! Refreshing...';
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `<i class="fas fa-hourglass-half"></i> Next payout: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };
  update();
  setInterval(update, 1000);
}

// Load user data and active plans
async function loadData() {
  if (!currentUser) return;
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) return;
    userData = userSnap.data();
    document.getElementById('walletDisplay').textContent = formatNgn(userData.wallet || 0);
    
    // Load active plans
    const activeSnap = await getDocs(collection(db, `users/${currentUser.uid}/activePlans`));
    const activePlans = [];
    activeSnap.forEach(d => {
      const data = d.data();
      if (data.status === 'active' && data.daysLeft > 0) {
        activePlans.push({ id: d.id, ...data });
      }
    });
    renderActivePlans(activePlans);
    
  } catch (err) {
    console.error('Load error:', err);
  }
}

// AUTO PAYOUT ENGINE - Runs every hour and checks for due payouts
async function runAutoPayout() {
  if (!currentUser) return;
  
  try {
    const activeSnap = await getDocs(collection(db, `users/${currentUser.uid}/activePlans`));
    const now = new Date();
    let hasUpdates = false;
    
    for (const docSnap of activeSnap.docs) {
      const inv = { id: docSnap.id, ...docSnap.data() };
      if (inv.status !== 'active' || inv.daysLeft <= 0) continue;
      
      const lastClaimed = inv.lastClaimed?.toDate?.() || inv.startDate?.toDate?.() || new Date();
      const nextPayout = new Date(lastClaimed.getTime() + 24 * 60 * 60 * 1000);
      
      if (now >= nextPayout) {
        try {
          const userRef = doc(db, 'users', currentUser.uid);
          const planRef = doc(db, `users/${currentUser.uid}/activePlans`, inv.id);
          
          await runTransaction(db, async (t) => {
            const planSnap = await t.get(planRef);
            if (!planSnap.exists() || planSnap.data().status !== 'active') return;
            
            const planData = planSnap.data();
            const newDaysLeft = planData.daysLeft - 1;
            const newTotalEarned = (planData.totalEarned || 0) + inv.dailyEarning;
            
            t.update(planRef, {
              lastClaimed: serverTimestamp(),
              daysLeft: newDaysLeft,
              totalEarned: newTotalEarned,
              ...(newDaysLeft <= 0 && { status: 'completed', completedAt: serverTimestamp() })
            });
            
            t.update(userRef, {
              wallet: increment(inv.dailyEarning),
              totalEarnings: increment(inv.dailyEarning)
            });
          });
          
          hasUpdates = true;
          showToast('💰 Daily Payout!', `${formatNgn(inv.dailyEarning)} credited from ${inv.planName}`, 'success');
        } catch (err) {
          console.error(`Payout error for ${inv.planName}:`, err);
        }
      }
    }
    
    if (hasUpdates) {
      await loadData();
    }
  } catch (err) {
    console.error('Auto-payout scan error:', err);
  }
}

// BUY PLAN with referral bonus distribution (3 levels: 20%, 2%, 1%)
window.buyPlan = async function(planId, capital, name, daily, totalProfit, days) {
  if (processing) return;
  if (!userData || (userData.wallet || 0) < capital) {
    return Swal.fire({
      icon: 'warning', title: 'Insufficient Balance',
      text: `You need ${formatNgn(capital)}. Current balance: ${formatNgn(userData?.wallet || 0)}`,
      background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#00e5a0'
    });
  }
  
  const result = await Swal.fire({
    title: 'Confirm Investment',
    html: `<div style="text-align:center">
      <strong style="font-size:1.2rem">${name}</strong><br><br>
      <div style="background:rgba(0,229,160,0.1);border-radius:16px;padding:1rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>💰 Capital:</span><span style="color:#00e5a0">${formatNgn(capital)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>📈 Daily Profit:</span><span style="color:#22c55e">${formatNgn(daily)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem"><span>📅 Duration:</span><span>${days} days</span></div>
        <div style="display:flex;justify-content:space-between"><span>🏆 Total Return:</span><span style="color:#fbbf24">${formatNgn(totalProfit)}</span></div>
      </div>
    </div>`,
    icon: 'question', showCancelButton: true, confirmButtonText: 'Invest Now', cancelButtonText: 'Cancel',
    background: '#0f172a', color: '#e2e8f0', confirmButtonColor: '#00e5a0'
  });
  if (!result.isConfirmed) return;
  
  processing = true;
  Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const planRef = doc(db, `users/${currentUser.uid}/activePlans`, `plan_${Date.now()}_${planId}`);
    
    await runTransaction(db, async (t) => {
      const snap = await t.get(userRef);
      if (!snap.exists() || (snap.data().wallet || 0) < capital) throw new Error("Insufficient funds");
      t.update(userRef, { wallet: increment(-capital) });
      t.set(planRef, {
        planId, planName: name, capital, dailyEarning: daily, totalReturn: totalProfit,
        daysLeft: days, status: 'active', startDate: serverTimestamp(),
        lastClaimed: serverTimestamp(), totalEarned: 0
      });
    });
    
    // Pay referral bonuses to upliners (3 levels)
    await payReferralBonuses(capital);
    
    Swal.close();
    await Swal.fire({
      icon: 'success', title: '✅ Investment Successful!',
      text: `${name} activated! Daily payouts start in 24h.`,
      background: '#0f172a', confirmButtonColor: '#00e5a0', timer: 2000, showConfirmButton: false
    });
    
    await loadData();
    showToast('🎉 Investment Active!', `${name} - Daily earnings will be auto-credited`, 'success');
    
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'Failed', text: err.message, background: '#0f172a', confirmButtonColor: '#ef4444' });
  } finally {
    processing = false;
  }
};

// Referral bonus distribution - 3 levels (20%, 2%, 1%)
async function payReferralBonuses(investmentAmount) {
  try {
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (!userSnap.exists()) return;
    
    const userDataSnap = userSnap.data();
    const levels = [
      { uid: userDataSnap.referredBy, rate: 0.20, level: 1, label: 'Level 1 (20%)' },
      { uid: userDataSnap.level2Referrer, rate: 0.02, level: 2, label: 'Level 2 (2%)' },
      { uid: userDataSnap.level3Referrer, rate: 0.01, level: 3, label: 'Level 3 (1%)' }
    ];
    
    for (const { uid, rate, level, label } of levels) {
      if (!uid) continue;
      const bonus = Math.floor(investmentAmount * rate);
      if (bonus <= 0) continue;
      
      try {
        await runTransaction(db, async (t) => {
          const uplinerRef = doc(db, 'users', uid);
          const uplinerSnap = await t.get(uplinerRef);
          if (!uplinerSnap.exists()) return;
          
          t.update(uplinerRef, {
            wallet: increment(bonus),
            totalEarnings: increment(bonus)
          });
          
          const referralRef = doc(db, `users/${uid}/referrals`, currentUser.uid);
          const refSnap = await t.get(referralRef);
          const existingTotal = refSnap.exists() ? (refSnap.data().totalEarned || 0) : 0;
          
          t.set(referralRef, {
            referredUserId: currentUser.uid,
            referredUserName: userDataSnap.fullName || 'User',
            referredUsername: userDataSnap.username || 'user',
            level: level,
            commission: rate * 100,
            lastInvestment: investmentAmount,
            lastInvestmentDate: serverTimestamp(),
            updatedAt: serverTimestamp(),
            totalEarned: existingTotal + bonus
          }, { merge: true });
        });
        
        showToast('💰 Referral Bonus!', `${label}: ${formatNgn(bonus)} credited`, 'success');
      } catch (err) {
        console.error(`${label} bonus failed:`, err);
      }
    }
  } catch (err) {
    console.error('Referral payment error:', err);
  }
}

// Auth state
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  currentUser = user;
  renderPlans();
  await loadData();
  
  // Run auto-payout immediately on login
  await runAutoPayout();
  
  // Run auto-payout every hour
  if (payoutInterval) clearInterval(payoutInterval);
  payoutInterval = setInterval(() => runAutoPayout(), 60 * 60 * 1000);
});
</script>
