<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CashBridge • Create Account</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0f1e;
      background-image: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.18) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
                        linear-gradient(145deg, #0f172a 0%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      width: 400px;
      height: 400px;
      background: linear-gradient(145deg, #4f46e5, #ec4899);
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 20s infinite alternate;
      z-index: 0;
    }

    .blob-1 {
      top: -100px;
      right: -100px;
      background: linear-gradient(145deg, #6366f1, #a855f7);
    }

    .blob-2 {
      bottom: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: linear-gradient(145deg, #ec4899, #f59e0b);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    /* Main container */
    .glass-card {
      width: 100%;
      max-width: 600px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 48px;
      padding: 3rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #6366f1;
    }

    .back-link i {
      font-size: 0.9rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      color: white;
      transform: rotate(-5deg);
      box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.4);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .label-hint {
      color: #94a3b8;
      font-weight: 400;
      font-size: 0.8rem;
      margin-left: 0.3rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6366f1;
      font-size: 1rem;
      opacity: 0.7;
      transition: opacity 0.3s;
      z-index: 1;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    input::placeholder {
      color: #475569;
      font-weight: 300;
    }

    input.error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    input.success {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.05);
    }

    .username-input {
      font-family: 'Space Grotesk', monospace;
      letter-spacing: 0.5px;
    }

    .input-feedback {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      display: none;
      align-items: center;
      gap: 0.3rem;
    }

    .input-feedback.show {
      display: flex;
    }

    .input-feedback.error {
      color: #ef4444;
    }

    .input-feedback.success {
      color: #22c55e;
    }

    .input-feedback.checking {
      color: #f59e0b;
    }

    /* Password strength */
    .password-strength {
      margin-top: 0.5rem;
      height: 4px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 10px;
    }

    .strength-weak { 
      background: #ef4444; 
      width: 33.33%;
      box-shadow: 0 0 10px #ef4444;
    }
    .strength-medium { 
      background: #f59e0b; 
      width: 66.66%;
      box-shadow: 0 0 10px #f59e0b;
    }
    .strength-strong { 
      background: #22c55e; 
      width: 100%;
      box-shadow: 0 0 10px #22c55e;
    }

    .password-hint {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Terms checkbox */
    .terms-wrapper {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 1.2rem;
      margin: 1.5rem 0 2rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .terms-label {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #cbd5e1;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .terms-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6366f1;
      border-radius: 6px;
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .terms-link {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .terms-link:hover {
      color: #ec4899;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px -5px rgba(99, 102, 241, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .submit-btn i {
      font-size: 1rem;
      transition: transform 0.3s;
    }

    .submit-btn:hover:not(:disabled) i {
      transform: translateX(5px);
    }

    /* Login link */
    .login-link {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      margin-left: 0.5rem;
      transition: color 0.3s;
    }

    .login-link a:hover {
      color: #ec4899;
    }

    /* Progress steps */
    .progress-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .step {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      transition: all 0.3s;
    }

    .step.active {
      width: 24px;
      background: linear-gradient(90deg, #6366f1, #ec4899);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .glass-card {
        padding: 2rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full-width {
        grid-column: span 1;
      }

      h1 {
        font-size: 2.2rem;
      }

      .header-icon {
        width: 56px;
        height: 56px;
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="glass-card">
    <!-- Back link -->
    <a href="login.html" class="back-link">
      <i class="fas fa-arrow-left"></i>
      Back to sign in
    </a>

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <h1>Get Started</h1>
      <p class="subtitle">Create your account in seconds</p>
    </div>

    <!-- Progress indicator -->
    <div class="progress-steps">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <!-- Form -->
    <form id="registerForm">
      <div class="form-grid">
        <!-- Full Name -->
        <div class="form-group full-width">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="name" placeholder="Enter your full name" required minlength="2">
          </div>
        </div>

        <!-- Username -->
        <div class="form-group full-width">
          <label>
            Username 
            <span class="label-hint">(your referral code)</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-at input-icon"></i>
            <input type="text" id="username" class="username-input" placeholder="johndoe123" required minlength="3" maxlength="20" pattern="[a-z0-9]+">
          </div>
          <div class="input-feedback" id="usernameFeedback"></div>
        </div>

        <!-- Email -->
        <div class="form-group full-width">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="john@example.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Create password" required minlength="8">
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
          <div class="password-hint" id="passwordHint">
            <i class="fas fa-info-circle"></i>
            Enter a strong password
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>Confirm</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
          </div>
        </div>

        <!-- Referral Code (Optional) -->
        <div class="form-group full-width">
          <label>
            Referral Code 
            <span class="label-hint">(optional - invite from a friend)</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-gift input-icon"></i>
            <input type="text" id="referral" class="username-input" placeholder="Enter referrer's username">
          </div>
          <div class="input-feedback" id="referralFeedback"></div>
        </div>
      </div>

      <!-- Terms and Conditions -->
      <div class="terms-wrapper">
        <label class="terms-label">
          <input type="checkbox" id="terms" required>
          <span>
            I agree to the 
            <a href="#" class="terms-link">Terms & Conditions</a> 
            and 
            <a href="#" class="terms-link">Privacy Policy</a>
          </span>
        </label>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn" id="submitBtn">
        Create Account
        <i class="fas fa-arrow-right"></i>
      </button>

      <!-- Login Link -->
      <div class="login-link">
        Already have an account?
        <a href="login.html">Sign in</a>
      </div>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCubmbN-jRq33AHGL7WxxeILOrV-1_QCxo",
      authDomain: "cashbridge-a688e.firebaseapp.com",
      projectId: "cashbridge-a688e",
      storageBucket: "cashbridge-a688e.firebasestorage.app",
      messagingSenderId: "345273765518",
      appId: "1:345273765518:web:29ee0b8f9717cdb50203df"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let usernameCheckTimeout;

    // Username availability check
    document.getElementById('username').addEventListener('input', (e) => {
      const username = e.target.value.toLowerCase().trim();
      const feedback = document.getElementById('usernameFeedback');
      
      clearTimeout(usernameCheckTimeout);
      
      if (username.length < 3) {
        feedback.className = 'input-feedback';
        e.target.classList.remove('success', 'error');
        return;
      }
      
      if (!/^[a-z0-9]+$/.test(username)) {
        feedback.innerHTML = '<i class="fas fa-times-circle"></i> Only lowercase letters and numbers allowed';
        feedback.className = 'input-feedback show error';
        e.target.classList.add('error');
        e.target.classList.remove('success');
        return;
      }
      
      feedback.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking availability...';
      feedback.className = 'input-feedback show checking';
      
      usernameCheckTimeout = setTimeout(async () => {
        try {
          const exists = await findUserByUsername(username);
          
          if (exists) {
            feedback.innerHTML = '<i class="fas fa-times-circle"></i> Username already taken';
            feedback.className = 'input-feedback show error';
            e.target.classList.add('error');
            e.target.classList.remove('success');
          } else {
            feedback.innerHTML = '<i class="fas fa-check-circle"></i> Username available!';
            feedback.className = 'input-feedback show success';
            e.target.classList.add('success');
            e.target.classList.remove('error');
          }
        } catch (error) {
          console.error('Username check error:', error);
          feedback.className = 'input-feedback';
        }
      }, 600);
    });

    // Referral code validation
    document.getElementById('referral').addEventListener('input', (e) => {
      const referralCode = e.target.value.toLowerCase().trim();
      const referralFeedback = document.getElementById('referralFeedback');
      
      clearTimeout(usernameCheckTimeout);
      
      if (!referralCode) {
        referralFeedback.className = 'input-feedback';
        e.target.classList.remove('success', 'error');
        return;
      }
      
      if (referralCode.length < 3) {
        referralFeedback.className = 'input-feedback';
        return;
      }
      
      referralFeedback.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying code...';
      referralFeedback.className = 'input-feedback show checking';
      
      usernameCheckTimeout = setTimeout(async () => {
        try {
          const referrer = await findUserByUsername(referralCode);
          
          if (referrer) {
            referralFeedback.innerHTML = `<i class="fas fa-check-circle"></i> Valid! Referred by ${referrer.fullName}`;
            referralFeedback.className = 'input-feedback show success';
            e.target.classList.add('success');
            e.target.classList.remove('error');
          } else {
            referralFeedback.innerHTML = '<i class="fas fa-times-circle"></i> Invalid referral code';
            referralFeedback.className = 'input-feedback show error';
            e.target.classList.add('error');
            e.target.classList.remove('success');
          }
        } catch (error) {
          console.error('Referral check error:', error);
          referralFeedback.innerHTML = '<i class="fas fa-exclamation-circle"></i> Unable to verify code';
          referralFeedback.className = 'input-feedback show';
        }
      }, 600);
    });

    // Find user by username
    async function findUserByUsername(username) {
      try {
        const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
        const snapshot = await getDocs(q);
        return snapshot.empty ? null : { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
      } catch (error) {
        console.error('Error finding user:', error);
        throw error;
      }
    }

    // Password strength
    document.getElementById('password').addEventListener('input', (e) => {
      const password = e.target.value;
      const strengthBar = document.getElementById('strengthBar');
      const hint = document.getElementById('passwordHint');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;
      
      strengthBar.className = 'password-strength-bar';
      if (strength <= 1) {
        strengthBar.classList.add('strength-weak');
        hint.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Weak password';
      } else if (strength <= 2) {
        strengthBar.classList.add('strength-medium');
        hint.innerHTML = '<i class="fas fa-chart-line"></i> Medium strength';
      } else {
        strengthBar.classList.add('strength-strong');
        hint.innerHTML = '<i class="fas fa-shield-alt"></i> Strong password!';
      }
    });

    // Password match
    document.getElementById('confirmPassword').addEventListener('input', (e) => {
      const password = document.getElementById('password').value;
      const confirmPassword = e.target.value;
      
      if (confirmPassword && password !== confirmPassword) {
        e.target.classList.add('error');
      } else {
        e.target.classList.remove('error');
      }
    });

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim().toLowerCase();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const referralCode = document.getElementById('referral').value.trim().toLowerCase();
      const termsChecked = document.getElementById('terms').checked;

      // Validation
      if (username.length < 3) {
        return Swal.fire({
          icon: 'error',
          title: 'Username too short',
          text: 'Username must be at least 3 characters',
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });
      }

      if (!/^[a-z0-9]+$/.test(username)) {
        return Swal.fire({
          icon: 'error',
          title: 'Invalid username',
          text: 'Username can only contain lowercase letters and numbers',
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });
      }

      if (password !== confirmPassword) {
        return Swal.fire({
          icon: 'error',
          title: 'Passwords do not match',
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });
      }

      if (password.length < 8) {
        return Swal.fire({
          icon: 'error',
          title: 'Password too short',
          text: 'Password must be at least 8 characters',
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });
      }

      if (!termsChecked) {
        return Swal.fire({
          icon: 'warning',
          title: 'Terms required',
          text: 'Please accept the terms and conditions',
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Creating Account <i class="fas fa-spinner fa-spin"></i>';

      try {
        // Double-check username availability
        const usernameExists = await findUserByUsername(username);
        if (usernameExists) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Create Account <i class="fas fa-arrow-right"></i>';
          return Swal.fire({
            icon: 'error',
            title: 'Username taken',
            text: 'This username is already registered. Please choose another.',
            background: '#0f172a',
            color: '#e2e8f0',
            confirmButtonColor: '#6366f1'
          });
        }

        // Validate referral code if provided
        let referrerData = null;
        if (referralCode) {
          try {
            referrerData = await findUserByUsername(referralCode);
            
            if (!referrerData) {
              const result = await Swal.fire({
                icon: 'warning',
                title: 'Invalid Referral Code',
                text: `Username "${referralCode}" not found. Continue without referral?`,
                showCancelButton: true,
                confirmButtonText: 'Continue Anyway',
                cancelButtonText: 'Fix Referral Code',
                background: '#0f172a',
                color: '#e2e8f0',
                confirmButtonColor: '#6366f1',
                cancelButtonColor: '#64748b'
              });
              
              if (!result.isConfirmed) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account <i class="fas fa-arrow-right"></i>';
                return;
              }
            }
          } catch (error) {
            console.error('Referral validation error:', error);
          }
        }

        // Create Auth account
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const newUserId = userCredential.user.uid;

        await updateProfile(userCredential.user, { displayName: name });

        // Build referral chain
        console.log('🔗 Building referral chain...');
        
        let level1Referrer = null;
        let level2Referrer = null;
        let level3Referrer = null;
        
        if (referrerData) {
          level1Referrer = referrerData.id;
          console.log('Level 1 (Direct):', level1Referrer, '-', referrerData.fullName);
          
          if (referrerData.referredBy) {
            level2Referrer = referrerData.referredBy;
            console.log('Level 2 (Indirect):', level2Referrer);
            
            try {
              const level2Doc = await getDoc(doc(db, 'users', level2Referrer));
              if (level2Doc.exists() && level2Doc.data().referredBy) {
                level3Referrer = level2Doc.data().referredBy;
                console.log('Level 3 (Indirect):', level3Referrer);
              }
            } catch (error) {
              console.error('Error fetching level 3 referrer:', error);
            }
          }
        }

        // Create user document
        await setDoc(doc(db, "users", newUserId), {
          uid: newUserId,
          fullName: name,
          username: username,
          email: email,
          role: "user",
          status: "active",
          referredBy: level1Referrer,
          level2Referrer: level2Referrer,
          level3Referrer: level3Referrer,
          wallet: 0,
          totalDeposits: 0,
          totalWithdrawals: 0,
          totalEarnings: 0,
          activeInvestments: 0,
          emailVerified: false,
          createdAt: serverTimestamp(),
          lastLogin: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        console.log('✅ User document created');

        // Create referral records
        if (level1Referrer) {
          try {
            await setDoc(doc(db, `users/${level1Referrer}/referrals`, newUserId), {
              referredUserId: newUserId,
              referredUserName: name,
              referredUserEmail: email,
              referredUsername: username,
              level: 1,
              commission: 20,
              referredAt: serverTimestamp(),
              totalEarned: 0
            });
          } catch (error) {
            console.error('Error creating level 1 referral:', error);
          }
        }

        if (level2Referrer) {
          try {
            await setDoc(doc(db, `users/${level2Referrer}/referrals`, newUserId), {
              referredUserId: newUserId,
              referredUserName: name,
              referredUserEmail: email,
              referredUsername: username,
              level: 2,
              commission: 2,
              referredAt: serverTimestamp(),
              totalEarned: 0
            });
          } catch (error) {
            console.error('Error creating level 2 referral:', error);
          }
        }

        if (level3Referrer) {
          try {
            await setDoc(doc(db, `users/${level3Referrer}/referrals`, newUserId), {
              referredUserId: newUserId,
              referredUserName: name,
              referredUserEmail: email,
              referredUsername: username,
              level: 3,
              commission: 1,
              referredAt: serverTimestamp(),
              totalEarned: 0
            });
          } catch (error) {
            console.error('Error creating level 3 referral:', error);
          }
        }

        await Swal.fire({
          icon: 'success',
          title: 'Welcome to CashBridge!',
          html: `<p>Your account has been created successfully</p><p style="margin-top:1rem; padding:0.5rem; background:rgba(99,102,241,0.1); border-radius:12px;"><strong style="color:#6366f1">@${username}</strong></p>`,
          timer: 3000,
          showConfirmButton: false,
          background: '#0f172a',
          color: '#e2e8f0'
        });

        window.location.href = "dashboard.html";

      } catch (error) {
        console.error("Registration error:", error);
        
        let message = 'Registration failed. Please try again.';
        if (error.code === 'auth/email-already-in-use') {
          message = 'This email is already registered. Please sign in instead.';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email address format.';
        } else if (error.code === 'auth/weak-password') {
          message = 'Password is too weak. Use at least 8 characters.';
        } else if (error.code === 'permission-denied') {
          message = 'Permission error. Please check Firestore security rules.';
        } else if (error.message) {
          message = error.message;
        }

        Swal.fire({
          icon: 'error',
          title: 'Registration Failed',
          text: message,
          background: '#0f172a',
          color: '#e2e8f0',
          confirmButtonColor: '#6366f1'
        });

        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Create Account <i class="fas fa-arrow-right"></i>';
      }
    });
  </script>
</body>
</html>
